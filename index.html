function getTodayStr(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}

function fmt(n){return new Intl.NumberFormat('pt-AO',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}

function filterTable(inputEl, tableId) { var filter = inputEl.value.toLowerCase(); var table = document.getElementById(tableId); if(!table) return; var rows = table.getElementsByTagName('tr'); for (var i = 1; i < rows.length; i++) { var cells = rows[i].getElementsByTagName('td'); var match = false; for (var j = 0; j < cells.length; j++) { if (cells[j].innerText.toLowerCase().indexOf(filter) > -1) match = true; } rows[i].style.display = match ? '' : 'none'; } }
async function hashPassword(pass){try{if(window.crypto&&window.crypto.subtle){var enc=new TextEncoder().encode(pass);var buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');}}catch(e){}var h=0;for(var i=0;i<pass.length;i++){h=((h<<5)-h)+pass.charCodeAt(i);h|=0;}return'fb_'+Math.abs(h).toString(36);}

async function handleLogin(e){e.preventDefault();var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value,err=document.getElementById('loginError');var users=await DB.get('users');var f=users.find(x=>x.user.toLowerCase()===u.toLowerCase());if(!f){err.textContent='Utilizador não encontrado';err.classList.add('show');return false;}var h=await hashPassword(p);if(f.pass!==h){err.textContent='Senha incorrecta';err.classList.add('show');return false;}err.classList.remove('show');currentUser=f;localStorage.setItem('cx_session',f.id);await logAction('Login','Entrada no sistema');showApp();return false;}

function modal(t,b,fn,txt,cls){txt=txt||'Salvar';cls=cls||'btn-primary';document.getElementById('modalTitle').innerText=t;document.getElementById('modalBody').innerHTML=b;document.getElementById('modalFooter').innerHTML='<button class="btn btn-outline" onclick="closeModal()">Fechar</button>';if(fn){var btn=document.createElement('button');btn.className='btn '+cls;btn.innerText=txt;btn.onclick=()=>fn();document.getElementById('modalFooter').prepend(btn);}document.getElementById('modalGeneric').classList.add('show');}
function closeModal(){document.getElementById('modalGeneric').classList.remove('show');}function closeModalDoc(){document.getElementById('modalDoc').classList.remove('show');}

async function loadDashboard(){var t=await DB.get('transactions'),cl=await DB.get('clients'),cu=getCurrency();var inc=t.filter(x=>x.type==='income').reduce((a,b)=>a+b.val,0);var exp=t.filter(x=>x.type==='expense_payment'||x.type==='expense').reduce((a,b)=>a+b.val,0);var rec=cl.reduce((a,b)=>a+(b.divida||0),0);document.getElementById('appContent').innerHTML=`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px"><div class="card" style="border-left:3px solid var(--primary)"><div style="font-size:.78rem;color:var(--text-muted)">Faturado</div><div style="font-size:1.3rem;font-family:Orbitron">${fmt(inc)} ${cu}</div></div><div class="card" style="border-left:3px solid var(--success)"><div style="font-size:.78rem;color:var(--text-muted)">Recebido</div><div style="font-size:1.3rem;font-family:Orbitron">${fmt(t.filter(x=>x.status==='paid'&&x.type==='income').reduce((a,b)=>a+b.val,0))} ${cu}</div></div><div class="card" style="border-left:3px solid var(--danger)"><div style="font-size:.78rem;color:var(--text-muted)">A Pagar</div><div style="font-size:1.3rem;font-family:Orbitron">${fmt(exp)} ${cu}</div></div><div class="card" style="border-left:3px solid var(--warning)"><div style="font-size:.78rem;color:var(--text-muted)">A Receber</div><div style="font-size:1.3rem;font-family:Orbitron">${fmt(rec)} ${cu}</div></div></div><div class="card"><h3 style="margin-bottom:12px">Receitas vs Despesas</h3><canvas id="dashChart" height="70"></canvas></div>`;renderChart(t);}
async function renderChart(trans){var m=[],i=[],e=[];for(var x=5;x>=0;x--){var d=new Date();d.setMonth(d.getMonth()-x);m.push(String(d.getMonth()+1)+'/'+d.getFullYear());var mi=0,me=0;trans.filter(t=>{var p=parseDate(t.date);return p&&p.getMonth()===d.getMonth()&&p.getFullYear()===d.getFullYear()}).forEach(t=>{if(t.type==='income')mi+=t.val;if(t.type==='expense_payment')me+=t.val;});i.push(mi);e.push(me);}var ctx=document.getElementById('dashChart').getContext('2d');if(mainChart)mainChart.destroy();mainChart=new Chart(ctx,{type:'bar',data:{labels:m,datasets:[{label:'Receitas',data:i,backgroundColor:'rgba(0,255,136,0.5)'},{label:'Despesas',data:e,backgroundColor:'rgba(255,0,110,0.5)'}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{color:'#8b9bb4'}},x:{ticks:{color:'#8b9bb4'}}}}});}

async function openCRUDModal(mod,id){var data=await DB.get(mod);var r=id?data.find(x=>x.id===id):{};var fields=[];var emps=await DB.get('employees');var techs=emps.filter(e=>e.role==='Instalador'||e.role==='Técnico');if(mod==='communities')fields=[{k:'name',l:'Nome'},{k:'contact',l:'Contacto'},{k:'zone',l:'Zona'},{k:'install',l:'Taxa Instalação',t:'number'},{k:'monthly',l:'Mensalidade',t:'number'},{k:'installStatus',l:'Estado Inst.',t:'select',opts:['pending','done']}];if(mod==='systems')fields=[{k:'clientName',l:'Cliente'},{k:'type',l:'Tipo',t:'select',opts:['Blog','Gestão','Vendas']},{k:'domain',l:'Domínio'},{k:'value',l:'Valor',t:'number'},{k:'status',l:'Estado',t:'select',opts:['active','pending']}];if(mod==='cards')fields=[{k:'clientName',l:'Titular'},{k:'email',l:'Email'},{k:'type',l:'Tipo',t:'select',opts:['Visa','Virtual','PayPal']},{k:'balance',l:'Saldo',t:'number'},{k:'status',l:'Estado',t:'select',opts:['active','blocked']}];if(mod==='shopping')fields=[{k:'clientName',l:'Cliente'},{k:'platform',l:'Plataforma',t:'select',opts:['AliExpress','Amazon','Shein','Outro']},{k:'item',l:'Item'},{k:'itemValue',l:'Valor Item',t:'number'},{k:'fee',l:'Taxa',t:'number'},{k:'status',l:'Estado',t:'select',opts:['pending','ordered','delivered']}];if(mod==='installations')fields=[{k:'clientName',l:'Cliente'},{k:'tech',l:'Técnicos',t:'multiselect',opts:techs.map(t=>t.name)},{k:'type',l:'Tipo'},{k:'date',l:'Data'},{k:'status',l:'Estado',t:'select',opts:['pending','progress','done']}];if(mod==='contracts')fields=[{k:'clientName',l:'Cliente'},{k:'plan',l:'Plano'},{k:'duration',l:'Duração (m)',t:'number'},{k:'startDate',l:'Início'},{k:'endDate',l:'Fim'},{k:'monthlyValue',l:'Valor Mensal',t:'number'},{k:'status',l:'Estado',t:'select',opts:['active','canceled']}];if(mod==='employees')fields=[{k:'name',l:'Nome'},{k:'role',l:'Cargo'},{k:'department',l:'Departamento'},{k:'salary',l:'Salário',t:'number'},{k:'contact',l:'Contacto'},{k:'startDate',l:'Data Admissão'},{k:'status',l:'Estado',t:'select',opts:['Activo','Inactivo']}];
var formHtml='<div class="form-row">';fields.forEach(f=>{var v=r[f.k]||'';formHtml+=`<div><label>${f.l}</label>`;if(f.t==='multiselect'){var selectedArr = v ? v.split(',').map(x=>x.trim()) : [];formHtml+=`<select id="cf_${f.k}" multiple style="height:80px">${f.opts.map(o=>`<option value="${o}" ${selectedArr.includes(o)?'selected':''}>${o}</option>`).join('')}</select><small style="color:var(--text-muted);font-size:.65rem">Ctrl+Click para selecionar vários</small>`;}else if(f.t==='select')formHtml+=`<select id="cf_${f.k}">${f.opts.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;else if(f.t==='number')formHtml+=`<input type="number" id="cf_${f.k}" value="${v}">`;else formHtml+=`<input type="text" id="cf_${f.k}" value="${v}">`;formHtml+=`</div>`;});formHtml+='</div>';modal('Registo',formHtml,async()=>{var obj={id:id||mod[0]+Date.now()};fields.forEach(f=>{var el=document.getElementById('cf_'+f.k);if(f.t==='multiselect'){var sel=[];for(var i=0;i<el.options.length;i++){if(el.options[i].selected)sel.push(el.options[i].value);}obj[f.k]=sel.join(', ');}else{obj[f.k]=f.t==='number'?parseFloat(el.value)||0:el.value;}});if(id)await DB.update(mod,id,obj);else await DB.insert(mod,obj);await logAction((id?'Editar':'Criar')+' '+mod, JSON.stringify(obj));showToast('Salvo!');closeModal();loadCRUD(mod);});}

async function loadClients(){var cl=await DB.get('clients'),cu=getCurrency();var html=`<div style="display:flex;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:10px"><h2>Clientes</h2><div style="display:flex;gap:10px"><input type="text" class="search-box" placeholder="🔍 Pesquisar cliente..." oninput="filterTable(this, 'tblClients')"><button class="btn btn-primary" onclick="openModalClient()">➕ Novo</button></div></div><div class="card"><table id="tblClients"><thead><tr><th>Nome</th><th>Contacto</th><th>Plano</th><th>GPS</th><th>Estado</th><th>Ações</th></tr></thead><tbody>`;cl.forEach(c=>{var ie=c.validade?(new Date(c.validade+'T00:00:00')<new Date()):false;var sc='bg-success',st='OK';if(c.divida>0){sc=ie?'bg-danger':'bg-partial';st=ie?'INADIMPLENTE':'DÍVIDA';}else if(ie){sc='bg-warning';st='EXPIRADO';}html+=`<tr><td><strong>${c.name}</strong><br><small>${c.nif||''}</small></td><td>${c.contact||'-'}</td><td><small>${c.pkg||'-'}</small></td><td>${c.gps?`<a href="https://maps.google.com/?q=${c.gps}" target="_blank" style="color:var(--primary);text-decoration:none">📍 Mapa</a>`:'-'}</td><td><span class="badge ${sc}">${st}</span></td><td style="white-space:nowrap"><button class="btn btn-info btn-sm" onclick="viewClientDocs('${c.id}')">📋 Docs</button> <button class="btn btn-warning btn-sm" onclick="openModalDocGen('${c.id}')">📄 Doc</button> <button class="btn btn-outline btn-sm" onclick="openModalClient('${c.id}')">✏️</button> <button class="btn btn-danger btn-sm" onclick="delCl('${c.id}')">🗑️</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function openModalClient(id){var cls=await DB.get('clients');var c=id?cls.find(x=>x.id===id):{name:'',contact:'',email:'',nif:'',address:'',gps:'',pkg:'',speedId:'',mens:0,validade:'',divida:0};var speeds=await DB.get('speeds');var so='<option value="">-- Sem --</option>'+speeds.map(s=>`<option value="${s.id}" ${c.speedId===s.id?'selected':''}>${s.nome} - ${fmt(s.preco)}</option>`).join('');modal('👤 Cliente',`<div class="form-row"><div><label>Nome *</label><input id="cName" value="${c.name}"></div><div><label>NIF / BI</label><input id="cNif" value="${c.nif||''}"></div></div><div class="form-row"><div><label>Contacto</label><input id="cContact" value="${c.contact||''}"></div><div><label>Email</label><input id="cEmail" value="${c.email||''}"></div></div><div class="form-row"><div><label>Morada</label><input id="cAddress" value="${c.address||''}"></div><div><label>Coordenadas GPS</label><input id="cGps" value="${c.gps||''}" placeholder="-8.8368, 13.2343"></div></div><div class="form-row"><div><label>Plano</label><select id="cSpeed">${so}</select></div><div><label>Valor</label><input id="cMens" value="${c.mens?fmt(c.mens):''}" readonly></div></div>`,async()=>{var name=val('cName');if(!name)return showToast('Nome!','danger');var speedId=val('cSpeed'),pkg='',mens=0,days=0;if(speedId){var sp=DB.cache.speeds.find(s=>s.id===speedId);if(sp){pkg=sp.nome+' ('+sp.period+')';mens=sp.preco;days=sp.days;}}var validade='';if(days>0)validade=fmtISO(addDays(new Date(),days));else if(id)validade=c.validade||'';var data={branchId:'b1',name:name,nif:val('cNif'),contact:val('cContact'),email:val('cEmail'),address:val('cAddress'),gps:val('cGps'),speedId:speedId||null,pkg:pkg,mens:mens,validade:validade,divida:c.divida||0,networkBlocked:c.networkBlocked||false};if(id)await DB.update('clients',id,data);else{data.id='c'+Date.now();await DB.insert('clients',data);}await logAction(id?'Editar Cliente':'Novo Cliente', name);showToast('Salvo!');closeModal();loadClients();});}

async function viewClientDocs(clientId){var client=(await DB.get('clients')).find(c=>c.id===clientId);var docs=(await DB.get('documents')).filter(d=>d.clientId===clientId).slice().reverse();var typeMap={'FR':'Fatura-Recibo','FT':'Fatura','FP':'Pró-forma','CT':'Contrato'};var html=`<div style="display:flex;justify-content:space-between;margin-bottom:15px"><h3>Docs de ${client.name} (Dívida: ${fmt(client.divida)})</h3><button class="btn btn-info btn-sm" onclick="closeModal();openModalDocGen('${clientId}')">➕ Nova Proforma</button></div>`;if(!docs.length){html+=`<p style="color:var(--text-muted);text-align:center;padding:20px">Nenhum documento.</p>`;}else{html+=`<table><thead><tr><th>Data</th><th>Doc</th><th>Total</th><th>Pago</th><th>Estado</th><th>Ações</th></tr></thead><tbody>`;docs.forEach(d=>{var isOverdue = d.dueDate && new Date(d.dueDate+'T00:00:00')<new Date() && d.status!=='paid';var sc=d.status==='paid'?'bg-success':d.status==='partial'?'bg-partial':isOverdue?'bg-danger':'bg-warning';var stText=d.status==='paid'?'PAGO':d.status==='partial'?'PARCIAL':isOverdue?'VENCIDO':'PENDENTE';html+=`<tr><td>${d.date}</td><td style="font-family:monospace">${d.docId}</td><td style="font-weight:bold">${fmt(d.total)}</td><td>${fmt(d.paidVal||0)}</td><td><span class="badge ${sc}">${stText}</span></td><td>${d.status!=='paid'?`<button class="btn btn-success btn-sm" onclick="payDocument('${d.id}')">💳 Pagar</button>`:''} <button class="btn btn-info btn-sm" onclick="closeModal();viewDoc('${d.id}')">🖨️</button></td></tr>`;});html+=`</tbody></table>`;}modal('📋 Documentos',html);}

async function payDocument(docId){var docs=await DB.get('documents');var d=docs.find(x=>x.id===docId);var client=(await DB.get('clients')).find(c=>c.id===d.clientId);var remaining = d.total - (d.paidVal||0);modal('💳 Cobrar Fatura',`<p>Doc: <strong>${d.docId}</strong></p><p>Resta: <span class="text-danger">${fmt(remaining)} ${d.currency}</span></p><div class="form-row"><div><label>Valor a Pagar</label><input type="number" id="payDocVal" value="${remaining}"></div><div><label>Método</label><select id="payDocMet"><option>Dinheiro</option><option>TPA / Multicaixa</option><option>Transferência</option></select></div></div>`,async()=>{var v=parseFloat(val('payDocVal'));if(!v||v>remaining)return showToast('Valor inválido!','danger');var newPaidVal=(d.paidVal||0)+v;var newStatus = newPaidVal >= d.total ? 'paid' : 'partial';await DB.update('documents',docId,{paidVal:newPaidVal, status:newStatus});await DB.update('clients',d.clientId,{divida:client.divida-v});await DB.insert('transactions',{id:'t'+Date.now(),type:'income',val:v,date:getTodayStr(),desc:'Pagamento '+d.docId,status:'paid',met:val('payDocMet')});await logAction('Pagamento Doc', d.docId+' - '+fmt(v));showToast('Pagamento Registado!');closeModal();viewClientDocs(d.clientId);},'Pagar','btn-success');}

async function openModalDocGen(preselectedClientId){ 
    tempDocItems = []; 
    var cls=await DB.get('clients'), speeds=await DB.get('speeds'), inv=await DB.get('inventory'), cfg=DB.cache.settings; 
    var co=cls.map(c=>`<option value="${c.id}" ${preselectedClientId===c.id?'selected':''}>${c.name}</option>`).join(''); 
    var invOpts = '<option value="">-- Selecione --</option>' + inv.map(i=>`<option value="${i.id}|${i.name}|${i.val}">${i.name} (${i.qty} em stock)</option>`).join('');
    modal('📄 Documento',`
    <div class="form-row">
        <div><label>Cliente *</label><select id="docClient" ${preselectedClientId?'disabled':''}>${co}</select></div>
        <div><label>Tipo</label><select id="docType"><option value="FR">Fatura-Recibo</option><option value="FT">Fatura</option><option value="FP" ${preselectedClientId?'selected':''}>Pró-forma</option><option value="CT">Contrato</option></select></div>
    </div>
    <div class="form-row">
        <div><label>Método</label><select id="docMet"><option>Dinheiro</option><option>TPA / Multicaixa</option><option>Transferência</option></select></div>
        <div><label>Data Vencimento</label><input type="date" id="docDueDate" value="${fmtISO(addDays(new Date(), 30))}"></div>
    </div>
    <hr style="border-color:rgba(255,255,255,.1);margin:10px 0">
    <h4 style="margin-bottom:10px">Itens do Documento</h4>
    <div class="form-row">
        <div style="flex:2"><label>Item de Stock</label><select id="itemStock" onchange="autoFillItem()">${invOpts}</select></div>
        <div style="flex:3"><label>Descrição</label><input id="itemDesc" placeholder="Ex: Instalação"></div>
        <div style="flex:1"><label>Qtd</label><input type="number" id="itemQty" value="1" min="1"></div>
        <div style="flex:2"><label>Preço</label><input type="number" id="itemPrice" value="0"></div>
        <div style="flex:0.5;display:flex;align-items:flex-end"><button class="btn btn-success" onclick="addDocItem()">➕</button></div>
    </div>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:10px"><table><thead><tr><th>Desc</th><th>Qtd</th><th>Preço</th><th>Total</th><th></th></tr></thead><tbody id="docItemsTable"></tbody></table></div>
    <div style="text-align:right;font-size:1.2rem;font-family:Orbitron">Total: <span id="docTotalPreview">0.00</span> ${getCurrency()}</div>
    `,async()=>{
        var cId=preselectedClientId||val('docClient'), type=val('docType'); var client=cls.find(x=>x.id===cId); if(!client) return showToast('Cliente!','danger'); if(tempDocItems.length===0) return showToast('Adicione 1 item!','danger'); 
        var sub = tempDocItems.reduce((a,b)=>a+b.total,0); var tr=(cfg.taxRate||0)/100, tax=sub*tr, total=sub+tax; cfg.docSeq=(cfg.docSeq||0)+1; var docId=type+new Date().getFullYear()+'/'+String(cfg.docSeq).padStart(4,'0'); var isPaid=(type==='FR'); var docDbId = 'd'+Date.now(); var dueD = val('docDueDate');
        
        // Deduzir Stock
        for(let item of tempDocItems){
            if(item.invId){
                var prod = DB.cache.inventory.find(p=>p.id===item.invId);
                if(prod && prod.qty >= item.qty){
                    await DB.update('inventory', item.invId, {qty: prod.qty - item.qty});
                } else if(prod) {
                    showToast('Stock insuficiente de '+item.desc, 'danger'); return;
                }
            }
        }

        if(type!=='FP'&&type!=='CT'){ if(type==='FT') await DB.update('clients',cId,{divida:(client.divida||0)+total}); await DB.insert('transactions',{id:'t'+Date.now(),docId:docId,docType:type,type:'income',val:total,date:getTodayStr(),dueDate:dueD,desc:type+' '+client.name,status:isPaid?'paid':'pending',met:val('docMet')}); } 
        await DB.update('settings',1,{docSeq:cfg.docSeq}); await DB.insert('documents',{id:docDbId,docId:docId,docType:type,clientId:cId,clientName:client.name,clientNif:client.nif||'',clientAddress:client.address||'',clientContact:client.contact||'',clientEmail:client.email||'',date:getTodayStr(),dueDate:dueD,items:tempDocItems,subtotal:sub,tax:tax,total:total,paidVal:isPaid?total:0,status:isPaid?'paid':'pending',met:(type==='FP'||type==='CT')?'N/A':val('docMet'),currency:getCurrency()}); await logAction('Emitir Documento', docId); autoSendWhatsApp(docDbId, docId, client, total, getCurrency()); showToast('Emitido '+docId+'!'); closeModal(); loadCommercial(); },'Emitir','btn-success'); 
}

function autoFillItem(){ var s=val('itemStock'); if(s){ var p=s.split('|'); document.getElementById('itemDesc').value=p[1]; document.getElementById('itemPrice').value=p[2]; }}
function addDocItem(){ var s=val('itemStock'); var invId = s?s.split('|')[0]:''; var desc=val('itemDesc'), qty=parseInt(val('itemQty'))||1, price=parseFloat(val('itemPrice'))||0; if(!desc) return; tempDocItems.push({invId:invId,desc:desc,qty:qty,price:price,total:qty*price}); document.getElementById('itemDesc').value=''; document.getElementById('itemPrice').value='0'; document.getElementById('itemStock').value=''; renderDocItemsTable(); }

function getDocTemplate(d, cfg){ var typeMap={'FR':'Fatura-Recibo','FT':'Fatura','FP':'Pró-forma','CT':'Contrato'}; var isPaid = d.status==='paid'; var itemsRows = ''; if(d.items && d.items.length > 0){ d.items.forEach(item => { itemsRows += `<tr><td>${item.desc}</td><td style="text-align:center">${item.qty}</td><td style="text-align:right">${fmt(item.price)} ${d.currency}</td><td style="text-align:right">${fmt(item.total)} ${d.currency}</td></tr>`; }); } else { itemsRows = `<tr><td>Serviço</td><td>1</td><td>${fmt(d.subtotal)} ${d.currency}</td><td>${fmt(d.subtotal)} ${d.currency}</td></tr>`; } return `<div class="invoice-container" id="docContentPrint"><div class="invoice-header"><div style="display:flex;align-items:center;gap:15px"><img src="${LOGO}" class="invoice-logo"><div><h2 style="margin:0;font-size:16px">${cfg.name}</h2><p style="margin:2px 0;font-size:10px">NIF: ${cfg.nif}</p></div></div><div style="text-align:right"><div class="invoice-title">${typeMap[d.docType]}</div><p style="font-size:12px;font-weight:bold">${d.docId}</p><p>Data: ${d.date}</p></div></div><div style="display:flex;gap:20px;margin-bottom:15px"><div class="invoice-box" style="flex:1"><strong>Cliente:</strong><br>${d.clientName}<br>NIF: ${d.clientNif||'---'}<br>${d.clientAddress||''}</div><div class="invoice-box" style="flex:1;text-align:right"><strong>Met:</strong><br>${d.met||'N/A'}<br><strong>Venc:</strong> ${d.dueDate?fmtPT(d.dueDate):'N/A'}<br><strong>Estado:</strong> ${isPaid?'PAGO':d.status==='partial'?'PARCIAL':'PENDENTE'}</div></div><table class="invoice-table"><thead><tr><th>Desc</th><th style="text-align:center">Qtd</th><th style="text-align:right">Preço</th><th style="text-align:right">Total</th></tr></thead><tbody>${itemsRows}</tbody></table><div style="display:flex;justify-content:flex-end"><div style="width:250px"><div style="display:flex;justify-content:space-between;padding:4px 0"><span>Subtotal:</span><span>${fmt(d.subtotal)} ${d.currency}</span></div><div style="display:flex;justify-content:space-between;padding:4px 0"><span>IVA:</span><span>${fmt(d.tax)} ${d.currency}</span></div><div class="invoice-total" style="border-top:2px solid #000;margin-top:5px;padding-top:5px;display:flex;justify-content:space-between"><span>TOTAL:</span><span>${fmt(d.total)} ${d.currency}</span></div></div></div>${isPaid?`<img src="${STAMP}" class="invoice-stamp">`:''}<div style="margin-top:20px;text-align:center"><canvas id="qrCanvas" style="display:none"></canvas><img id="qrImg" style="width:80px;height:80px;display:none"></div><div class="invoice-footer">Processado por Conex Cass ERP</div></div>`; }
function getThermalTemplate(d, cfg){ var itemsRows = ''; if(d.items && d.items.length > 0){ d.items.forEach(item => { itemsRows += `<tr><td>${item.desc}</td><td>${item.qty}x</td><td>${fmt(item.total)}</td></tr>`; }); } return `<div style="font-family:'Courier New',monospace;font-size:12px;width:280px;margin:auto;padding:10px"><div style="text-align:center;border-bottom:1px dashed #000;padding-bottom:5px"><h3 style="margin:0">${cfg.name}</h3><p style="margin:0;font-size:10px">NIF: ${cfg.nif}</p></div><div style="border-bottom:1px dashed #000;padding:5px 0"><p>${d.docId} | ${d.date}</p><p><strong>Cliente:</strong> ${d.clientName}</p></div><table style="width:100%;border-collapse:collapse;margin:5px 0">${itemsRows}</table><div style="border-top:1px dashed #000;text-align:right;padding:5px 0"><p>SUBT: ${fmt(d.subtotal)} ${d.currency}</p><p>IVA: ${fmt(d.tax)} ${d.currency}</p><h3>TOTAL: ${fmt(d.total)} ${d.currency}</h3></div><div style="text-align:center;font-size:10px;margin-top:10px">Obrigado pela preferência!</div></div>`; }

async function viewDoc(id){var docs=await DB.get('documents');var d=docs.find(x=>x.id===id);if(!d)return;var cfg=DB.cache.settings;document.getElementById('docTitle').innerText=d.docId;document.getElementById('docBody').innerHTML=getDocTemplate(d,cfg);document.getElementById('modalDocFooter').innerHTML=`<button class="btn btn-primary" onclick="printDocPDF('${id}')">📄 PDF A4</button><button class="btn btn-warning" onclick="printDocThermal('${id}')">🧾 POS 80mm</button><button class="btn btn-success" onclick="shareWhatsApp('${id}')">📱 WhatsApp</button><button class="btn btn-outline" onclick="closeModalDoc()">Fechar</button>`;document.getElementById('modalDoc').classList.add('show');generateQR(d.docId);}
async function generateQR(text){try{var c=document.getElementById('qrCanvas');if(!c)return;await QRCode.toCanvas(c,text,{width:80});var img=document.getElementById('qrImg');img.src=c.toDataURL();img.style.display='inline-block';c.style.display='none';}catch(e){}}
async function printDocPDF(id){var docs=await DB.get('documents');var d=docs.find(x=>x.id===id);if(!d)return;var cfg=DB.cache.settings;var tempDiv=document.createElement('div');tempDiv.innerHTML=getDocTemplate(d,cfg);tempDiv.style.position='absolute';tempDiv.style.left='-9999px';document.body.appendChild(tempDiv);try{await generateQR(d.docId);var imgEl=tempDiv.querySelector('#qrImg');var canvasEl=tempDiv.querySelector('#qrCanvas');if(imgEl&&canvasEl){imgEl.src=canvasEl.toDataURL();imgEl.style.display='inline-block';canvasEl.style.display='none';}}catch(e){}await html2pdf().from(tempDiv.querySelector('.invoice-container')).set({margin:[5,5,5,5],filename:d.docId.replace(/\//g,'_')+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).save();document.body.removeChild(tempDiv);showToast('PDF Gerado!','info');}
function printDocThermal(id){var docs=DB.cache.documents;var d=docs.find(x=>x.id===id);if(!d)return;var cfg=DB.cache.settings;var printWindow=window.open('','_blank','width=320,height=600');printWindow.document.write('<html><head><title>Recibo</title></head><body>'+getThermalTemplate(d,cfg)+'</body></html>');printWindow.document.close();printWindow.focus();printWindow.print();}
async function shareWhatsApp(id){var docs=await DB.get('documents');var d=docs.find(x=>x.id===id);if(!d)return;var phone=(d.clientContact||'').replace(/\s/g,'').replace('+','');if(!phone.startsWith('244'))phone='244'+phone.replace(/^0/,'');var msg=`Olá ${d.clientName}!%0ADocumento *${d.docId}*%0AValor: *${fmt(d.total)} ${d.currency}*%0AObrigado!`;window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${msg}`,'_blank');}

async function autoSendWhatsApp(docId, docIdStr, client, total, currency){ var cfg = DB.cache.settings; if(!cfg.whatsapp_api || !cfg.whatsapp_key || !client.contact) return; var phone = client.contact.replace(/\s/g,'').replace('+',''); if(!phone.startsWith('244')) phone = '244'+phone.replace(/^0/,''); var msg = `Olá ${client.name}! Novo documento da *${cfg.name}*: *${docIdStr}*\nValor: *${fmt(total)} ${currency}*\nObrigado!`; try { await fetch(`${cfg.whatsapp_api}/message/sendText/${cfg.whatsapp_key}`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': cfg.whatsapp_key }, body: JSON.stringify({ number: phone, text: msg }) }); await logAction('Auto WhatsApp', 'Doc: '+docIdStr); } catch(e) { console.error(e); } }
function openClientPortal(){ modal('🌐 Portal do Cliente',`<p>Introduza o seu NIF ou Contacto.</p><div class="form-row"><div><label>NIF / Telefone</label><input id="portalNif"></div></div>`, async ()=>{ var search = val('portalNif'); var clients = await DB.get('clients'); var client = clients.find(c => c.nif === search || c.contact === search); if(!client) return showToast('Cliente não encontrado!','danger'); var docs = (await DB.get('documents')).filter(d => d.clientId === client.id).slice().reverse(); var html = `<h3>${client.name}</h3><p>Dívida: <span class="badge ${client.divida>0?'bg-danger':'bg-success'}">${client.divida>0?'SIM':'NÃO'}</span></p><hr><table><thead><tr><th>Data</th><th>Doc</th><th>Valor</th><th>Estado</th></tr></thead><tbody>`; docs.forEach(d => { html += `<tr><td>${d.date}</td><td>${d.docId}</td><td>${fmt(d.total)}</td><td><span class="badge ${d.status==='paid'?'bg-success':'bg-warning'}">${d.status==='paid'?'PAGO':'PEND.'}</span></td></tr>`; }); html += `</tbody></table>`; document.getElementById('modalBody').innerHTML = html; document.getElementById('modalFooter').innerHTML = '<button class="btn btn-outline" onclick="closeModal()">Fechar</button>'; }, 'Procurar', 'btn-primary'); }

async function openModalSup(id){var su=await DB.get('suppliers');var s=id?su.find(x=>x.id===id):{name:'',nif:'',contact:'',debt:0};modal('Fornecedor',`<div class="form-row"><div><label>Nome *</label><input id="sName" value="${s.name}"></div><div><label>NIF</label><input id="sNif" value="${s.nif||''}"></div></div><div><label>Contacto</label><input id="sContact" value="${s.contact||''}"></div>`,async()=>{var nm=val('sName');if(!nm)return showToast('Nome!','danger');var data={name:nm,nif:val('sNif'),contact:val('sContact'),debt:s.debt||0};if(id)await DB.update('suppliers',id,data);else{data.id='s'+Date.now();await DB.insert('suppliers',data);}await logAction(id?'Editar':'Novo'+' Fornecedor', nm);showToast('Salvo!');closeModal();loadSuppliers();});}
async function addBill(sId){var su=await DB.get('suppliers');var s=su.find(x=>x.id===sId);modal('Despesa',`<p>Forn: <strong>${s.name}</strong></p><div class="form-row"><div><label>Valor</label><input type="number" id="billVal"></div><div><label>Desc</label><input id="billDesc"></div></div>`,async()=>{var v=parseFloat(val('billVal'));if(!v)return;await DB.update('suppliers',sId,{debt:(s.debt||0)+v});await DB.insert('transactions',{id:'t'+Date.now(),type:'expense',val:v,date:getTodayStr(),desc:val('billDesc')||'Despesa',status:'unpaid'});await logAction('Despesa', s.name+' - '+fmt(v));showToast('Registado!');closeModal();loadSuppliers();});}
async function paySup(sId){var su=await DB.get('suppliers');var s=su.find(x=>x.id===sId);modal('Pagar',`<p>Forn: <strong>${s.name}</strong> | Dívida: ${fmt(s.debt)}</p><div class="form-row"><div><label>Valor</label><input type="number" id="paySVal"></div><div><label>Método</label><select id="paySupMet"><option>Dinheiro</option><option>TPA / Multicaixa</option><option>Transferência</option></select></div></div>`,async()=>{var v=parseFloat(val('paySVal'));if(!v||v>s.debt)return showToast('Inválido!','danger');await DB.update('suppliers',sId,{debt:s.debt-v});await DB.insert('transactions',{id:'t'+Date.now(),type:'expense_payment',val:v,date:getTodayStr(),desc:'Pagamento '+s.name,status:'paid',met:val('paySupMet')});await logAction('Pagamento Fornecedor', s.name);showToast('Pago!');closeModal();loadSuppliers();},'Pagar','btn-success');}

async function loadStock(){var inv=await DB.get('inventory'),cu=getCurrency();var html=`<div style="display:flex;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:10px"><h2>Produtos</h2><div style="display:flex;gap:10px"><input type="text" class="search-box" placeholder="🔍 Pesquisar produto..." oninput="filterTable(this, 'tblStock')"><button class="btn btn-primary" onclick="openModalItem()">➕ Novo</button></div></div><div class="card"><table id="tblStock"><thead><tr><th>Produto</th><th>Cat</th><th>Preço</th><th>Qtd</th><th>Ações</th></tr></thead><tbody>`;inv.forEach(i=>{html+=`<tr><td>${i.name}</td><td>${i.cat||'-'}</td><td>${fmt(i.val)} ${cu}</td><td><span class="badge ${i.qty>5?'bg-success':i.qty>0?'bg-warning':'bg-danger'}">${i.qty}</span></td><td><button class="btn btn-outline btn-sm" onclick="openModalItem('${i.id}')">✏️</button> <button class="btn btn-danger btn-sm" onclick="delIt('${i.id}')">🗑️</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function openModalItem(id){var inv=await DB.get('inventory');var it=id?inv.find(x=>x.id===id):{name:'',val:0,qty:0,cat:''};modal('Produto',`<div class="form-row"><div><label>Nome *</label><input id="iName" value="${it.name}"></div><div><label>Cat</label><input id="iCat" value="${it.cat||''}"></div></div><div class="form-row"><div><label>Preço</label><input type="number" id="iVal" value="${it.val}"></div><div><label>Qtd</label><input type="number" id="iQty" value="${it.qty}"></div></div>`,async()=>{var data={name:val('iName'),cat:val('iCat'),val:parseFloat(val('iVal'))||0,qty:parseInt(val('iQty'))||0,branchId:'b1'};if(id)await DB.update('inventory',id,data);else{data.id='i'+Date.now();await DB.insert('inventory',data);}await logAction(id?'Editar':'Novo'+' Produto', data.name);showToast('Salvo!');closeModal();loadStock();});}

async function loadPlans(){var sp=await DB.get('speeds'),pl=await DB.get('plans'),cu=getCurrency();var html=`<h2>Planos de Internet</h2><div class="card"><h3>Velocidades</h3><div class="form-row"><div><label>Período</label><select id="nSP"><option>Semanal</option><option>Quinzenal</option><option>Mensal</option></select></div><div><label>Nome</label><input id="nSN" placeholder="5 MB"></div><div><label>Preço</label><input type="number" id="nSPr"></div><div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addSp()">➕</button></div></div><table><thead><tr><th>Nome</th><th>Período</th><th>Preço</th><th>Ações</th></tr></thead><tbody>`;sp.forEach(s=>{html+=`<tr><td>${s.nome}</td><td>${s.period}</td><td>${fmt(s.preco)} ${cu}</td><td><button class="btn btn-danger btn-sm" onclick="delSp('${s.id}')">🗑️</button></td></tr>`;});html+=`</tbody></table></div><div class="card"><h3>Streaming</h3><div class="form-row"><div><label>Nome</label><input id="nPN" placeholder="NETFLIX"></div><div><label>Preço</label><input type="number" id="nPP"></div><div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addPl()">➕</button></div></div><table><thead><tr><th>Serviço</th><th>Preço</th><th>Ações</th></tr></thead><tbody>`;pl.forEach(p=>{html+=`<tr><td>${p.nome}</td><td>${fmt(p.preco)} ${cu}</td><td><button class="btn btn-danger btn-sm" onclick="delPl('${p.id}')">🗑️</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function addSp(){var p=val('nSP'),n=val('nSN'),pr=parseFloat(val('nSPr'));if(!n||!pr)return;var dm={Semanal:7,Quinzenal:15,Mensal:30};await DB.insert('speeds',{id:'s'+Date.now(),nome:n,preco:pr,period:p,days:dm[p]||30});showToast('Criado!');loadPlans();}
async function delSp(id){if(!confirm('Eliminar?'))return;await DB.del('speeds',id);loadPlans();}
async function addPl(){var n=val('nPN'),pr=parseFloat(val('nPP'));if(!n||!pr)return;await DB.insert('plans',{id:'p'+Date.now(),nome:n,preco:pr});showToast('Criado!');loadPlans();}
async function delPl(id){if(!confirm('Eliminar?'))return;await DB.del('plans',id);loadPlans();}

async function loadNetwork(){var cl=await DB.get('clients');var html=`<div style="display:flex;justify-content:space-between;margin-bottom:15px"><h2>Rede / IPs</h2><button class="btn btn-info" onclick="openModalIP()">➕ IP</button></div><div class="card"><h3>Clientes na Rede</h3><table><thead><tr><th>Nome</th><th>IP</th><th>Net</th><th>Ação</th></tr></thead><tbody>`;cl.filter(c=>c.ip||c.mac).forEach(c=>{html+=`<tr><td>${c.name}</td><td style="font-family:monospace;color:var(--primary)">${c.ip||'-'}</td><td><span class="badge ${c.networkBlocked?'bg-danger':'bg-success'}">${c.networkBlocked?'BLOQ':'ON'}</span></td><td><button class="btn btn-${c.networkBlocked?'success':'danger'} btn-sm" onclick="togNet('${c.id}',${!c.networkBlocked})">${c.networkBlocked?'✅':'🚫'}</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function openModalIP(){modal('Adicionar IP','<div><label>Endereço IP *</label><input id="newIp" placeholder="192.168.1.10"></div>',async()=>{var ip=val('newIp');if(!ip)return;await DB.insert('ip_pool',{id:'ip'+Date.now(),ip:ip,status:'available'});showToast('Adicionado!');closeModal();loadNetwork();});}
async function togNet(id,block){var cl=(await DB.get('clients')).find(c=>c.id===id);if(cl)await DB.update('clients',id,{networkBlocked:block});await logAction('Rede', block?'Bloq':'Lib');showToast(block?'Bloqueado':'Liberado!');loadNetwork();}

// ==================== RENOVAÇÕES ====================
async function loadRenewals(){var cl=(await DB.get('clients')).filter(c=>c.speedId&&c.validade),hoje=new Date();var html=`<h2>Renovações</h2><div class="card"><table><thead><tr><th>Cliente</th><th>Plano</th><th>Validade</th><th>Dias</th><th>Ação</th></tr></thead><tbody>`;cl.sort((a,b)=>new Date(a.validade)-new Date(b.validade)).forEach(c=>{var d=daysDiff(hoje,new Date(c.validade+'T00:00:00'));var sc=d<0?'bg-danger':d<=3?'bg-warning':'bg-success';html+=`<tr><td>${c.name}</td><td>${c.pkg||'-'}</td><td>${fmtPT(c.validade)}</td><td><span class="badge ${sc}">${d<0?'EXPIRADO '+Math.abs(d)+'d':d+'d'}</span></td><td><button class="btn btn-success btn-sm" onclick="renewCl('${c.id}')">🔄</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function renewCl(id){var cl=(await DB.get('clients')).find(c=>c.id===id);if(!cl||!cl.speedId)return;var sp=DB.cache.speeds.find(s=>s.id===cl.speedId);if(sp){await DB.update('clients',id,{validade:fmtISO(addDays(new Date(),sp.days))});await logAction('Renovação', cl.name);showToast('Renovado!');loadRenewals();}}

// ==================== CAIXA ====================
async function loadCash(){var allCash=await DB.get('cash_register');var t=await DB.get('transactions');var todayCash = Array.isArray(allCash) ? allCash.find(c => c.date === getTodayStr()) : (allCash.date === getTodayStr() ? allCash : null);var isOpen = todayCash && !todayCash.closed_at;var moves = t.filter(x => x.date === getTodayStr());var totalIncome = moves.filter(x=>x.type==='income').reduce((a,b)=>a+b.val,0);var totalExpense = moves.filter(x=>x.type==='expense_payment'||x.type==='expense').reduce((a,b)=>a+b.val,0);var html = `<h2>Caixa Diário</h2>`;if(isOpen){html += `<div class="card" style="border-left:3px solid var(--success)"><h3 style="color:var(--success)">💰 CAIXA ABERTA</h3><div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-danger" onclick="closeCash('${todayCash.id}')">🔒 Fechar Caixa</button><button class="btn btn-warning" onclick="internalMove('Sangria')">💸 Sangria</button><button class="btn btn-info" onclick="internalMove('Reforço')">➕ Reforço</button></div></div>`;}else{html += `<div class="card"><div class="form-row" style="max-width:400px"><div><label>Valor Abertura</label><input type="number" id="cashOpen" placeholder="0"></div><div style="display:flex;align-items:flex-end"><button class="btn btn-success" onclick="openCash()">🔓 Abrir Caixa</button></div></div></div>`;}html += `<div class="card"><h3>Resumo</h3><div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px"><div style="background:rgba(0,255,136,.1);padding:10px;border-radius:4px;text-align:center"><div style="font-size:.8rem;color:var(--text-muted)">Entradas</div><div style="color:var(--success);font-weight:bold">${fmt(totalIncome)}</div></div><div style="background:rgba(255,0,110,.1);padding:10px;border-radius:4px;text-align:center"><div style="font-size:.8rem;color:var(--text-muted)">Saídas</div><div style="color:var(--danger);font-weight:bold">${fmt(totalExpense)}</div></div><div style="background:rgba(0,180,216,.1);padding:10px;border-radius:4px;text-align:center"><div style="font-size:.8rem;color:var(--text-muted)">Saldo</div><div style="color:var(--primary);font-weight:bold">${fmt((todayCash?todayCash.openingValue:0)+totalIncome-totalExpense)}</div></div></div></div>`;html += `<div class="card"><h3>Movimentos de Hoje</h3><table><thead><tr><th>Desc</th><th>Valor</th><th>Met</th></tr></thead><tbody>`;moves.forEach(m=>{html+=`<tr><td>${m.desc}</td><td class="${m.type==='income'?'text-success':'text-danger'}">${m.type==='income'?'+':'-'}${fmt(m.val)}</td><td>${m.met||'-'}</td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function openCash(){var v=parseFloat(val('cashOpen'))||0;await DB.insert('cash_register',{id:'cash_'+Date.now(),date:getTodayStr(),openingValue:v,opened_by:currentUser.name,closed_at:null,closed_by:null});await logAction('Abertura Caixa', fmt(v));showToast('Aberto!');loadCash();}
async function closeCash(cashId){if(!confirm('Fechar caixa?'))return;await DB.update('cash_register',cashId,{closed_at:new Date().toLocaleString('pt-AO'),closed_by:currentUser.name});await logAction('Fecho Caixa','');showToast('Fechado!','info');loadCash();}
async function internalMove(type){modal(type,`<p>Registar ${type}</p><div class="form-row"><div><label>Valor</label><input type="number" id="moveVal"></div><div><label>Motivo</label><input id="moveDesc"></div></div>`,async()=>{var v=parseFloat(val('moveVal'));if(!v)return;var tType = type==='Sangria'?'expense':'income';await DB.insert('transactions',{id:'t'+Date.now(),type:tType,val:v,date:getTodayStr(),desc:type+': '+(val('moveDesc')||''),status:'paid',met:'Caixa'});await logAction(type, fmt(v));showToast('Registado!');closeModal();loadCash();},'Confirmar','btn-warning');}

// ==================== RELATÓRIOS ====================
async function loadReports(){var t=await DB.get('transactions'), cu=getCurrency(); var inc=t.filter(x=>x.type==='income').reduce((a,b)=>a+b.val,0); var exp=t.filter(x=>x.type==='expense_payment'||x.type==='expense').reduce((a,b)=>a+b.val,0); document.getElementById('appContent').innerHTML=`<h2>Relatórios</h2><div class="card"><div class="grid" style="grid-template-columns:1fr 1fr;gap:15px"><div style="text-align:center;padding:15px;background:rgba(0,255,136,.1);border-radius:8px"><div style="color:var(--text-muted)">Receitas</div><div style="font-size:1.2rem;color:var(--success);font-family:Orbitron">${fmt(inc)} ${cu}</div></div><div style="text-align:center;padding:15px;background:rgba(255,0,110,.1);border-radius:8px"><div style="color:var(--text-muted)">Despesas</div><div style="font-size:1.2rem;color:var(--danger);font-family:Orbitron">${fmt(exp)} ${cu}</div></div></div><div style="text-align:center;margin-top:15px;padding:15px;background:rgba(0,180,216,.1);border-radius:8px"><div style="color:var(--text-muted)">Lucro Líquido</div><div style="font-size:2rem;color:${inc-exp>=0?'var(--success)':'var(--danger)'};font-family:Orbitron">${fmt(inc-exp)} ${cu}</div></div></div>`;}
async function loadAudit(){var logs=(await DB.get('audit_logs')).slice().reverse();document.getElementById('appContent').innerHTML=`<h2>Auditoria</h2><div class="card"><table><thead><tr><th>Data</th><th>Utilizador</th><th>Acção</th><th>Detalhes</th></tr></thead><tbody>`+logs.map(l=>`<tr><td>${l.date||'-'}</td><td>${l.user||'-'}</td><td>${l.action||'-'}</td><td style="font-size:.75rem;color:var(--text-muted)">${l.detail||'-'}</td></tr>`).join('')+`</tbody></table></div>`;}

// ==================== CONFIGURAÇÕES ====================
async function loadConfig(){var s=DB.cache.settings;var html=`<h2>Configurações</h2><div class="card"><h3>Empresa</h3><div class="form-row"><div><label>Nome</label><input id="cfgN" value="${s.name||''}"></div><div><label>NIF</label><input id="cfgNif" value="${s.nif||''}"></div><div><label>% IVA</label><input type="number" id="cfgTx" value="${s.taxRate||14}"></div><div><label>Moeda</label><select id="cfgCu"><option value="AKZ" ${s.currency==='AKZ'?'selected':''}>AKZ</option><option value="USD" ${s.currency==='USD'?'selected':''}>USD</option></select></div></div><div class="form-row"><div><label>URL API WhatsApp</label><input id="cfgWA" value="${s.whatsapp_api||''}"></div><div><label>Chave API</label><input id="cfgWK" value="${s.whatsapp_key||''}"></div></div><button class="btn btn-primary" onclick="saveCfg()">💾 Salvar</button></div><div class="card"><h3>Utilizadores (RBAC)</h3><table><thead><tr><th>Nome</th><th>User</th><th>Função</th><th>Ação</th></tr></thead><tbody>`;var users=await DB.get('users');users.forEach(u=>{html+=`<tr><td>${u.name}</td><td>${u.user}</td><td><span class="badge ${u.role==='admin'?'bg-danger':'bg-info'}">${u.role}</span></td><td><button class="btn btn-warning btn-sm" onclick="changeRole('${u.id}','${u.role}')">🔄 Role</button></td></tr>`;});html+=`</tbody></table></div><div class="card"><h3>Backup</h3><div style="display:flex;gap:10px"><button class="btn btn-info" onclick="exportDB()">📤 Exportar</button><button class="btn btn-success" onclick="document.getElementById('importFileInput').click()">📥 Importar</button></div></div>`;document.getElementById('appContent').innerHTML=html;}
async function saveCfg(){var s=DB.cache.settings;s.name=val('cfgN');s.nif=val('cfgNif');s.taxRate=parseFloat(val('cfgTx'))||14;s.currency=val('cfgCu');s.whatsapp_api=val('cfgWA');s.whatsapp_key=val('cfgWK');await DB.update('settings',1,s);await logAction('Config','Atualizada');showToast('Salvo!');}
async function changeRole(userId, currentRole){var newRole = currentRole==='admin'?'manager':'admin';if(!confirm(`Alterar para ${newRole}?`))return;await DB.update('users',userId,{role:newRole});await logAction('Role', newRole);showToast('Alterado!');loadConfig();}
async function exportDB(){var d={};for(var k in DB.cache)d[k]=DB.cache[k];var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='backup_'+todayISO()+'.json';a.click();showToast('Exportado!','info');}
async function importDB(event){var file=event.target.files[0];if(!file)return;if(!confirm('Substituir dados?')){event.target.value='';return;}var reader=new FileReader();reader.onload=async function(e){try{var data=JSON.parse(e.target.result);showToast('Restaurando...','info');for(var table in data){if(table==='settings'){var row=data[table];if(row.id){await DB.upsert(table,row);DB.cache[table]=row;}}else if(table==='cash_register'){var rows=Array.isArray(data[table])?data[table]:[data[table]];for(var i=0;i<rows.length;i++){if(rows[i].id) await DB.upsert(table,rows[i]);}DB.cache[table]=data[table];}else if(Array.isArray(data[table])){for(var i=0;i<data[table].length;i++){var row=data[table][i];await DB.upsert(table,row);}DB.cache[table]=data[table];}}await logAction('Import','Backup');showToast('Sucesso!');location.reload();}catch(err){showToast('Erro: '+err.message,'danger');}};reader.readAsText(file);event.target.value='';}

init();
</script>
