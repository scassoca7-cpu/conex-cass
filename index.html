<script>
/* ==================== CONFIGURAÇÃO ==================== */
var SUPABASE_URL='https://ceuwezkigyvengweojlj.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNldXdlemtpZ3l2ZW5nd2VvamxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzQxNzcsImV4cCI6MjA5NDg1MDE3N30.zBe0Gq56AVTMkcnqBxT2SdzPXh2RsNed43oKZYOWi40';
var sb;try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){console.error("Erro Supabase:",e);}

/* ==================== HELPERS ==================== */
function showSpinner(msg){var o=document.getElementById('spinnerOverlay');o.querySelector('p').textContent=msg||'A carregar...';o.classList.remove('hidden');}
function hideSpinner(){document.getElementById('spinnerOverlay').classList.add('hidden');}
var _confirmResolver=null;
function showConfirm(title,msg,okText,okClass){return new Promise(function(resolve){_confirmResolver=resolve;document.getElementById('confirmTitle').innerText=title||'Confirmar';document.getElementById('confirmMsg').innerText=msg||'Tem certeza?';var btn=document.getElementById('confirmOkBtn');btn.innerText=okText||'Confirmar';btn.className='btn '+(okClass||'btn-danger');document.getElementById('confirmOverlay').style.display='flex';});}
function resolveConfirm(val){document.getElementById('confirmOverlay').style.display='none';if(_confirmResolver)_confirmResolver(val);_confirmResolver=null;}
function showToast(msg,type){type=type||'success';var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast toast-'+type;var icons={success:'✅',danger:'❌',info:'ℹ️',warning:'⚠️'};t.innerHTML='<span>'+(icons[type]||'')+'</span><span>'+msg+'</span>';c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3500);}

/* ==================== DATABASE LAYER ==================== */
var DB={
cache:{},
applyBranchFilter: function(data, t) {
    if (!Array.isArray(data)) return data;
    if (['settings','branches','speeds','plans','ip_pool','users'].includes(t)) return data;
    if (!currentUser || currentUser.branchId === 'all') return data;
    return data.filter(function(item) { return item.branchId === currentUser.branchId; });
},
get:async function(t,forceReload){
    if(!forceReload && this.cache[t]!==undefined) return this.applyBranchFilter(this.cache[t], t);
    try{
        var r=await sb.from(t).select('*').limit(50000);if(r.error)throw r.error;
        if (t === 'settings') { this.cache[t] = (r.data && r.data.length ? r.data[0] : {}); } 
        else if (t === 'cash_register') {
            var allCash = r.data || [];
            var myCash = allCash.find(function(c){ return c.id === 'cash_'+(currentUser ? currentUser.branchId : 'all'); });
            this.cache[t] = myCash || {};
        } else { this.cache[t] = r.data || []; }
        return this.applyBranchFilter(this.cache[t], t);
    }catch(e){console.error("DB GET Error:",t,e);return(t==='settings'||t==='cash_register')?{}:[];}
},
insert:async function(t,r){
    var branchTables=['clients','transactions','documents','inventory','suppliers','tickets','installations','advances','stock_movements','audit_logs','cash_register'];
    if(branchTables.includes(t) && !r.branchId && currentUser && currentUser.branchId){ r.branchId = currentUser.branchId; }
    try{var res=await sb.from(t).insert([r]).select();if(res.error)throw res.error;if(!res.data||!res.data.length)throw new Error("Sem retorno do BD");if(!this.cache[t])this.cache[t]=(t==='settings'||t==='cash_register')?{}:[];if(t==='settings'||t==='cash_register'){this.cache[t]=res.data[0];}else{this.cache[t].push(res.data[0]);}return res.data[0];}catch(e){showToast("Erro BD: "+e.message,'danger');return null;}
},
update:async function(t,id,d){try{var res=await sb.from(t).update(d).eq('id',id).select();if(res.error)throw res.error;if(!res.data||!res.data.length)throw new Error("Sem retorno");if(this.cache[t]&&Array.isArray(this.cache[t])){var i=this.cache[t].findIndex(function(x){return x.id===id;});if(i>=0)this.cache[t][i]=Object.assign({},this.cache[t][i],d);}else if(t==='settings'||t==='cash_register'){this.cache[t]=Object.assign({},this.cache[t],d);}return res.data[0];}catch(e){showToast("Erro BD: "+e.message,'danger');return null;}},
upsert:async function(t,r){try{var res=await sb.from(t).upsert(r,{onConflict:'id'}).select();if(res.error)throw res.error;if(!res.data||!res.data.length)throw new Error("Sem retorno");if(t==='settings'){this.cache[t]=res.data[0];}else if(t==='cash_register'){this.cache[t]=res.data[0];}else{if(Array.isArray(this.cache[t])){var d=res.data[0];var i=this.cache[t].findIndex(function(x){return x.id===d.id;});if(i>=0)this.cache[t][i]=d;else this.cache[t].push(d);}else{this.cache[t]=res.data[0];}}return res.data[0];}catch(e){showToast("Erro Upsert: "+e.message,'danger');return null;}},
del:async function(t,id){try{var res=await sb.from(t).delete().eq('id',id);if(res.error)throw res.error;if(this.cache[t]&&Array.isArray(this.cache[t]))this.cache[t]=this.cache[t].filter(function(x){return x.id!==id;});return true;}catch(e){showToast("Erro BD: "+e.message,'danger');return false;}},
loadAll: async function() {
    var ks = ['users','branches','settings','clients','suppliers','transactions','documents','inventory','speeds','plans','ip_pool','contracts','installations','audit_logs','cash_register','employees','tickets','stock_movements','advances'];
    var promises = ks.map(k => {
        if (this.cache[k] === undefined) return this.get(k);

},

/* ==================== UTILITÁRIOS ==================== */
function getTodayStr(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function todayISO(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtISO(d){return d.toISOString().split('T')[0];}
function fmtPT(s){if(!s)return'-';var p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;}
function fmt(n){return new Intl.NumberFormat('pt-AO',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}
function getCurrency(){var s=DB.cache.settings;return s?s.currency||'AKZ':'AKZ';}
function val(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function parseDate(s){if(!s)return null;if(s.indexOf('/')>-1){var p=s.split('/');if(p.length===3)return new Date(p[2],p[1]-1,p[0]);}return new Date(s);}
function daysDiff(d1,d2){return Math.ceil((d2-d1)/(864e5));}
function safeAdd(a,b){return Math.round(((a||0)+(b||0))*100)/100;}
function safeSub(a,b){return Math.round(((a||0)-(b||0))*100)/100;}
async function logAction(action,detail){try{await DB.insert('audit_logs',{id:'log'+Date.now(),date:new Date().toLocaleString('pt-AO'),user:currentUser?currentUser.name:'Sistema',action:action,detail:detail||''});}catch(e){}}

async function hashPassword(pass){try{if(window.crypto&&window.crypto.subtle){var enc=new TextEncoder().encode(pass);var buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');}}catch(e){}var h=0;for(var i=0;i<pass.length;i++){h=((h<<5)-h)+pass.charCodeAt(i);h|=0;}return'fb_'+Math.abs(h).toString(36);}

async function doCheckoutCart(total){

        var cartPayload = JSON.stringify(clientCart);

    } else {

    }

    var itemsHtml = '<p style="margin-top:15px; text-align:center;"><strong>Cliente:</strong> '+clientName+'<br><strong>Valor:</strong> '+fmt(tx.val)+' '+getCurrency()+'<br><strong>Método:</strong> '+(tx.met==='iban'?'IBAN':'Express')+'</p>';
    
    if(tx.cart_items){

        itemsHtml += '<div style="margin-top:10px; border-top:1px solid rgba(255,255,255,.1); padding-top:10px;"><h4>Itens do Pedido:</h4><ul style="font-size:.85rem; color:var(--text-muted); margin-left:20px;">';
        items.forEach(function(it){
            var typeTxt = it.type === 'plan' ? '🔄 Alteração de Plano' : 
                          it.type === 'streaming' ? '📺 Streaming' : 
                          it.type === 'stock' ? '📦 Equipamento' : 
                          it.type === 'support' ? '🛠️ Apoio Técnico' : '💰 Mensalidade';
            itemsHtml += '<li><strong>'+typeTxt+'</strong>: '+it.name+' - '+fmt(it.price)+' '+getCurrency()+'</li>';
            if(it.type === 'support' && it.extra && it.extra.problem) itemsHtml += '<li>Detalhe: '+it.extra.problem+'</li>';
        });

    }
    
    modal('Comprovativo de Pagamento', '<div style="text-align:center">'+content+'</div>'+itemsHtml, function(){confirmPayment(txId);}, 'Confirmar e Processar', 'btn-success');

function extenso(n){var ints=Math.floor(n);var decs=Math.round((n-ints)*100);var un=['','Um','Dois','Três','Quatro','Cinco','Seis','Sete','Oito','Nove'];var dez=['','Dez','Vinte','Trinta','Quarenta','Cinquenta','Sessenta','Setenta','Oitenta','Noventa'];var cent=['','Cem','Duzentos','Trezentos','Quatrocentos','Quinhentos','Seiscentos','Setecentos','Oitocentos','Novecentos'];var teen=['Dez','Onze','Doze','Treze','Catorze','Quinze','Dezasseis','Dezassete','Dezoito','Dezanove'];var parts=[];if(ints>=1000){var mil=Math.floor(ints/1000);parts.push(mil===1?'Mil':extenso(mil)+' Mil');ints=ints%1000;}if(ints>=100){parts.push(cent[Math.floor(ints/100)]);ints=ints%100;}if(ints>=20){parts.push(dez[Math.floor(ints/10)]);ints=ints%10;}else if(ints>=10){parts.push(teen[ints-10]);ints=0;}if(ints>0)parts.push(un[ints]);var result=parts.join(' e ');if(!result)result='Zero';return result+' Kwanza'+(n>=2?'s':'')+(decs>0?' e '+decs+' Cêntimo'+(decs>=2?'s':''):'');}

async function sendReminders(){
    var cl=await DB.get('clients');var hoje=new Date();
    var toRemind=cl.filter(function(c){if(!c.validade||!c.speedId||!c.contact)return false;var vDate=parseDate(c.validade);var diff=daysDiff(hoje,vDate);return diff>=0&&diff<=3;});
    if(!toRemind.length)return showToast('Nenhum cliente para lembrar hoje.','info');
    showSpinner('A gerar lembretes...');

        var c=toRemind[i];
        var phone=(c.contact||'').replace(/\s/g,'').replace('+','');if(!phone.startsWith('244'))phone='244'+phone.replace(/^0/,'');
        var msg='Olá '+c.name+'!%0AA sua internet expira em '+daysDiff(hoje,parseDate(c.validade))+' dia(s) ('+fmtPT(c.validade)+').%0AValor: '+fmt(c.mens||0)+' AKZ.%0AEvite o corte, pague via IBAN ou Multicaixa Express.%0AObrigado!';

    }
    hideSpinner();showToast(toRemind.length+' lembretes gerados! Verifique o seu navegador.','success');
}

async function confirmPayment(txId){
    var tx=DB.cache.transactions.find(function(x){return x.id===txId;});if(!tx)return;showSpinner('A processar itens...');
    var cfg=DB.cache.settings||{};cfg.docSeq=(cfg.docSeq||0)+1;var docId='FR'+new Date().getFullYear()+'/'+String(cfg.docSeq).padStart(4,'0');var docDbId='d'+Date.now();
    var c=DB.cache.clients.find(function(x){return x.id===tx.clientId;});var clientName = c ? c.name : 'N/A';
    var cu=getCurrency();
    var invoiceItems=[];
    var clientUpdates={};
    var txsToLog=[];
    
    if(tx.cart_items){
        var items=JSON.parse(tx.cart_items);
        for(var i=0; i<items.length; i++){
            var it=items[i];
            invoiceItems.push({desc:it.name, qty:1, price:it.price, total:it.price});
            
            if(it.type==='mensalidade'){
                var sp=c.speedId?(DB.cache.speeds||[]).find(function(s){return s.id===c.speedId;}):null;
                if(sp&&sp.days){var baseDate=c.validade?parseDate(c.validade):new Date();if(daysDiff(new Date(),baseDate)<0)baseDate=new Date();clientUpdates.validade=fmtISO(addDays(baseDate,sp.days));}
                clientUpdates.divida = Math.max(0, safeSub(c.divida||0, it.price));
            } 
            else if(it.type==='plan'){
                clientUpdates.speedId=it.extra.speedId; clientUpdates.pkg=it.extra.nome; clientUpdates.mens=it.price;
                clientUpdates.validade=fmtISO(addDays(new Date(), it.extra.days || 30));
            } 
            else if(it.type==='streaming'){
                var oldStream=c.streamings||''; if(oldStream.indexOf(it.extra.name)===-1) clientUpdates.streamings=oldStream+(oldStream?', ':'')+it.extra.name;
            } 
            else if(it.type==='stock'){
                if(it.extra && it.extra.invId){
                    var prod=DB.cache.inventory.find(function(p){return p.id === it.extra.invId;});
                    if(prod){ await DB.update('inventory', prod.id, {qty: safeSub(prod.qty, 1)}); }
                }
            } 
            else if(it.type==='support'){
                await DB.insert('tickets',{id:'tk'+Date.now()+i,clientName:c.name,tech:'',subject:'Apoio Técnico Agendado (Portal)',status:'Aberto',description:it.extra.problem,dateCreated:getTodayStr()});
            }
        }
    } else {
        invoiceItems.push({desc:'Mensalidade - '+clientName,qty:1,price:tx.val,total:tx.val});
        var sp=c.speedId?(DB.cache.speeds||[]).find(function(s){return s.id===c.speedId;}):null;
        if(sp&&sp.days){var baseDate=c.validade?parseDate(c.validade):new Date();if(daysDiff(new Date(),baseDate)<0)baseDate=new Date();clientUpdates.validade=fmtISO(addDays(baseDate,sp.days));}
        clientUpdates.divida = Math.max(0, safeSub(c.divida||0, tx.val));
    }
    
    if(Object.keys(clientUpdates).length>0){await DB.update('clients',tx.clientId,clientUpdates);}
    
    await DB.insert('documents',{id:docDbId,docId:docId,docType:'FR',clientId:tx.clientId,clientName:clientName,clientNif:c?(c.nif||''):'',clientAddress:c?(c.address||''):'',clientContact:c?(c.contact||''):'',date:getTodayStr(),dueDate:todayISO(),items:invoiceItems,subtotal:tx.val,tax:0,total:tx.val,paidVal:tx.val,status:'paid',met:tx.met,currency:cu,attendedBy:currentUser.name});
    await DB.upsert('settings',{id:1,docSeq:cfg.docSeq});
    await DB.update('transactions',txId,{status:'paid',receiptId:docId,desc:invoiceItems.map(function(x){return x.desc;}).join(' | ')});
    
    await logAction('Confirmar Pagamento','Cliente: '+clientName+' - '+fmt(tx.val));hideSpinner();showToast('Pagamento confirmado e Fatura '+docId+' gerada!');closeModal();loadDashboard();
}

async function shareWhatsApp(id){var d=DB.cache.documents.find(function(x){return x.id===id;});if(!d)return;var phone=(d.clientContact||'').replace(/\s/g,'').replace('+','');if(!phone.startsWith('244'))phone='244'+phone.replace(/^0/,'');var msg='Olá '+d.clientName+'!%0ADoc: *'+d.docId+'*%0AValor: *'+fmt(d.total)+' '+(d.currency||getCurrency())+'*%0AAtendido: '+(d.attendedBy||'Sistema');window.open('https://api.whatsapp.com/send?phone='+phone+'&text='+msg,'_blank');}

async function cancelInstallmentDoc(id){var ok=await showConfirm('Cancelar Cobrança','Cancelar esta cobrança irá reverter a dívida restante para o cliente e apagar o documento. Continuar?','Cancelar Cobrança','btn-danger');if(!ok)return;var doc=DB.cache.documents.find(function(d){return d.id===id;});if(!doc)return;if(doc.clientId&&doc.clientId!=='cf1'){var client=DB.cache.clients.find(function(c){return c.id===doc.clientId;});if(client){var debtToRevert=safeSub(doc.total,doc.paidVal||0);await DB.update('clients',doc.clientId,{divida:Math.max(0,safeSub(client.divida,debtToRevert))});}}var txs=DB.cache.transactions.filter(function(t){return t.docId===doc.docId;});for(var i=0;i<txs.length;i++){await DB.del('transactions',txs[i].id);}await DB.del('documents',id);await logAction('Cancelar Prestação',doc.docId);showToast('Cobrança cancelada e dívida revertida!');loadInstallmentsPage();}
async function loadFinance(){var t=await DB.get('transactions'),docs=await DB.get('documents'),cu=getCurrency(),cfg=DB.cache.settings||{},hoje=new Date();var vencidas=docs.filter(function(d){return d.status!=='paid'&&d.dueDate&&new Date(d.dueDate+'T00:00:00')<hoje;});var receipts=t.filter(function(x){return x.type==='expense'&&x.receiptId;}).slice().reverse();var totalSalarios=receipts.filter(function(r){return r.cat==='Salários';}).reduce(function(a,b){return safeAdd(a,b.val);},0);var totalDespesas=receipts.reduce(function(a,b){return safeAdd(a,b.val);},0);var html='<h2>🏦 Centro Financeiro</h2><div class="kpi-grid" style="margin-bottom:20px"><div class="kpi-card" style="background:rgba(157,78,221,.05);border-left-color:var(--purple)"><div class="kpi-label">Total Pago (Salários)</div><div class="kpi-value" style="color:var(--purple)">'+fmt(totalSalarios)+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(255,0,110,.05);border-left-color:var(--danger)"><div class="kpi-label">Total Despesas c/ Recibo</div><div class="kpi-value" style="color:var(--danger)">'+fmt(totalDespesas)+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(255,195,0,.05);border-left-color:var(--warning)"><div class="kpi-label">Faturas Vencidas</div><div class="kpi-value" style="color:var(--warning)">'+vencidas.length+'</div></div></div>';html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px"><h3>📋 Recibos de Pagamento</h3><button class="btn btn-danger btn-sm" onclick="addCompanyExpense()">➕ Novo Pagamento</button></div><table><thead><tr><th>Nº Recibo</th><th>Data</th><th>Categoria</th><th>Pago a</th><th>Referência</th><th>Valor</th><th>Ações</th></tr></thead><tbody>';receipts.forEach(function(d){html+='<tr><td style="font-family:monospace;font-weight:bold">'+(d.receiptId||'-')+'</td><td>'+(d.date||'-')+'</td><td><span class="badge bg-info">'+(d.cat||'Outros')+'</span></td><td>'+(d.paidTo||'-')+'</td><td>'+(d.reference||'-')+'</td><td class="text-danger">-'+fmt(d.val)+'</td><td style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="viewExpenseReceipt(\''+d.id+'\')">📄</button> <button class="btn btn-success btn-sm" onclick="shareExpenseWhatsApp(\''+d.id+'\')">📱</button> <button class="btn btn-danger btn-sm" onclick="delExpense(\''+d.id+'\')">🗑️</button></td></tr>';});if(!receipts.length)html+='<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:30px">Nenhum recibo emitido.</td></tr>';html+='</tbody></table></div>';html+='<div class="card"><h3>⚠️ Faturas Vencidas</h3><table><thead><tr><th>Doc</th><th>Cliente</th><th>Vencimento</th><th>Dívida</th><th>Ação</th></tr></thead><tbody>';vencidas.forEach(function(d){html+='<tr><td>'+d.docId+'</td><td>'+d.clientName+'</td><td>'+fmtPT(d.dueDate)+'</td><td class="text-danger">'+fmt(safeSub(d.total,d.paidVal||0))+'</td><td><button class="btn btn-success btn-sm" onclick="viewDoc(\''+d.id+'\')">💳</button></td></tr>';});if(!vencidas.length)html+='<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Nenhuma fatura vencida</td></tr>';html+='</tbody></table></div>';document.getElementById('appContent').innerHTML=html;}

async function loadStock(){var inv=await DB.get('inventory');var cl=await DB.get('clients');var cu=getCurrency();var html='<div style="display:flex;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:10px"><h2>📦 Ativos e Stock</h2><button class="btn btn-primary btn-sm" onclick="openModalItem()">➕ Novo Item</button></div><div class="card"><table id="tblStock"><thead><tr><th>Produto</th><th>Cat.</th><th>MAC/Série</th><th>Preço</th><th>Qtd</th><th>Estado</th><th>Ações</th></tr></thead><tbody>';inv.forEach(function(i){var stClass=i.status==='Atribuído'?'bg-warning':i.status==='Avariado'?'bg-danger':'bg-success';html+='<tr><td><strong>'+i.name+'</strong></td><td>'+(i.cat||'-')+'</td><td style="font-family:monospace;font-size:.75rem">'+(i.mac_address||'-')+'</td><td>'+fmt(i.val)+' '+cu+'</td><td>'+(i.status==='Atribuído'?'-':i.qty)+'</td><td><span class="badge '+stClass+'">'+(i.status||'Em Stock')+'</span></td><td style="white-space:nowrap"><button class="btn btn-sm btn-info" onclick="assignEquipment(\''+i.id+'\')" '+(i.status==='Atribuído'?'disabled':'')+'>📍 Atribuir</button> <button class="btn btn-warning btn-sm" onclick="openModalItem(\''+i.id+'\')">✏️</button> <button class="btn btn-danger btn-sm" onclick="delItem(\''+i.id+'\')">🗑️</button></td></tr>';});html+='</tbody></table></div>';document.getElementById('appContent').innerHTML=html;}

async function loadPlans(){var sp=await DB.get('speeds'),pl=await DB.get('plans'),cu=getCurrency();var semanal=sp.filter(function(s){return s.period==='Semanal';});var quinzenal=sp.filter(function(s){return s.period==='Quinzenal';});var mensal=sp.filter(function(s){return s.period==='Mensal'||!s.period;});function rl(arr,type){if(!arr.length)return'<p style="color:var(--text-muted)">Nenhum</p>';return arr.map(function(s){return'<div class="plan-card"><span>'+s.nome+'</span><div style="display:flex;align-items:center;gap:8px"><strong>'+fmt(s.preco)+' '+cu+'</strong><button class="btn btn-warning btn-sm" style="padding:2px 6px;font-size:.65rem" onclick="editSpeed(\''+s.id+'\')">✏️</button> <button class="btn btn-danger btn-sm" style="padding:2px 6px;font-size:.65rem" onclick="delSpeed(\''+s.id+'\')">🗑️</button></div></div>';}).join('');}document.getElementById('appContent').innerHTML='<h2>📡 Planos Internet</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:20px"><div class="card" style="border-left:3px solid var(--warning)"><h3>📅 Semanal</h3>'+rl(semanal,'speed')+'</div><div class="card" style="border-left:3px solid var(--info)"><h3>📅 Quinzenal</h3>'+rl(quinzenal,'speed')+'</div><div class="card" style="border-left:3px solid var(--success)"><h3>📅 Mensal</h3>'+rl(mensal,'speed')+'</div></div><div class="card"><h3>Novo Plano Internet</h3><div class="form-row"><div><label>Nome</label><input id="nSN" placeholder="5 MB"></div><div><label>Preço</label><input type="number" id="nSPr"></div><div><label>Período</label><select id="nSPer"><option value="Semanal">Semanal</option><option value="Quinzenal">Quinzenal</option><option value="Mensal" selected>Mensal</option></select></div><div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addSp()">➕</button></div></div></div><div class="card"><h3>Streamings / Serviços Adicionais</h3><div class="form-row"><div><label>Serviço</label><input id="nPN"></div><div><label>Preço</label><input type="number" id="nPP"></div><div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addPl()">➕</button></div></div><div style="margin-top:10px">'+pl.map(function(p){return'<div class="plan-card"><span>'+p.nome+'</span><div style="display:flex;align-items:center;gap:8px"><strong>'+fmt(p.preco)+' '+cu+'</strong><button class="btn btn-warning btn-sm" style="padding:2px 6px;font-size:.65rem" onclick="editPlan(\''+p.id+'\')">✏️</button> <button class="btn btn-danger btn-sm" style="padding:2px 6px;font-size:.65rem" onclick="delPlan(\''+p.id+'\')">🗑️</button></div></div>';}).join('')+'</div></div>';}

async function loadNetwork(){var cl=await DB.get('clients');var ipPool=await DB.get('ip_pool');var active=cl.filter(function(c){return c.speedId;});var html='<h2>🌐 Rede</h2><div class="kpi-grid" style="margin-bottom:15px"><div class="kpi-card" style="background:rgba(0,255,136,.05);border-left-color:var(--success)"><div class="kpi-label">Clientes Internet</div><div class="kpi-value" style="color:var(--success)">'+active.length+'</div></div><div class="kpi-card" style="background:rgba(0,180,216,.05);border-left-color:var(--primary)"><div class="kpi-label">IPs no Pool</div><div class="kpi-value" style="color:var(--primary)">'+ipPool.length+'</div></div></div><div class="card"><h3>Mapa de Clientes</h3><div id="clientMap" style="margin-bottom:10px"></div></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h3>Controlo de Rede</h3></div><table><thead><tr><th>Nome</th><th>Plano</th><th>IP</th><th>Estado</th><th>Ação</th></tr></thead><tbody>';active.forEach(function(c){html+='<tr><td><strong>'+c.name+'</strong></td><td>'+(c.pkg||'-')+'</td><td style="font-family:monospace;font-size:.8rem">'+(c.ip||'-')+'</td><td><span class="badge '+(c.networkBlocked?'bg-danger':'bg-success')+'">'+(c.networkBlocked?'BLOQ':'ON')+'</span></td><td><button class="btn btn-'+(c.networkBlocked?'success':'danger')+' btn-sm" onclick="togNet(\''+c.id+'\','+(!c.networkBlocked)+')">'+(c.networkBlocked?'✅ Liberar':'🚫 Bloquear')+'</button></td></tr>';});if(!active.length)html+='<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Nenhum cliente Internet</td></tr>';html+='</tbody></table></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h3>🗄️ IP Pool</h3><button class="btn btn-primary btn-sm" onclick="addIPModal()">➕ Adicionar IP</button></div><table><thead><tr><th>Endereço IP</th><th>Estado</th><th>Atribuído a</th><th>Ações</th></tr></thead><tbody>';ipPool.forEach(function(ip){var assigned=cl.find(function(c){return c.ip===ip.address;});html+='<tr><td style="font-family:monospace">'+ip.address+'</td><td><span class="badge '+(assigned?'bg-warning':'bg-success')+'">'+(assigned?'Em Uso':'Livre')+'</span></td><td>'+(assigned?assigned.name:'-')+'</td><td><button class="btn btn-danger btn-sm" onclick="delIP(\''+ip.id+'\')">🗑️</button></td></tr>';});if(!ipPool.length)html+='<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Nenhum IP registado</td></tr>';html+='</tbody></table></div>';document.getElementById('appContent').innerHTML=html;setTimeout(initClientMap,200);}
function initClientMap(){var mapEl=document.getElementById('clientMap');if(!mapEl)return;try{var map=L.map('clientMap').setView([-8.8390,13.2894],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(map);var clients=DB.cache.clients||[];clients.forEach(function(c){if(c.lat&&c.lng){L.marker([c.lat,c.lng]).addTo(map).bindPopup('<b>'+c.name+'</b><br>'+(c.pkg||'')+(c.ip?'<br>IP: '+c.ip:''));}});setTimeout(function(){map.invalidateSize();},300);}catch(e){mapEl.innerHTML='<p style="color:var(--text-muted);text-align:center;padding:40px">Erro ao carregar mapa</p>';}}

async function loadRenewals(){var cl=(await DB.get('clients')).filter(function(c){return c.speedId&&c.validade;}),hoje=new Date();var months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];var mOpts=months.map(function(m,i){return'<option value="'+i+'">'+m+'</option>';}).join('');var html='<h2>🔄 Renovações</h2><div class="card" style="margin-bottom:15px"><div class="form-row" style="align-items:flex-end"><div><label>Filtrar por Mês de Validade</label><select id="filterRenMonth" onchange="renderRenewalsTable()"><option value="-1">Todos os Meses</option>'+mOpts+'</select></div></div></div><div class="card"><table id="tblRenewals"><thead><tr><th>Cliente</th><th>Plano</th><th>Validade</th><th>Dias</th><th>Ação</th></tr></thead><tbody></tbody></table></div>';document.getElementById('appContent').innerHTML=html;window.renderRenewalsTable=function(){var filterM=parseInt(val('filterRenMonth'));var rows='';var mapped=cl.map(function(c){var vDate=parseDate(c.validade);var dias=vDate?daysDiff(hoje,vDate):-999;return Object.assign({},c,{dias:dias,vDate:vDate});});if(filterM>=0){mapped=mapped.filter(function(c){return c.vDate&&c.vDate.getMonth()===filterM;});}mapped.sort(function(a,b){return a.dias-b.dias;});mapped.forEach(function(r){rows+='<tr><td><strong>'+r.name+'</strong></td><td>'+(r.pkg||'-')+'</td><td>'+fmtPT(r.validade)+'</td><td><strong style="color:'+(r.dias<0?'var(--danger)':r.dias<=3?'var(--warning)':'var(--success)')+'">'+(r.dias<0?r.dias:'+'+r.dias)+'</strong></td><td><button class="btn btn-success btn-sm" onclick="renewClient(\''+r.id+'\')">🔄 Renovar</button></td></tr>';});if(!rows)rows='<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">Nenhuma renovação encontrada para o filtro.</td></tr>';document.querySelector('#tblRenewals tbody').innerHTML=rows;};renderRenewalsTable();}
async function renewClient(id){var c=(await DB.get('clients',true)).find(function(x){return x.id===id;});var sp=DB.cache.speeds.find(function(s){return s.id===c.speedId;});var days=sp?sp.days:30;var newValidade=fmtISO(addDays(new Date(),days));var cu=getCurrency();modal('🔄 Renovar: '+c.name,'<p>Plano: <strong>'+(c.pkg||'N/A')+'</strong> ('+days+' dias)</p><p>Nova validade: <strong>'+fmtPT(newValidade)+'</strong></p><p>Mensalidade: <strong>'+fmt(c.mens||0)+' '+cu+'</strong></p><div class="form-row"><div><label>Valor a Pagar</label><input type="number" id="renewVal" value="'+c.mens+'"></div><div><label>Método</label><select id="renewMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div></div>',async function(){var v=parseFloat(val('renewVal'))||0;var newDebt=safeAdd(c.divida,safeSub(c.mens||0,v));await DB.update('clients',id,{validade:newValidade,divida:newDebt});if(v>0){var receiptId=await generateReceiptId();var cfg=DB.cache.settings||{};cfg.docSeq=(cfg.docSeq||0)+1;var docId='FR'+new Date().getFullYear()+'/'+String(cfg.docSeq).padStart(4,'0');var docDbId='d'+Date.now();await DB.insert('documents',{id:docDbId,docId:docId,docType:'FR',clientId:id,clientName:c.name,clientNif:c.nif||'',clientAddress:c.address||'',clientContact:c.contact||'',date:getTodayStr(),dueDate:todayISO(),items:[{desc:'Renovação - '+c.name,qty:1,price:v,total:v}],subtotal:v,tax:0,total:v,paidVal:v,status:'paid',met:val('renewMet'),currency:cu,attendedBy:currentUser.name});await DB.upsert('settings',{id:1,docSeq:cfg.docSeq});var newTx=await DB.insert('transactions',{id:'t'+Date.now(),docId:docId,type:'income',val:v,date:getTodayStr(),desc:'Renovação - '+c.name,status:'paid',met:val('renewMet'),receiptId:receiptId,receiptType:'renovacao',reference:c.pkg||'Renovação',processedBy:currentUser.name,clientId:id});await logAction('Renovação',c.name+' - '+fmt(v));showToast('Renovado! Recibo '+receiptId+' registado!');closeModal();if(newTx)viewClientReceipt(newTx.id async function reportIVA(){var docs=await DB.get('documents');var txs=await DB.get('transactions');var cu=getCurrency();var ivaReceitas=docs.filter(function(d){return d.status==='paid';}).reduce(function(a,b){return safeAdd(a,b.tax||0);},0);var totalFaturas=docs.filter(function(d){return d.status==='paid';}).reduce(function(a,b){return safeAdd(a,b.total||0);},0);var despesasComRecibo=txs.filter(function(t){return t.type==='expense'&&t.receiptId;});var totalDespesas=despesasComRecibo.reduce(function(a,b){return safeAdd(a,b.val||0);},0);var ivaDespesas=totalDespesas*0.14; var ivaApurado=safeSub(ivaReceitas,ivaDespesas);var html='<h2>🧾 Apuramento do IVA (14%)</h2><div class="kpi-grid"><div class="kpi-card" style="background:rgba(0,255,136,.05);border-left-color:var(--success)"><div class="kpi-label">IVA Liquidado (Receitas)</div><div class="kpi-value" style="color:var(--success)">'+fmt(ivaReceitas)+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(255,0,110,.05);border-left-color:var(--danger)"><div class="kpi-label">IVA Dedutível (Despesas)</div><div class="kpi-value" style="color:var(--danger)">'+fmt(ivaDespesas)+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(0,180,216,.05);border-left-color:var(--primary)"><div class="kpi-label">IVA a Entregar (Apurado)</div><div class="kpi-value" style="color:var(--primary)">'+fmt(ivaApurado)+' '+cu+'</div></div></div><div class="card"><p style="color:var(--text-muted);font-size:.85rem;margin-bottom:10px">* O IVA Dedutível é calculado a 14% sobre o valor das despesas com recibo emitido.</p><table><thead><tr><th>Total Faturado (c/ IVA)</th><th>IVA Cobrado</th><th>Total Despesas (c/ Recibo)</th><th>IVA Pago</th></tr></thead><tbody><tr><td>'+fmt(totalFaturas)+' '+cu+'</td><td class="text-success">'+fmt(ivaReceitas)+' '+cu+'</td><td>'+fmt(totalDespesas)+' '+cu+'</td><td class="text-danger">'+fmt(ivaDespesas)+' '+cu+'</td></tr></tbody></table></div><button class="btn btn-outline btn-sm" onclick="loadRepo async function exportSAFT(){showSpinner('A gerar ficheiro SAF-T...');var docs=await DB.get('documents');var cfg=getActiveBranchConfig();var xml='<?xml version="1.0" encoding="UTF-8"?>\n<AuditFile xmlns="urn:OECD:StdA4Txt:1.0.1">\n<Header>\n<CompanyId>'+cfg.nif+'</CompanyId>\n<CompanyName>'+cfg.name+'</CompanyName>\n<TaxRegistrationNumber>'+cfg.nif+'</TaxRegistrationNumber>\n<DateCreated>'+todayISO()+'</DateCreated>\n</Header>\n<MasterFiles>\n<Customers>\n';var clients=await DB.get('clients');clients.forEach(function(c){xml+='<Customer><CustomerID>'+c.id+'</CustomerID><CustomerTaxID>'+(c.nif||'---')+'</CustomerTaxID><CompanyName>'+c.name+'</CompanyName></Customer>\n';});xml+='</Customers>\n</MasterFiles>\n<SourceDocuments>\n<SalesInvoices>\n';docs.forEach(function(d){xml+='<Invoice><InvoiceNo>'+d.docId+'</InvoiceNo><InvoiceDate>'+d.date+'</InvoiceDate><CustomerID>'+d.clientId+'</CustomerID><Line><Description>'+(d.items[0]&&d.items[0].desc||'Servico')+'</Description><Amount>'+d.total+'</Amount></Line><DocumentTotals><TaxPayable>'+d.tax+'</TaxPayable><NetAmount>'+d.subtotal+'</NetAmount><GrossAmount>'+d.total+'</GrossAmount></DocumentTotals></Invoice>\n';});xml+='</SalesInvoices>\n</SourceDocuments>\n</AuditFile>';var blob=new Blob([xml],{type:'application/xml'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SAF-T_'+todayISO()+'.xml';a.click();hideSpinner();showToast('Ficheiro SAF-T gerado com sucesso!','success');}
async function reportRevenue(){var t=await DB.get('transactions');var months={};t.forEach(function(tx){var d=parseDate(tx.date);if(!d)return;var key=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();if(!months[key])months[key]={inc:0,exp:0};if(tx.type==='income')months[key].inc=safeAdd(months[key].inc,tx.val);if(tx.type==='expense_payment'||tx.type==='expense')months[key].exp=safeAdd(months[key].exp,tx.val);});var html='<h2>📊 Receitas vs Despesas</h2><div class="card"><table><thead><tr><th>Mês</th><th>Receitas</th><th>Despesas</th><th>Lucro</th></tr></thead><tbody>';Object.keys(months).sort().forEach(function(k){var m=months[k];var l=safeSub(m.inc,m.exp);html+='<tr><td><strong>'+k+'</strong></td><td class="text-success">'+fmt(m.inc)+'</td><td class="text-danger">'+fmt(m.exp)+'</td><td style="color:'+(l>=0?'var(--success)':'var(--danger)')+';font-weight:bold">'+fmt(l)+'</td></tr>';});html+='</tbody></table></div><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button>';document.getElementById('appContent').innerHTML=html;}

// 1. PAGAR MENSALIDADE / COBRAR (Admin)
async function payClientGeneral(clientId) {
    var c = (await DB.get('clients', true)).find(function(x){ return x.id === clientId; });
    if (!c) return showToast('Cliente não encontrado!', 'danger');
    var sp = c.speedId ? (DB.cache.speeds || []).find(function(s){ return s.id === c.speedId; }) : null;
    var cu = getCurrency();
    var defaultVal = c.divida > 0 ? c.divida : (c.mens || 0);

    modal('💳 Cobrar Mensalidade - ' + c.name, 
        '<p>Plano atual: <strong>' + (c.pkg || 'N/A') + '</strong><br>Dívida em aberto: <strong>' + fmt(c.divida || 0) + ' ' + cu + '</strong><br>Mensalidade base: <strong>' + fmt(c.mens || 0) + ' ' + cu + '</strong></p>' +
        '<div class="form-row"><div><label>Valor a Pagar *</label><input type="number" id="payGenVal" value="' + defaultVal + '"></div>' +
        '<div><label>Método *</label><select id="payGenMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div></div>', 
        async function() {
            var v = parseFloat(val('payGenVal'));
            if (!v || v <= 0) return showToast('Insira um valor válido!', 'danger');
            
            showSpinner('A processar pagamento...');
            var met = val('payGenMet');
            var cfg = DB.cache.settings || {};
            cfg.docSeq = (cfg.docSeq || 0) + 1;
            var docId = 'FR' + new Date().getFullYear() + '/' + String(cfg.docSeq).padStart(4, '0');
            var receiptId = await generateReceiptId();
            
            // Atualizar cliente (Zerar dívida e renovar validade)
            var clientUpdates = { divida: Math.max(0, safeSub(c.divida || 0, v)) };
            if (sp && sp.days) {
                var baseDate = c.validade ? parseDate(c.validade) : new Date();
                if (daysDiff(new Date(), baseDate) < 0) baseDate = new Date(); // Se já expirou, conta de hoje
                clientUpdates.validade = fmtISO(addDays(baseDate, sp.days));
            }
            await DB.update('clients', clientId, clientUpdates);
            
            // Gerar Fatura
            var docDbId = 'd' + Date.now();
            await DB.insert('documents', {
                id: docDbId, docId: docId, docType: 'FR', clientId: clientId, clientName: c.name,
                clientNif: c.nif || '', clientAddress: c.address || '', clientContact: c.contact || '',
                date: getTodayStr(), dueDate: todayISO(), 
                items: [{desc: 'Mensalidade - ' + c.name, qty: 1, price: v, total: v}],
                subtotal: v, tax: 0, total: v, paidVal: v, status: 'paid', met: met, currency: cu, attendedBy: currentUser.name
            });
            
            await DB.upsert('settings', {id: 1, docSeq: cfg.docSeq, receiptSeq: (DB.cache.settings.receiptSeq || 0) + 1});
            
            // Gerar Transação
            var newTx = await DB.insert('transactions', {
                id: 't' + Date.now(), docId: docId, type: 'income', val: v, date: getTodayStr(),
                desc: 'Mensalidade - ' + c.name, status: 'paid', met: met, receiptId: receiptId,
                receiptType: 'mensalidade', reference: c.pkg || 'Mensalidade', processedBy: currentUser.name, clientId: clientId
            });
            
            await logAction('Cobrança', c.name + ' - ' + fmt(v) + ' ' + cu);
            hideSpinner();
            showToast('Pagamento registado com sucesso!');
            closeModal();
            
            // Abre o recibo automaticamente
            if (newTx) viewClientReceipt(newTx.id, clientId);
        }, 
        'Confirmar Pagamento', 'btn-success'
    );
}

// 2. GRÁFICO DO DASHBOARD
function toggleDashChart() {
    dashChartHidden = !dashChartHidden;
    loadDashboard();
}

async function renderChart(t) {
    var ctx = document.getElementById('dashChart');
    if (!ctx) return;
    
    var hoje = new Date();
    var labels = [];
    var incData = [];
    var expData = [];
    
    // Pega os últimos 6 meses
    for (var i = 5; i >= 0; i--) {
        var d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
        var monthStr = d.toLocaleString('pt-PT', { month: 'short' });
        labels.push(monthStr);
        
        var inc = 0, exp = 0;
        t.forEach(function(tx) {
            var txDate = parseDate(tx.date);
            if (txDate && txDate.getMonth() === d.getMonth() && txDate.getFullYear() === d.getFullYear()) {
                if (tx.type === 'income') inc = safeAdd(inc, tx.val);
                if (tx.type === 'expense_payment' || tx.type === 'expense') exp = safeAdd(exp, tx.val);
            }
        });
        incData.push(inc);
        expData.push(exp);
    }

    if (mainChart) mainChart.destroy();
    
    mainChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Receitas', data: incData, backgroundColor: 'rgba(0,255,136,0.6)', borderColor: 'rgba(0,255,136,1)', borderWidth: 1 },
                { label: 'Despesas', data: expData, backgroundColor: 'rgba(255,0,110,0.6)', borderColor: 'rgba(255,0,110,1)', borderWidth: 1 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            scales: { y: { beginAtZero: true, ticks: { color: '#8b9bb4' } }, x: { ticks: { color: '#8b9bb4' } } }, 
            plugins: { legend: { labels: { color: '#e0e6ed' } } } 
        }
    });
}

/* ==================== SISTEMA DE NOTIFICAÇÕES ==================== */
async function checkSystemNotifications() {
    var cl = DB.cache.clients || [];
    var inv = DB.cache.inventory || [];
    var txs = DB.cache.transactions || [];
    var hoje = new Date();
    var notifs = [];

    // 1. Stock Baixo
    var lowStock = inv.filter(function(i) { return i.qty > 0 && i.qty <= 5; });
    lowStock.forEach(function(i) {
        notifs.push({ type: 'warning', icon: '📦', msg: 'Stock baixo: <strong>'+i.name+'</strong> ('+i.qty+' restantes)' });
    });

    // 2. Clientes a expirar (próximos 3 dias)
    var expiring = cl.filter(function(c) {
        if(!c.validade || !c.speedId) return false;
        var diff = daysDiff(hoje, parseDate(c.validade));
        return diff >= 0 && diff <= 3;
    });
    expiring.forEach(function(c) {
        notifs.push({ type: 'danger', icon: '⏳', msg: 'Internet de <strong>'+c.name+'</strong> expira em '+daysDiff(hoje, parseDate(c.validade))+' dia(s).' });
    });

    // 3. Pagamentos Pendentes no Portal
    var pending = txs.filter(function(t) { return t.status === 'pending_verification'; });
    pending.forEach(function(t) {
        var clientName = (cl.find(c=>c.id===t.clientId)||{}).name || 'Cliente';
        notifs.push({ type: 'info', icon: '💳', msg: 'Pagamento de <strong>'+fmt(t.val)+' KZ</strong> aguardando confirmação ('+clientName+').' });
    });

    // Renderizar
    var countEl = document.getElementById('notifCount');
    var listEl = document.getElementById('notifList');
    
    if (notifs.length > 0) {
        countEl.innerText = notifs.length;
        countEl.style.display = 'flex';
        var html = '';
        notifs.forEach(function(n) {
            var color = n.type === 'danger' ? 'var(--danger)' : n.type === 'warning' ? 'var(--warning)' : 'var(--primary)';
            var bg = n.type === 'danger' ? 'rgba(255,0,110,.1)' : n.type === 'warning' ? 'rgba(255,195,0,.1)' : 'rgba(0,180,216,.1)';
            html += '<div class="notif-item"><div class="notif-icon" style="background:'+bg+';color:'+color+'">'+n.icon+'</div><div style="flex:1;color:var(--text-main)">'+n.msg+'</div></div>';
        });
        listEl.innerHTML = html;
    } else {
        countEl.style.display = 'none';
        listEl.innerHTML = '<div class="notif-empty">✅ Tudo em dia! Sem alertas.</div>';
    }
}

function toggleNotifications(e) {
    if(e) e.stopPropagation();
    document.getElementById('notifDropdown').classList.toggle('show');
}

// Fechar notificação ao clicar fora
window.addEventListener('click', function(e) {
    var dropdown = document.getElementById('notifDropdown');
    var bell = document.querySelector('.notif-bell');
    if (dropdown && bell && !bell.contains(e.target)) {
        dropdown.classList.remove('show');
    }
});
