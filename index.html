<script>
const SUPABASE_URL='https://ceuwezkigyvengweojlj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNldXdlemtpZ3l2ZW5nd2VvamxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzQxNzcsImV4cCI6MjA5NDg1MDE3N30.zBe0Gq56AVTMkcnqBxT2SdzPXh2RsNed43oKZYOWi40';
let sb;try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){console.error(e);}

var DB={cache:{},get:async function(t){if(this.cache[t]!==undefined)return this.cache[t];try{const{data,error}=await sb.from(t).select('*').limit(500);if(error)throw error;this.cache[t]=(t==='settings')?(data&&data.length?data[0]:{}):(data||[]);return this.cache[t];}catch(e){return(t==='settings')?{}:[];}},insert:async function(t,r){try{const{data,error}=await sb.from(t).insert([r]).select();if(error)throw error;if(!this.cache[t])this.cache[t]=(t==='settings')?{}:[];if(t==='settings'||t==='cash_register'){this.cache[t]=data[0];}else{this.cache[t].push(data[0]);}return data[0];}catch(e){showToast("Erro BD: "+e.message,'danger');return null;}},update:async function(t,id,d){try{const{data,error}=await sb.from(t).update(d).eq('id',id).select();if(error)throw error;if(this.cache[t]&&Array.isArray(this.cache[t])){const i=this.cache[t].findIndex(x=>x.id===id);if(i>=0)this.cache[t][i]={...this.cache[t][i],...d};}else if(t==='settings'||t==='cash_register'){this.cache[t]={...this.cache[t],...d};}return data[0];}catch(e){showToast("Erro BD: "+e.message,'danger');return null;}},upsert:async function(t,r){try{const{data,error}=await sb.from(t).upsert(r,{onConflict:'id'}).select();if(error)throw error;return data;}catch(e){showToast("Erro: "+e.message,'danger');return null;}},del:async function(t,id){try{const{error}=await sb.from(t).delete().eq('id',id);if(error)throw error;if(this.cache[t]&&Array.isArray(this.cache[t]))this.cache[t]=this.cache[t].filter(x=>x.id!==id);return true;}catch(e){showToast("Erro BD: "+e.message,'danger');return false;}},loadAll:async function(){var ks=['users','branches','settings','clients','suppliers','transactions','documents','inventory','speeds','plans','ip_pool','contracts','installations','audit_logs','cash_register','employees','tickets','stock_movements'];for(var i=0;i<ks.length;i++){var k=ks[i];if(this.cache[k]!==undefined)continue;await this.get(k);}}};

var LOGO='https://i.postimg.cc/62VWfvdQ/logotipo-conex-cass-novo.jpg',STAMP='https://i.postimg.cc/47vfQ9z4/carimbo-conextv.jpg',currentUser=null,mainChart=null;
function getTodayStr(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function todayISO(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtISO(d){return d.toISOString().split('T')[0];}
function fmtPT(s){if(!s)return'-';var p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;}
function fmt(n){return new Intl.NumberFormat('pt-AO',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}
function getCurrency(){var s=DB.cache.settings;return s?s.currency||'AKZ':'AKZ';}
function val(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function parseDate(s){if(!s)return null;if(s.indexOf('/')>-1){var p=s.split('/');if(p.length===3)return new Date(p[2],p[1]-1,p[0]);}return new Date(s);}
function daysDiff(d1,d2){return Math.ceil((d2-d1)/(864e5));}
function showToast(msg,type){type=type||'success';var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast toast-'+type;t.innerHTML=(type==='success'?'✅ ':type==='danger'?'❌ ':'ℹ️ ')+msg;c.appendChild(t);setTimeout(function(){t.style.opacity='0';setTimeout(()=>t.remove(),300);},3500);}
async function logAction(action, detail){await DB.insert('audit_logs',{id:'log'+Date.now(),date:new Date().toLocaleString('pt-AO'),user:currentUser?currentUser.name:'Sistema',action:action,detail:detail||''});}
function filterTable(inputEl, tableId) { var filter = inputEl.value.toLowerCase(); var table = document.getElementById(tableId); if(!table) return; var rows = table.getElementsByTagName('tr'); for (var i = 1; i < rows.length; i++) { var cells = rows[i].getElementsByTagName('td'); var match = false; for (var j = 0; j < cells.length; j++) { if (cells[j].innerText.toLowerCase().indexOf(filter) > -1) match = true; } rows[i].style.display = match ? '' : 'none'; } }
function exportToCSV(data, filename, columns) { if(!data.length) return showToast('Sem dados','danger'); var csv = columns.map(c => c.header).join(";") + "\n"; data.forEach(row => { csv += columns.map(c => { var v = row[c.key] || ''; if(c.fmt) v = fmt(v); return '"' + String(v).replace(/"/g, '""') + '"'; }).join(";") + "\n"; }); var blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8;'}); var link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = filename+'_'+todayISO()+'.csv'; link.click(); showToast('Exportado!','info'); }

async function hashPassword(pass){try{if(window.crypto&&window.crypto.subtle){var enc=new TextEncoder().encode(pass);var buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');}}catch(e){}var h=0;for(var i=0;i<pass.length;i++){h=((h<<5)-h)+pass.charCodeAt(i);h|=0;}return'fb_'+Math.abs(h).toString(36);}
function switchTab(t){document.querySelectorAll('.login-tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.login-form').forEach(x=>x.classList.remove('active'));if(t==='login'){document.querySelector('.login-tab:first-child').classList.add('active');document.getElementById('loginForm').classList.add('active');}else{document.querySelector('.login-tab:last-child').classList.add('active');document.getElementById('registerForm').classList.add('active');}}

async function handleLogin(e){e.preventDefault();var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value,err=document.getElementById('loginError');var users=await DB.get('users');var f=users.find(x=>x.user.toLowerCase()===u.toLowerCase());if(!f){err.textContent='Utilizador não encontrado';err.classList.add('show');return false;}var h=await hashPassword(p);if(f.pass!==h){err.textContent='Senha incorrecta';err.classList.add('show');return false;}err.classList.remove('show');currentUser=f;localStorage.setItem('cx_session',f.id);await logAction('Login','Entrada');showApp();return false;}
async function handleRegister(e){e.preventDefault();var n=document.getElementById('regName').value.trim(),u=document.getElementById('regUser').value.trim(),p=document.getElementById('regPass').value,pc=document.getElementById('regPassC').value,err=document.getElementById('registerError'),suc=document.getElementById('registerSuccess');if(p!==pc){err.textContent='Senhas não coincidem';err.classList.add('show');return false;}var users=await DB.get('users');if(users.find(x=>x.user.toLowerCase()===u.toLowerCase())){err.textContent='Utilizador já existe';err.classList.add('show');return false;}var h=await hashPassword(p);await DB.insert('users',{id:'u'+Date.now(),name:n,user:u,pass:h,role:'manager',branchId:'b1',commission:0});suc.textContent='Conta criada!';suc.classList.add('show');setTimeout(()=>switchTab('login'),1500);return false;}

function showLoginScreen(){document.getElementById('loginOverlay').classList.remove('hidden');}

<div class="kpi-grid">
    <div class="kpi-card" style="background:rgba(0,255,136,.05);border-color:var(--success)"><div class="kpi-label">Receitas</div><div class="kpi-value" style="color:var(--success)">${fmt(inc)} ${cu}</div></div>
    <div class="kpi-card" style="background:rgba(255,0,110,.05);border-color:var(--danger)"><div class="kpi-label">Despesas</div><div class="kpi-value" style="color:var(--danger)">${fmt(exp)} ${cu}</div></div>

async function renderChart(trans){var m=[],i=[],e=[];for(var x=5;x>=0;x--){var d=new Date();d.setMonth(d.getMonth()-x);m.push(String(d.getMonth()+1)+'/'+d.getFullYear());var mi=0,me=0;trans.filter(t=>{var p=parseDate(t.date);return p&&p.getMonth()===d.getMonth()&&p.getFullYear()===d.getFullYear()}).forEach(t=>{if(t.type==='income')mi+=t.val;if(t.type==='expense_payment')me+=t.val;});i.push(mi);e.push(me);}var ctx=document.getElementById('dashChart').getContext('2d');if(mainChart)mainChart.destroy();mainChart=new Chart(ctx,{type:'bar',data:{labels:m,datasets:[{label:'Receitas',data:i,backgroundColor:'rgba(0,255,136,0.5)'},{label:'Despesas',data:e,backgroundColor:'rgba(255,0,110,0.5)'}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{color:'#8b9bb4'}},x:{ticks:{color:'#8b9bb4'}}}}});}

async function openModalTicket(id){var data=await DB.get('tickets');var r=id?data.find(x=>x.id===id):{};var cl=await DB.get('clients');var emps=(await DB.get('employees')).filter(e=>e.role==='Instalador');var clOpts=cl.map(c=>`<option value="${c.name}" ${r.clientName===c.name?'selected':''}>${c.name}</option>`).join('');var techOpts=emps.map(e=>`<option value="${e.name}" ${r.tech===e.name?'selected':''}>${e.name}</option>`).join('');
modal('🎧 Ticket',`<div class="form-row"><div><label>Cliente</label><select id="tClient"><option value="">--</option>${clOpts}</select></div><div><label>Técnico</label><select id="tTech"><option value="">--</option>${techOpts}</select></div></div><div class="form-row"><div><label>Assunto</label><input id="tSubject" value="${r.subject||''}"></div><div><label>Estado</label><select id="tStatus"><option ${r.status==='Aberto'?'selected':''}>Aberto</option><option ${r.status==='Em Atendimento'?'selected':''}>Em Atendimento</option><option ${r.status==='Resolvido'?'selected':''}>Resolvido</option></select></div></div><div><label>Descrição</label><textarea id="tDesc" rows="3">${r.description||''}</textarea></div>`,async()=>{var obj={id:id||'tk'+Date.now(),clientName:val('tClient'),tech:val('tTech'),subject:val('tSubject'),priority:'Média',status:val('tStatus'),description:val('tDesc'),dateCreated:id?r.dateCreated:getTodayStr()};if(id)await DB.update('tickets',id,obj);else await DB.insert('tickets',obj);await logAction('Ticket',obj.subject);showToast('Salvo!');closeModal();loadTickets();});}

async function loadCRUD(mod){var data=await DB.get(mod);var map={installations:'Instalações',employees:'RH'};var title=map[mod]||mod;var html=`<div style="display:flex;justify-content:space-between;margin-bottom:15px"><h2>${title}</h2><button class="btn btn-primary" onclick="openCRUDModal('${mod}')">➕ Novo</button></div><div class="card"><table><thead><tr><th>Detalhes</th><th>Estado</th><th>Ações</th></tr></thead><tbody>`;data.forEach(r=>{var det=r.name||r.clientName||r.role||'-';var st=r.status||r.installStatus||'-';html+=`<tr><td><strong>${det}</strong></td><td><span class="badge ${st==='Activo'||st==='done'?'bg-success':st==='pending'?'bg-warning':'bg-info'}">${st}</span></td><td><button class="btn btn-outline btn-sm" onclick="openCRUDModal('${mod}','${r.id}')">✏️</button> <button class="btn btn-danger btn-sm" onclick="delCRUD('${mod}','${r.id}')">🗑️</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function openCRUDModal(mod,id){var data=await DB.get(mod);var r=id?data.find(x=>x.id===id):{};var fields=[];var emps=await DB.get('employees');var techs=emps.filter(e=>e.role==='Instalador');if(mod==='installations')fields=[{k:'clientName',l:'Cliente'},{k:'tech',l:'Técnicos',t:'multiselect',opts:techs.map(t=>t.name)},{k:'type',l:'Tipo'},{k:'date',l:'Data'},{k:'status',l:'Estado',t:'select',opts:['pending','progress','done']}];if(mod==='employees')fields=[{k:'name',l:'Nome'},{k:'role',l:'Cargo'},{k:'department',l:'Departamento'},{k:'salary',l:'Salário',t:'number'},{k:'contact',l:'Contacto'},{k:'status',l:'Estado',t:'select',opts:['Activo','Inactivo']}];
var formHtml='<div class="form-row">';fields.forEach(f=>{var v=r[f.k]||'';formHtml+=`<div><label>${f.l}</label>`;if(f.t==='multiselect'){var sel=v?v.split(',').map(x=>x.trim()):[];formHtml+=`<select id="cf_${f.k}" multiple style="height:80px">${f.opts.map(o=>`<option value="${o}" ${sel.includes(o)?'selected':''}>${o}</option>`).join('')}</select><small style="color:var(--text-muted)">Ctrl+Click</small>`;}else if(f.t==='select')formHtml+=`<select id="cf_${f.k}">${f.opts.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;else if(f.t==='number')formHtml+=`<input type="number" id="cf_${f.k}" value="${v}">`;else formHtml+=`<input type="text" id="cf_${f.k}" value="${v}">`;formHtml+=`</div>`;});formHtml+='</div>';modal('Registo',formHtml,async()=>{var obj={id:id||mod[0]+Date.now()};fields.forEach(f=>{var el=document.getElementById('cf_'+f.k);if(f.t==='multiselect'){var s=[];for(var i=0;i<el.options.length;i++){if(el.options[i].selected)s.push(el.options[i].value);}obj[f.k]=s.join(', ');}else{obj[f.k]=f.t==='number'?parseFloat(el.value)||0:el.value;}});if(id)await DB.update(mod,id,obj);else await DB.insert(mod,obj);await logAction('Salvar',mod);showToast('Salvo!');closeModal();loadCRUD(mod);});}
async function delCRUD(mod,id){if(!confirm('Eliminar?'))return;await DB.del(mod,id);showToast('Eliminado!');loadCRUD(mod);}

async function openModalDocGen(preselectedClientId){ tempDocItems=[]; var cls=await DB.get('clients'),inv=await DB.get('inventory'),cfg=DB.cache.settings; var co=cls.map(c=>`<option value="${c.id}" ${preselectedClientId===c.id?'selected':''}>${c.name} (${c.clientType||'Internet'})</option>`).join(''); var invOpts='<option value="">-- Selecione --</option>'+inv.map(i=>`<option value="${i.id}|${i.name}|${i.val}">${i.name} (${i.qty})</option>`).join(''); modal('📄 Documento',`<div class="form-row"><div><label>Cliente</label><select id="docClient" ${preselectedClientId?'disabled':''}>${co}</select></div><div><label>Tipo</label><select id="docType"><option value="FR">Fatura-Recibo</option><option value="FT">Fatura</option><option value="FP">Pró-forma</option></select></div></div><div class="form-row"><div><label>Método</label><select id="docMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div><div><label>Vencimento</label><input type="date" id="docDueDate" value="${fmtISO(addDays(new Date(),30))}"></div></div><hr><h4>Itens</h4><div class="form-row"><div style="flex:2"><label>Item Stock</label><select id="itemStock" onchange="autoFillItem()">${invOpts}</select></div><div style="flex:3"><label>Descrição</label><input id="itemDesc"></div><div style="flex:1"><label>Qtd</label><input type="number" id="itemQty" value="1" min="1"></div><div style="flex:2"><label>Preço</label><input type="number" id="itemPrice" value="0"></div><div style="flex:0.5;display:flex;align-items:flex-end"><button class="btn btn-success" onclick="addDocItem()">➕</button></div></div><div style="max-height:150px;overflow-y:auto;margin-bottom:10px"><table><thead><tr><th>Desc</th><th>Qtd</th><th>Total</th><th></th></tr></thead><tbody id="docItemsTable"></tbody></table></div><div style="text-align:right;font-size:1.2rem;font-family:Orbitron">Total: <span id="docTotalPreview">0.00</span> ${getCurrency()}</div>`,async()=>{var cId=preselectedClientId||val('docClient'),type=val('docType');var client=cls.find(x=>x.id===cId);if(!client)return showToast('Cliente!','danger');if(!tempDocItems.length)return showToast('Adicione itens!','danger');var sub=tempDocItems.reduce((a,b)=>a+b.total,0);var tr=(cfg.taxRate||0)/100,tax=sub*tr,total=sub+tax;cfg.docSeq=(cfg.docSeq||0)+1;var docId=type+new Date().getFullYear()+'/'+String(cfg.docSeq).padStart(4,'0');var isPaid=(type==='FR');var docDbId='d'+Date.now();var dueD=val('docDueDate');for(let item of tempDocItems){if(item.invId){var prod=DB.cache.inventory.find(p=>p.id===item.invId);if(prod&&prod.qty>=item.qty){await DB.update('inventory',item.invId,{qty:prod.qty-item.qty});await DB.insert('stock_movements',{id:'sm'+Date.now()+i,itemId:item.invId,itemName:item.name,type:'out',qty:item.qty,date:getTodayStr(),note:'Venda '+docId});}else if(prod){showToast('Stock insuficiente: '+item.desc,'danger');return;}}}if(type!=='FP'){if(type==='FT')await DB.update('clients',cId,{divida:(client.divida||0)+total});await DB.insert('transactions',{id:'t'+Date.now(),docId:docId,docType:type,type:'income',val:total,date:getTodayStr(),dueDate:dueD,desc:type+' '+client.name,status:isPaid?'paid':'pending',met:val('docMet')});}await DB.update('settings',1,{docSeq:cfg.docSeq});await DB.insert('documents',{id:docDbId,docId:docId,docType:type,clientId:cId,clientName:client.name,clientNif:client.nif||'',clientAddress:client.address||'',clientContact:client.contact||'',clientEmail:client.email||'',date:getTodayStr(),dueDate:dueD,items:tempDocItems,subtotal:sub,tax:tax,total:total,paidVal:isPaid?total:0,status:isPaid?'paid':'pending',met:(type==='FP')?'N/A':val('docMet'),currency:getCurrency()});await logAction('Emitir',docId);showToast('Emitido!');closeModal();loadCommercial();},'Emitir','btn-success');}
function autoFillItem(){var s=val('itemStock');if(s){var p=s.split('|');document.getElementById('itemDesc').value=p[1];document.getElementById('itemPrice').value=p[2];}}
function addDocItem(){var s=val('itemStock');var invId=s?s.split('|')[0]:'';var desc=val('itemDesc'),qty=parseInt(val('itemQty'))||1,price=parseFloat(val('itemPrice'))||0;if(!desc)return;tempDocItems.push({invId:invId,desc:desc,qty:qty,price:price,total:qty*price});document.getElementById('itemDesc').value='';document.getElementById('itemPrice').value='0';document.getElementById('itemStock').value='';renderDocItemsTable();}
function removeDocItem(index){tempDocItems.splice(index,1);renderDocItemsTable();}
function renderDocItemsTable(){var html='';tempDocItems.forEach((item,i)=>{html+=`<tr><td>${item.desc}</td><td>${item.qty}</td><td>${fmt(item.total)}</td><td><button class="btn btn-danger btn-sm" onclick="removeDocItem(${i})">✕</button></td></tr>`;});document.getElementById('docItemsTable').innerHTML=html;var total=tempDocItems.reduce((a,b)=>a+b.total,0);document.getElementById('docTotalPreview').innerText=fmt(total);}

function getDocTemplate(d, cfg){ var typeMap={'FR':'Fatura-Recibo','FT':'Fatura','FP':'Pró-forma'}; var isPaid=d.status==='paid'; var itemsRows=''; if(d.items&&d.items.length>0){d.items.forEach(item=>{itemsRows+=`<tr><td>${item.desc}</td><td style="text-align:center">${item.qty}</td><td style="text-align:right">${fmt(item.price)} ${d.currency}</td><td style="text-align:right">${fmt(item.total)} ${d.currency}</td></tr>`;});} else {itemsRows=`<tr><td>Serviço</td><td>1</td><td>${fmt(d.subtotal)} ${d.currency}</td><td>${fmt(d.subtotal)} ${d.currency}</td></tr>`;} return `<div class="invoice-container" id="docContentPrint"><div class="invoice-header"><div style="display:flex;align-items:center;gap:15px"><img src="${LOGO}" class="invoice-logo" style="max-width:80px;border-radius:50%"><div><h2 style="margin:0;font-size:16px">${cfg.name}</h2><p style="margin:2px 0;font-size:10px">NIF: ${cfg.nif}</p></div></div><div style="text-align:right"><div style="font-size:18px;font-weight:bold">${typeMap[d.docType]}</div><p style="font-size:12px;font-weight:bold">${d.docId}</p><p>Data: ${d.date}</p></div></div><div style="display:flex;gap:20px;margin-bottom:15px"><div class="invoice-box" style="flex:1"><strong>Cliente:</strong><br>${d.clientName}<br>NIF: ${d.clientNif||'---'}<br>${d.clientAddress||''}</div><div class="invoice-box" style="flex:1;text-align:right"><strong>Met:</strong><br>${d.met||'N/A'}<br><strong>Venc:</strong> ${d.dueDate?fmtPT(d.dueDate):'N/A'}<br><strong>Estado:</strong> ${isPaid?'PAGO':d.status==='partial'?'PARCIAL':'PENDENTE'}</div></div><table class="invoice-table"><thead><tr><th>Desc</th><th style="text-align:center">Qtd</th><th style="text-align:right">Preço</th><th style="text-align:right">Total</th></tr></thead><tbody>${itemsRows}</tbody></table><div style="display:flex;justify-content:flex-end"><div style="width:250px"><div style="display:flex;justify-content:space-between;padding:4px 0"><span>Subtotal:</span><span>${fmt(d.subtotal)} ${d.currency}</span></div><div style="display:flex;justify-content:space-between;padding:4px 0"><span>IVA:</span><span>${fmt(d.tax)} ${d.currency}</span></div><div style="border-top:2px solid #000;margin-top:5px;padding-top:5px;display:flex;justify-content:space-between;font-size:14px;font-weight:bold"><span>TOTAL:</span><span>${fmt(d.total)} ${d.currency}</span></div></div></div>${isPaid?`<img src="${STAMP}" class="invoice-stamp" style="position:absolute;bottom:40px;right:40px;width:120px;opacity:0.8;transform:rotate(-15deg)">`:''}<div style="margin-top:20px;text-align:center"><canvas id="qrCanvas" style="display:none"></canvas><img id="qrImg" style="width:80px;height:80px;display:none"></div><div class="invoice-footer">Processado por Conex Cass ERP</div></div>`; }
function getThermalTemplate(d, cfg){ var itemsRows=''; if(d.items&&d.items.length>0){d.items.forEach(item=>{itemsRows+=`<tr><td>${item.desc}</td><td>${item.qty}x</td><td>${fmt(item.total)}</td></tr>`;});} return `<div style="font-family:'Courier New',monospace;font-size:12px;width:280px;margin:auto;padding:10px"><div style="text-align:center;border-bottom:1px dashed #000;padding-bottom:5px"><h3 style="margin:0">${cfg.name}</h3><p style="margin:0;font-size:10px">NIF: ${cfg.nif}</p></div><div style="border-bottom:1px dashed #000;padding:5px 0"><p>${d.docId} | ${d.date}</p><p><strong>Cliente:</strong> ${d.clientName}</p></div><table style="width:100%;border-collapse:collapse;margin:5px 0">${itemsRows}</table><div style="border-top:1px dashed #000;text-align:right;padding:5px 0"><h3>TOTAL: ${fmt(d.total)} ${d.currency}</h3></div></div>`; }

async function viewDoc(id){var docs=await DB.get('documents');var d=docs.find(x=>x.id===id);if(!d)return;var cfg=DB.cache.settings;document.getElementById('docTitle').innerText=d.docId;document.getElementById('docBody').innerHTML=getDocTemplate(d,cfg);document.getElementById('modalDocFooter').innerHTML=`<button class="btn btn-primary" onclick="printDocPDF('${id}')">📄 PDF A4</button><button class="btn btn-warning" onclick="printDocThermal('${id}')">🧾 POS</button><button class="btn btn-success" onclick="shareWhatsApp('${id}')">📱 WhatsApp</button><button class="btn btn-outline" onclick="closeModalDoc()">Fechar</button>`;document.getElementById('modalDoc').classList.add('show');generateQR(d.docId);}
async function generateQR(text){try{var c=document.getElementById('qrCanvas');if(!c)return;await QRCode.toCanvas(c,text,{width:80});var img=document.getElementById('qrImg');img.src=c.toDataURL();img.style.display='inline-block';c.style.display='none';}catch(e){}}
async function printDocPDF(id){var docs=await DB.get('documents');var d=docs.find(x=>x.id===id);if(!d)return;var cfg=DB.cache.settings;var tempDiv=document.createElement('div');tempDiv.innerHTML=getDocTemplate(d,cfg);tempDiv.style.position='absolute';tempDiv.style.left='-9999px';document.body.appendChild(tempDiv);try{await generateQR(d.docId);var imgEl=tempDiv.querySelector('#qrImg');var canvasEl=tempDiv.querySelector('#qrCanvas');if(imgEl&&canvasEl){imgEl.src=canvasEl.toDataURL();imgEl.style.display='inline-block';canvasEl.style.display='none';}}catch(e){}await html2pdf().from(tempDiv.querySelector('.invoice-container')).set({margin:[5,5,5,5],filename:d.docId.replace(/\//g,'_')+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).save();document.body.removeChild(tempDiv);showToast('PDF Gerado!','info');}
function printDocThermal(id){var d=DB.cache.documents.find(x=>x.id===id);if(!d)return;var cfg=DB.cache.settings;var w=window.open('','_blank','width=320,height=600');w.document.write('<html><body>'+getThermalTemplate(d,cfg)+'</body></html>');w.document.close();w.focus();w.print();}
async function shareWhatsApp(id){var d=(await DB.get('documents')).find(x=>x.id===id);if(!d)return;var phone=(d.clientContact||'').replace(/\s/g,'').replace('+','');if(!phone.startsWith('244'))phone='244'+phone.replace(/^0/,'');var msg=`Olá ${d.clientName}!%0ADoc: *${d.docId}*%0AValor: *${fmt(d.total)} ${d.currency}*%0AObrigado!`;window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${msg}`,'_blank');}
async function autoSendWhatsApp(docId,docIdStr,client,total,currency){ var cfg=DB.cache.settings; if(!cfg.whatsapp_api||!cfg.whatsapp_key||!client.contact) return; var phone=client.contact.replace(/\s/g,'').replace('+',''); if(!phone.startsWith('244'))phone='244'+phone.replace(/^0/,''); var msg=`Olá ${client.name}! Novo doc da *${cfg.name}*: *${docIdStr}*\nValor: *${fmt(total)} ${currency}*`; try{await fetch(`${cfg.whatsapp_api}/message/sendText/${cfg.whatsapp_key}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':cfg.whatsapp_key},body:JSON.stringify({number:phone,text:msg})});await logAction('Auto WA',docIdStr);}catch(e){}}
function openClientPortal(){modal('🌐 Portal',`<p>Insira NIF ou Contacto</p><div class="form-row"><div><label>NIF / Telefone</label><input id="portalNif"></div></div>`,async()=>{var search=val('portalNif');var client=(await DB.get('clients')).find(c=>c.nif===search||c.contact===search);if(!client)return showToast('Não encontrado!','danger');var docs=(await DB.get('documents')).filter(d=>d.clientId===client.id).slice().reverse();var html=`<h3>${client.name}</h3><p>Dívida: <span class="badge ${client.divida>0?'bg-danger':'bg-success'}">${client.divida>0?'SIM':'NÃO'}</span></p><hr><table><thead><tr><th>Doc</th><th>Valor</th><th>Estado</th></tr></thead><tbody>`;docs.forEach(d=>{html+=`<tr><td>${d.docId}</td><td>${fmt(d.total)}</td><td><span class="badge ${d.status==='paid'?'bg-success':'bg-warning'}">${d.status==='paid'?'PAGO':'PEND.'}</span></td></tr>`;});html+=`</tbody></table>`;document.getElementById('modalBody').innerHTML=html;document.getElementById('modalFooter').innerHTML='<button class="btn btn-outline" onclick="closeModal()">Fechar</button>';},'Procurar','btn-primary');}

// ==================== ESTOQUE COM HISTÓRICO ====================
async function loadStock(){var inv=await DB.get('inventory');var html=`<div style="display:flex;justify-content:space-between;margin-bottom:15px"><h2>Stock</h2><button class="btn btn-primary btn-sm" onclick="openModalItem()">➕ Novo</button></div><div class="card"><table><thead><tr><th>Produto</th><th>Cat</th><th>Preço</th><th>Stock</th><th>Ações</th></tr></thead><tbody>`;inv.forEach(i=>{var qClass=i.qty>5?'bg-success':i.qty>0?'bg-warning':'bg-danger';html+=`<tr style="${i.qty>0&&i.qty<=5?'background:rgba(255,195,0,.05)':''}"><td>${i.name}</td><td><span class="badge bg-info">${i.cat||'-'}</span></td><td>${fmt(i.val)}</td><td><span class="badge ${qClass}">${i.qty}</span></td><td><button class="btn btn-info btn-sm" onclick="addStock('${i.id}')">➕ Entrada</button> <button class="btn btn-outline btn-sm" onclick="openModalItem('${i.id}')">✏️</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function addStock(id){var it=DB.cache.inventory.find(i=>i.id===id);modal('➕ Entrada Stock',`<p>Produto: <strong>${it.name}</strong> (Stock atual: ${it.qty})</p><div class="form-row"><div><label>Quantidade</label><input type="number" id="stockInQty" min="1"></div><div><label>Motivo</label><input id="stockInNote" value="Compra"></div></div>`,async()=>{var q=parseInt(val('stockInQty'));if(!q)return;await DB.update('inventory',id,{qty:it.qty+q});await DB.insert('stock_movements',{id:'sm'+Date.now(),itemId:id,itemName:it.name,type:'in',qty:q,date:getTodayStr(),note:val('stockInNote')});await logAction('Entrada Stock',it.name+' +'+q);showToast('Adicionado!');closeModal();loadStock();},'Adicionar','btn-success');}
async function openModalItem(id){var inv=await DB.get('inventory');var it=id?inv.find(x=>x.id===id):{name:'',val:0,qty:0,cat:'Equipamento'};modal('Produto',`<div class="form-row"><div><label>Nome *</label><input id="iName" value="${it.name}"></div><div><label>Categoria</label><select id="iCat"><option ${it.cat==='Equipamento'?'selected':''}>Equipamento</option><option ${it.cat==='Dispositivo'?'selected':''}>Dispositivo</option><option ${it.cat==='Acessório'?'selected':''}>Acessório</option></select></div></div><div class="form-row"><div><label>Preço</label><input type="number" id="iVal" value="${it.val}"></div><div><label>Stock Inicial</label><input type="number" id="iQty" value="${it.qty}"></div></div>`,async()=>{var data={name:val('iName'),cat:val('iCat'),val:parseFloat(val('iVal'))||0,qty:parseInt(val('iQty'))||0,branchId:'b1'};if(id)await DB.update('inventory',id,data);else{data.id='i'+Date.now();await DB.insert('inventory',data);}await logAction('Produto',data.name);showToast('Salvo!');closeModal();loadStock();});}

// ==================== PLANOS E REDE ====================
async function loadPlans(){var sp=await DB.get('speeds'),pl=await DB.get('plans'),cu=getCurrency();var html=`<h2>Planos</h2><div class="card"><h3>Internet</h3><div class="form-row"><div><label>Período</label><select id="nSP"><option>Mensal</option></select></div><div><label>Nome</label><input id="nSN" placeholder="5 MB"></div><div><label>Preço</label><input type="number" id="nSPr"></div><div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addSp()">➕</button></div></div><table><thead><tr><th>Nome</th><th>Preço</th></tr></thead><tbody>`;sp.forEach(s=>{html+=`<tr><td>${s.nome}</td><td>${fmt(s.preco)} ${cu}</td></tr>`;});html+=`</tbody></table></div><div class="card"><h3>Streaming</h3><div class="form-row"><div><label>Serviço</label><input id="nPN" placeholder="NETFLIX"></div><div><label>Preço</label><input type="number" id="nPP"></div><div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addPl()">➕</button></div></div><table><thead><tr><th>Serviço</th><th>Preço</th></tr></thead><tbody>`;pl.forEach(p=>{html+=`<tr><td>${p.nome}</td><td>${fmt(p.preco)} ${cu}</td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function addSp(){var n=val('nSN'),pr=parseFloat(val('nSPr'));if(!n||!pr)return;await DB.insert('speeds',{id:'s'+Date.now(),nome:n,preco:pr,period:'Mensal',days:30});showToast('Criado!');loadPlans();}
async function addPl(){var n=val('nPN'),pr=parseFloat(val('nPP'));if(!n||!pr)return;await DB.insert('plans',{id:'p'+Date.now(),nome:n,preco:pr});showToast('Criado!');loadPlans();}
async function loadNetwork(){var cl=await DB.get('clients');var html=`<h2>Rede</h2><div class="card"><table><thead><tr><th>Nome</th><th>Net</th><th>Ação</th></tr></thead><tbody>`;cl.filter(c=>c.ip||c.mac).forEach(c=>{html+=`<tr><td>${c.name}</td><td><span class="badge ${c.networkBlocked?'bg-danger':'bg-success'}">${c.networkBlocked?'BLOQ':'ON'}</span></td><td><button class="btn btn-${c.networkBlocked?'success':'danger'} btn-sm" onclick="togNet('${c.id}',${!c.networkBlocked})">${c.networkBlocked?'✅':'🚫'}</button></td></tr>`;});html+=`</tbody></table></div>`;document.getElementById('appContent').innerHTML=html;}
async function togNet(id,block){var cl=(await DB.get('clients')).find(c=>c.id===id);if(cl)await DB.update('clients',id,{networkBlocked:block});showToast(block?'Bloqueado':'Liberado!');loadNetwork();}

// ==================== RENOVAÇÕES ====================
async function loadRenewals(){var cl=(await DB.get('clients')).filter(c=>c.speedId&&c.validade),hoje=new Date();var cu=getCurrency();
var renewals=cl.map(c=>{var vDate=parseDate(c.validade);var dias=vDate?daysDiff(hoje,vDate):-999;return{...c,vDate,dias};}).sort((a,b)=>a.dias-b.dias);
var html=`<h2>🔄 Renovações</h2>
<div class="kpi-grid">
    <div class="kpi-card" style="background:rgba(255,0,110,.05);border-color:var(--danger)"><div class="kpi-label">Vencidas</div><div class="kpi-value" style="color:var(--danger)">${renewals.filter(r=>r.dias<0).length}</div></div>
    <div class="kpi-card" style="background:rgba(255,195,0,.05);border-color:var(--warning)"><div class="kpi-label">Vencem em 7 dias</div><div class="kpi-value" style="color:var(--warning)">${renewals.filter(r=>r.dias>=0&&r.dias<=7).length}</div></div>
    <div class="kpi-card" style="background:rgba(0,255,136,.05);border-color:var(--success)"><div class="kpi-label">Vigentes</div><div class="kpi-value" style="color:var(--success)">${renewals.filter(r=>r.dias>7).length}</div></div>
</div>
<div class="card"><table><thead><tr><th>Cliente</th><th>Plano</th><th>Validade</th><th>Dias</th><th>Estado</th><th>Ação</th></tr></thead><tbody>`;
renewals.forEach(r=>{
    var sc=r.dias<0?'bg-danger':r.dias<=7?'bg-warning':'bg-success';
    var st=r.dias<0?'VENCIDO':r.dias<=7?'A VENCER':'VIGENTE';
    html+=`<tr style="${r.dias<0?'background:rgba(255,0,110,.05)':''}"><td><strong>${r.name}</strong></td><td>${r.pkg||'-'}</td><td>${fmtPT(r.validade)}</td><td><strong style="color:${r.dias<0?'var(--danger)':r.dias<=7?'var(--warning)':'var(--success)'}">${r.dias<0?r.dias:'+'+r.dias} dias</strong></td><td><span class="badge ${sc}">${st}</span></td><td><button class="btn btn-success btn-sm" onclick="renewClient('${r.id}')">🔄 Renovar</button></td></tr>`;
});
if(!renewals.length)html+=`<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Nenhum cliente com plano de internet</td></tr>`;
html+=`</tbody></table></div>`;
document.getElementById('appContent').innerHTML=html;}

async function renewClient(id){var c=(await DB.get('clients')).find(x=>x.id===id);var speeds=await DB.get('speeds');var sp=c.speedId?speeds.find(s=>s.id===c.speedId):null;var days=sp?sp.days:30;var newValidade=fmtISO(addDays(new Date(),days));var cu=getCurrency();
modal('🔄 Renovar: '+c.name,`<p>Plano: <strong>${c.pkg||'N/A'}</strong> | Mensalidade: <strong>${fmt(c.mens)} ${cu}</strong></p><p>Nova validade: <strong>${fmtPT(newValidade)}</strong></p><div class="form-row"><div><label>Valor Pago</label><input type="number" id="renewVal" value="${c.mens||0}"></div><div><label>Método</label><select id="renewMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div></div>`,async()=>{
    var v=parseFloat(val('renewVal'))||0;
    await DB.update('clients',id,{validade:newValidade,divida:c.divida+(c.mens-v)});
    if(v>0)await DB.insert('transactions',{id:'t'+Date.now(),type:'income',val:v,date:getTodayStr(),desc:'Renovação '+c.name,status:'paid',met:val('renewMet')});
    await logAction('Renovação',c.name+' até '+fmtPT(newValidade));
    showToast('Renovado!');closeModal();loadRenewals();
},'Renovar','btn-success');}

// ==================== CAIXA ====================
async function loadCash(){var cr=DB.cache.cash_register||{};var t=await DB.get('transactions');var cu=getCurrency();var hoje=getTodayStr();
var tHoje=t.filter(x=>x.date===hoje);var incHoje=tHoje.filter(x=>x.type==='income').reduce((a,b)=>a+b.val,0);var expHoje=tHoje.filter(x=>x.type==='expense_payment'||x.type==='expense').reduce((a,b)=>a+b.val,0);
var isOpen=cr.status==='open';
var html=`<h2>💰 Caixa</h2>
<div class="kpi-grid">
    <div class="kpi-card" style="background:rgba(0,180,216,.05);border-color:var(--primary)"><div class="kpi-label">Estado</div><div class="kpi-value" style="color:${isOpen?'var(--success)':'var(--danger)'}">${isOpen?'ABERTA':'FECHADA'}</div></div>
    <div class="kpi-card" style="background:rgba(0,255,136,.05);border-color:var(--success)"><div class="kpi-label">Entradas Hoje</div><div class="kpi-value" style="color:var(--success)">${fmt(incHoje)} ${cu}</div></div>
    <div class="kpi-card" style="background:rgba(255,0,110,.05);border-color:var(--danger)"><div class="kpi-label">Saídas Hoje</div><div class="kpi-value" style="color:var(--danger)">${fmt(expHoje)} ${cu}</div></div>
    <div class="kpi-card" style="background:rgba(255,195,0,.05);border-color:var(--warning)"><div class="kpi-label">Saldo Hoje</div><div class="kpi-value" style="color:${incHoje-expHoje>=0?'var(--success)':'var(--danger)'}">${fmt(incHoje-expHoje)} ${cu}</div></div>
</div>
<div class="card"><h3>Controlo</h3>
    ${isOpen?`
    <p><strong>Aberto por:</strong> ${cr.openedBy||'-'} | <strong>Abertura:</strong> ${cr.openedAt||'-'} | <strong>Fundo:</strong> ${fmt(cr.openingFund||0)} ${cu}</p>
    <div style="display:flex;gap:10px;margin-top:10px">
        <button class="btn btn-success" onclick="addCashMov('in')">➕ Entrada</button>
        <button class="btn btn-danger" onclick="addCashMov('out')">➖ Saída</button>
        <button class="btn btn-warning" onclick="closeCashRegister()">🔒 Fechar Caixa</button>
    </div>`:`
    <div class="form-row"><div><label>Fundo de Abertura (AKZ)</label><input type="number" id="cashOpenFund" value="0"></div></div>
    <button class="btn btn-success" onclick="openCashRegister()">🔓 Abrir Caixa</button>`}
</div>
<div class="card"><h3>Movimentos de Hoje</h3><table><thead><tr><th>Hora</th><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Método</th></tr></thead><tbody>`;
tHoje.forEach(tx=>{
    var isInc=tx.type==='income';
    html+=`<tr><td>${tx.date}</td><td><span class="badge ${isInc?'bg-success':'bg-danger'}">${isInc?'ENTRADA':'SAÍDA'}</span></td><td>${tx.desc||'-'}</td><td class="${isInc?'text-success':'text-danger'}">${isInc?'+':'-'}${fmt(tx.val)}</td><td>${tx.met||'-'}</td></tr>`;
});
if(!tHoje.length)html+=`<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Sem movimentos hoje</td></tr>`;
html+=`</tbody></table></div>`;
document.getElementById('appContent').innerHTML=html;}

async function openCashRegister(){var fund=parseFloat(val('cashOpenFund'))||0;
await DB.upsert('cash_register',{id:1,status:'open',openedAt:new Date().toLocaleString('pt-AO'),openedBy:currentUser.name,openingFund:fund,closingFund:0,notes:''});
await logAction('Abrir Caixa','Fundo: '+fmt(fund));showToast('Caixa Aberta!');loadCash();}

async function closeCashRegister(){if(!confirm('Fechar caixa?'))return;var cr=DB.cache.cash_register;
await DB.upsert('cash_register',{id:1,status:'closed',closedAt:new Date().toLocaleString('pt-AO'),closedBy:currentUser.name,openingFund:cr.openingFund||0,closingFund:0,notes:''});
await logAction('Fechar Caixa','');showToast('Caixa Fechada!');loadCash();}

async function addCashMov(dir){var label=dir==='in'?'Entrada':'Saída';var cu=getCurrency();
modal(dir==='in'?'➕ Entrada Caixa':'➖ Saída Caixa',`<div class="form-row"><div><label>Valor (${cu})</label><input type="number" id="cashMovVal"></div><div><label>Descrição</label><input id="cashMovDesc"></div><div><label>Método</label><select id="cashMovMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div></div>`,async()=>{
    var v=parseFloat(val('cashMovVal'));if(!v)return;
    await DB.insert('transactions',{id:'t'+Date.now(),type:dir==='in'?'income':'expense',val:v,date:getTodayStr(),desc:val('cashMovDesc')||label,status:dir==='in'?'paid':'unpaid',met:val('cashMovMet')});
    await logAction(label+' Caixa',fmt(v));showToast('Registado!');closeModal();loadCash();
},label,dir==='in'?'btn-success':'btn-danger');}

// ==================== RELATÓRIOS ====================
async function loadReports(){var cu=getCurrency();
var html=`<h2>📈 Relatórios</h2>
<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px">
    <div class="card" style="cursor:pointer" onclick="reportRevenue()"><h3>📊 Receitas vs Despesas</h3><p style="color:var(--text-muted)">Comparativo mensal detalhado</p></div>
    <div class="card" style="cursor:pointer" onclick="reportClients()"><h3>👥 Clientes</h3><p style="color:var(--text-muted)">Listagem e métricas de clientes</p></div>
    <div class="card" style="cursor:pointer" onclick="reportDebt()"><h3>💸 Dívidas</h3><p style="color:var(--text-muted)">Clientes em dívida e aging</p></div>
    <div class="card" style="cursor:pointer" onclick="reportStock()"><h3>📦 Stock</h3><p style="color:var(--text-muted)">Posição de inventário</p></div>
    <div class="card" style="cursor:pointer" onclick="reportServices()"><h3>📡 Serviços</h3><p style="color:var(--text-muted)">Distribuição de planos e streamings</p></div>
    <div class="card" style="cursor:pointer" onclick="reportCashFlow()"><h3>💰 Fluxo de Caixa</h3><p style="color:var(--text-muted)">Todas as movimentações</p></div>
</div>`;
document.getElementById('appContent').innerHTML=html;}

async function reportRevenue(){var t=await DB.get('transactions');var cu=getCurrency();var months={};
t.forEach(tx=>{var d=parseDate(tx.date);if(!d)return;var key=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();if(!months[key])months[key]={inc:0,exp:0};if(tx.type==='income')months[key].inc+=tx.val;if(tx.type==='expense_payment'||tx.type==='expense')months[key].exp+=tx.val;});
var html=`<h2>📊 Receitas vs Despesas</h2><div class="card"><table><thead><tr><th>Mês</th><th>Receitas</th><th>Despesas</th><th>Lucro</th><th>Margem</th></tr></thead><tbody>`;
Object.keys(months).sort().forEach(k=>{var m=months[k];var lucro=m.inc-m.exp;var margem=m.inc>0?((lucro/m.inc)*100).toFixed(1):'0';
html+=`<tr><td><strong>${k}</strong></td><td class="text-success">${fmt(m.inc)}</td><td class="text-danger">${fmt(m.exp)}</td><td style="color:${lucro>=0?'var(--success)':'var(--danger)'};font-weight:bold">${fmt(lucro)}</td><td>${margem}%</td></tr>`;});
html+=`</tbody></table></div><div style="margin-top:15px"><button class="btn btn-success btn-sm" onclick="exportRevenueCSV()">📤 Exportar CSV</button></div>`;
document.getElementById('appContent').innerHTML=html;}

function exportRevenueCSV(){var t=DB.cache.transactions;var data=t.map(tx=>({date:tx.date,type:tx.type,val:tx.val,desc:tx.desc||'',met:tx.met||'',status:tx.status||''}));
exportToCSV(data,'Receitas_Despesas',[{key:'date',header:'Data'},{key:'type',header:'Tipo'},{key:'val',header:'Valor',fmt:true},{key:'desc',header:'Descrição'},{key:'met',header:'Método'},{key:'status',header:'Estado'}]);}

async function reportClients(){var cl=await DB.get('clients');var cu=getCurrency();var total=cl.length;var internet=cl.filter(c=>c.clientType==='Internet'||!c.clientType).length;var avulso=cl.filter(c=>c.clientType==='Avulso').length;var emDivida=cl.filter(c=>c.divida>0).length;var totalDivida=cl.reduce((a,b)=>a+(b.divida||0),0);
var html=`<h2>👥 Relatório de Clientes</h2>
<div class="kpi-grid">
    <div class="kpi-card" style="background:rgba(0,180,216,.05);border-color:var(--primary)"><div class="kpi-label">Total</div><div class="kpi-value">${total}</div></div>
    <div class="kpi-card" style="background:rgba(0,255,136,.05);border-color:var(--success)"><div class="kpi-label">Internet</div><div class="kpi-value" style="color:var(--success)">${internet}</div></div>
    <div class="kpi-card" style="background:rgba(157,78,221,.05);border-color:#9d4edd"><div class="kpi-label">Avulso</div><div class="kpi-value" style="color:#9d4edd">${avulso}</div></div>
    <div class="kpi-card" style="background:rgba(255,0,110,.05);border-color:var(--danger)"><div class="kpi-label">Em Dívida</div><div class="kpi-value" style="color:var(--danger)">${emDivida} (${fmt(totalDivida)} ${cu})</div></div>
</div>
<div class="card"><table><thead><tr><th>Nome</th><th>Tipo</th><th>Contacto</th><th>Serviço</th><th>Dívida</th><th>Validade</th></tr></thead><tbody>`;
cl.forEach(c=>{html+=`<tr><td>${c.name}</td><td><span class="badge ${c.clientType==='Avulso'?'bg-avulso':'bg-success'}">${c.clientType||'Internet'}</span></td><td>${c.contact||'-'}</td><td>${c.pkg||'-'}</td><td class="${c.divida>0?'text-danger':''}">${c.divida>0?fmt(c.divida):'-'}</td><td>${c.validade?fmtPT(c.validade):'-'}</td></tr>`;});
html+=`</tbody></table></div><div style="margin-top:15px"><button class="btn btn-success btn-sm" onclick="exportClientsExcel()">📤 Exportar CSV</button> <button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button></div>`;
document.getElementById('appContent').innerHTML=html;}

async function reportDebt(){var cl=await DB.get('clients').then(c=>c.filter(x=>x.divida>0));var cu=getCurrency();var totalDivida=cl.reduce((a,b)=>a+b.divida,0);
var html=`<h2>💸 Relatório de Dívidas</h2>
<div class="kpi-grid">
    <div class="kpi-card" style="background:rgba(255,0,110,.05);border-color:var(--danger)"><div class="kpi-label">Total em Dívida</div><div class="kpi-value" style="color:var(--danger)">${fmt(totalDivida)} ${cu}</div></div>
    <div class="kpi-card" style="background:rgba(255,195,0,.05);border-color:var(--warning)"><div class="kpi-label">Clientes</div><div class="kpi-value" style="color:var(--warning)">${cl.length}</div></div>
</div>
<div class="card"><table><thead><tr><th>Cliente</th><th>Contacto</th><th>Dívida</th><th>Serviço</th><th>Ação</th></tr></thead><tbody>`;
cl.sort((a,b)=>b.divida-a.divida).forEach(c=>{html+=`<tr><td><strong>${c.name}</strong></td><td>${c.contact||'-'}</td><td class="text-danger">${fmt(c.divida)}</td><td>${c.pkg||'-'}</td><td><button class="btn btn-success btn-sm" onclick="payClientGeneral('${c.id}');loadReports()">💳 Cobrar</button></td></tr>`;});
if(!cl.length)html+=`<tr><td colspan="5" style="text-align:center;color:var(--success)">Sem dívidas! 🎉</td></tr>`;
html+=`</tbody></table></div><div style="margin-top:15px"><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button></div>`;
document.getElementById('appContent').innerHTML=html;}

async function reportStock(){var inv=await DB.get('inventory');var cu=getCurrency();var totalVal=inv.reduce((a,b)=>a+(b.val*b.qty),0);
var html=`<h2>📦 Relatório de Stock</h2>
<div class="kpi-grid">
    <div class="kpi-card" style="background:rgba(0,180,216,.05);border-color:var(--primary)"><div class="kpi-label">Total Itens</div><div class="kpi-value">${inv.length}</div></div>
    <div class="kpi-card" style="background:rgba(0,255,136,.05);border-color:var(--success)"><div class="kpi-label">Valor em Stock</div><div class="kpi-value" style="color:var(--success)">${fmt(totalVal)} ${cu}</div></div>
    <div class="kpi-card" style="background:rgba(255,0,110,.05);border-color:var(--danger)"><div class="kpi-label">Stock Baixo (≤5)</div><div class="kpi-value" style="color:var(--danger)">${inv.filter(i=>i.qty>0&&i.qty<=5).length}</div></div>
    <div class="kpi-card" style="background:rgba(255,195,0,.05);border-color:var(--warning)"><div class="kpi-label">Esgotados</div><div class="kpi-value" style="color:var(--warning)">${inv.filter(i=>i.qty<=0).length}</div></div>
</div>
<div class="card"><table><thead><tr><th>Produto</th><th>Categoria</th><th>Preço</th><th>Qtd</th><th>Valor Total</th></tr></thead><tbody>`;
inv.forEach(i=>{var qc=i.qty>5?'bg-success':i.qty>0?'bg-warning':'bg-danger';
html+=`<tr><td>${i.name}</td><td><span class="badge bg-info">${i.cat||'-'}</span></td><td>${fmt(i.val)}</td><td><span class="badge ${qc}">${i.qty}</span></td><td>${fmt(i.val*i.qty)}</td></tr>`;});
html+=`</tbody></table></div><div style="margin-top:15px"><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button></div>`;
document.getElementById('appContent').innerHTML=html;}

async function reportServices(){var cl=await DB.get('clients');var speeds=await DB.get('speeds');var plans=await DB.get('plans');var cu=getCurrency();
var speedCount={};cl.forEach(c=>{if(c.pkg){speedCount[c.pkg]=(speedCount[c.pkg]||0)+1;}});
var streamCount={};cl.forEach(c=>{if(c.streamings){c.streamings.split(',').forEach(s=>{s=s.trim();if(s)streamCount[s]=(streamCount[s]||0)+1;});}});
var html=`<h2>📡 Relatório de Serviços</h2>
<div class="grid" style="grid-template-columns:1fr 1fr;gap:15px">
<div class="card"><h3>Planos Internet</h3><table><thead><tr><th>Plano</th><th>Clientes</th><th>Receita Mensal</th></tr></thead><tbody>`;
speeds.forEach(s=>{var cnt=speedCount[s.nome]||0;html+=`<tr><td>${s.nome}</td><td><strong>${cnt}</strong></td><td>${fmt(cnt*s.preco)} ${cu}</td></tr>`;});
html+=`</tbody></table></div>
<div class="card"><h3>Streamings</h3><table><thead><tr><th>Serviço</th><th>Clientes</th><th>Receita Mensal</th></tr></thead><tbody>`;
plans.forEach(p=>{var cnt=streamCount[p.nome]||0;html+=`<tr><td>${p.nome}</td><td><strong>${cnt}</strong></td><td>${fmt(cnt*p.preco)} ${cu}</td></tr>`;});
html+=`</tbody></table></div></div>
<div style="margin-top:15px"><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button></div>`;
document.getElementById('appContent').innerHTML=html;}

async function reportCashFlow(){var t=await DB.get('transactions').then(x=>x.slice().reverse());var cu=getCurrency();
var html=`<h2>💰 Fluxo de Caixa</h2><div class="card"><table><thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Método</th><th>Estado</th></tr></thead><tbody>`;
t.forEach(tx=>{var isInc=tx.type==='income';var sc=tx.status==='paid'?'bg-success':tx.status==='partial'?'bg-partial':'bg-warning';
html+=`<tr><td>${tx.date||'-'}</td><td><span class="badge ${isInc?'bg-success':'bg-danger'}">${isInc?'ENTRADA':'SAÍDA'}</span></td><td>${tx.desc||'-'}</td><td class="${isInc?'text-success':'text-danger'}">${fmt(tx.val)}</td><td>${tx.met||'-'}</td><td><span class="badge ${sc}">${tx.status||'-'}</span></td></tr>`;});
html+=`</tbody></table></div><div style="margin-top:15px"><button class="btn btn-success btn-sm" onclick="exportRevenueCSV()">📤 CSV</button> <button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button></div>`;
document.getElementById('appContent').innerHTML=html;}

// ==================== AUDITORIA ====================
async function loadAudit(){var logs=(await DB.get('audit_logs')).slice().reverse();
var html=`<h2>📋 Auditoria</h2>
<div class="card" style="margin-bottom:15px"><div class="form-row"><div><label>Pesquisar</label><input type="text" class="search-box" placeholder="🔍 Filtrar logs..." oninput="filterTable(this,'tblAudit')"></div></div></div>
<div class="card"><table id="tblAudit"><thead><tr><th>Data</th><th>Utilizador</th><th>Ação</th><th>Detalhe</th></tr></thead><tbody>`;
logs.forEach(l=>{html+=`<tr><td style="white-space:nowrap">${l.date||'-'}</td><td>${l.user||'-'}</td><td><span class="badge bg-info">${l.action||'-'}</span></td><td>${l.detail||'-'}</td></tr>`;});
if(!logs.length)html+=`<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Sem registos</td></tr>`;
html+=`</tbody></table></div>`;
document.getElementById('appContent').innerHTML=html;}

// ==================== CONFIGURAÇÕES ====================
async function loadConfig(){var cfg=DB.cache.settings||{};var br=await DB.get('branches');var cu=getCurrency();
var brOpts=br.map(b=>`<option value="${b.id}" ${cfg.defaultBranch===b.id?'selected':''}>${b.name}</option>`).join('');
var html=`<h2>⚙️ Configurações</h2>
<div class="grid" style="grid-template-columns:1fr 1fr;gap:15px">
<div class="card"><h3>Empresa</h3>
    <div class="form-row"><div><label>Nome</label><input id="cfgName" value="${cfg.name||''}"></div><div><label>NIF</label><input id="cfgNif" value="${cfg.nif||''}"></div></div>
    <div class="form-row"><div><label>Taxa IVA (%)</label><input type="number" id="cfgTax" value="${cfg.taxRate||14}"></div><div><label>Moeda</label><select id="cfgCur"><option ${cfg.currency==='AKZ'?'selected':''}>AKZ</option><option ${cfg.currency==='USD'?'selected':''}>USD</option><option ${cfg.currency==='EUR'?'selected':''}>EUR</option></select></div></div>
    <div class="form-row"><div><label>Filial Padrão</label><select id="cfgBranch">${brOpts}</select></div></div>
    <button class="btn btn-primary" onclick="saveConfig()">💾 Salvar</button>
</div>
<div class="card"><h3>Filiais</h3>
    <table><thead><tr><th>Nome</th><th>Local</th><th>Ações</th></tr></thead><tbody>`;
br.forEach(b=>{html+=`<tr><td>${b.name}</td><td>${b.loc||'-'}</td><td><button class="btn btn-outline btn-sm" onclick="editBranch('${b.id}')">✏️</button></td></tr>`;});
html+=`</tbody></table>
    <button class="btn btn-info btn-sm" style="margin-top:8px" onclick="addBranch()">➕ Nova Filial</button>
</div>
<div class="card"><h3>WhatsApp API (Evolution)</h3>
    <div class="form-row"><div><label>URL API</label><input id="cfgWaApi" value="${cfg.whatsapp_api||''}"></div><div><label>API Key</label><input id="cfgWaKey" value="${cfg.whatsapp_key||''}"></div></div>
    <button class="btn btn-primary btn-sm" onclick="saveConfig()">💾 Salvar</button>
</div>
<div class="card"><h3>Base de Dados</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-success" onclick="exportDB()">📤 Exportar Backup (JSON)</button>
        <button class="btn btn-warning" onclick="document.getElementById('importFileInput').click()">📥 Importar Backup</button>
        <button class="btn btn-danger" onclick="resetCache()">🔄 Limpar Cache</button>
    </div>
</div>
</div>`;
document.getElementById('appContent').innerHTML=html;}

async function saveConfig(){var cfg=DB.cache.settings;var data={name:val('cfgName'),nif:val('cfgNif'),taxRate:parseFloat(val('cfgTax'))||14,currency:val('cfgCur'),defaultBranch:val('cfgBranch'),whatsapp_api:val('cfgWaApi'),whatsapp_key:val('cfgWaKey')};
await DB.update('settings',1,data);await logAction('Config','Salvo');showToast('Configurações salvas!');}

async function addBranch(){modal('Nova Filial',`<div class="form-row"><div><label>Nome</label><input id="brName"></div><div><label>Local</label><input id="brLoc"></div><div><label>Gerente</label><input id="brMgr"></div></div>`,async()=>{
    var n=val('brName');if(!n)return;
    await DB.insert('branches',{id:'b'+Date.now(),name:n,loc:val('brLoc'),mgr:val('brMgr'),phone:'',active:true});
    showToast('Criada!');closeModal();loadConfig();
});}

async function editBranch(id){var br=(await DB.get('branches')).find(b=>b.id===id);modal('Editar Filial',`<div class="form-row"><div><label>Nome</label><input id="brName" value="${br.name}"></div><div><label>Local</label><input id="brLoc" value="${br.loc||''}"></div><div><label>Gerente</label><input id="brMgr" value="${br.mgr||''}"></div></div>`,async()=>{
    await DB.update('branches',id,{name:val('brName'),loc:val('brLoc'),mgr:val('brMgr')});
    showToast('Atualizada!');closeModal();loadConfig();
});}

function exportDB(){var data=JSON.stringify(DB.cache,null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup_conexcass_'+todayISO()+'.json';a.click();showToast('Backup exportado!','info');}

async function importDB(event){var file=event.target.files[0];if(!file)return;if(!confirm('Atenção: Isto pode substituir dados existentes. Continuar?'))return;
var reader=new FileReader();reader.onload=async function(e){try{var data=JSON.parse(e.target.result);var count=0;
for(var table in data){if(data.hasOwnProperty(table)&&Array.isArray(data[table])){for(var i=0;i<data[table].length;i++){try{await DB.upsert(table,data[table][i]);count++;}catch(err){console.warn('Skip:',table,err);}}}}
await logAction('Import BD',count+' registos');showToast('Importados '+count+' registos!','info');loadConfig();}catch(err){showToast('Erro no ficheiro: '+err.message,'danger');}};
reader.readAsText(file);event.target.value='';}

function resetCache(){DB.cache={};showToast('Cache limpa! Recarregando...','info');setTimeout(()=>location.reload(),1000);}

// ==================== INICIALIZAÇÃO ====================
init();
</script>
</body>
</html>
