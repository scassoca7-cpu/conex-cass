var DB={
cache:{},
get:async function(t,forceReload){if(!forceReload&&this.cache[t]!==undefined)return this.cache[t];try{var r=await sb.from(t).select('*').limit(50000);if(r.error)throw r.error;this.cache[t]=(t==='settings')?(r.data&&r.data.length?r.data[0]:{}):(r.data||[]);return this.cache[t];}catch(e){console.error("DB GET Error:",t,e);return(t==='settings')?{}:[];}},
insert:async function(t,r){try{var res=await sb.from(t).insert([r]).select();if(res.error)throw res.error;if(!res.data||!res.data.length)throw new Error("Sem retorno do BD");if(!this.cache[t])this.cache[t]=(t==='settings')?{}:[];if(t==='settings'||t==='cash_register'){this.cache[t]=res.data[0];}else{this.cache[t].push(res.data[0]);}return res.data[0];}catch(e){showToast("Erro BD: "+e.message,'danger');return null;}},
update:async function(t,id,d){try{var res=await sb.from(t).update(d).eq('id',id).select();if(res.error)throw res.error;if(!res.data||!res.data.length)throw new Error("Sem retorno");if(this.cache[t]&&Array.isArray(this.cache[t])){var i=this.cache[t].findIndex(function(x){return x.id===id;});if(i>=0)this.cache[t][i]=Object.assign({},this.cache[t][i],d);}else if(t==='settings'||t==='cash_register'){this.cache[t]=Object.assign({},this.cache[t],d);}return res.data[0];}catch(e){showToast("Erro BD: "+e.message,'danger');return null;}},
upsert:async function(t,r){try{var res=await sb.from(t).upsert(r,{onConflict:'id'}).select();if(res.error)throw res.error;if(!res.data||!res.data.length)throw new Error("Sem retorno");if(t==='settings'||t==='cash_register'){this.cache[t]=res.data[0];}else{if(Array.isArray(this.cache[t])){var d=res.data[0];var i=this.cache[t].findIndex(function(x){return x.id===d.id;});if(i>=0)this.cache[t][i]=d;else this.cache[t].push(d);}else{this.cache[t]=res.data[0];}}return res.data[0];}catch(e){showToast("Erro Upsert: "+e.message,'danger');return null;}},
del:async function(t,id){try{var res=await sb.from(t).delete().eq('id',id);if(res.error)throw res.error;if(this.cache[t]&&Array.isArray(this.cache[t]))this.cache[t]=this.cache[t].filter(function(x){return x.id!==id;});return true;}catch(e){showToast("Erro BD: "+e.message,'danger');return false;}},
loadAll:async function(){var ks=['users','branches','settings','clients','suppliers','transactions','documents','inventory','speeds','plans','ip_pool','contracts','installations','audit_logs','cash_register','employees','tickets','stock_movements','advances'];for(var i=0;i<ks.length;i++){if(this.cache[ks[i]]===undefined)await this.get(ks[i]);}},

function getTodayStr(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function todayISO(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtISO(d){return d.toISOString().split('T')[0];}
function fmtPT(s){if(!s)return'-';var p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;}
function fmt(n){return new Intl.NumberFormat('pt-AO',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}
function getCurrency(){var s=DB.cache.settings;return s?s.currency||'AKZ':'AKZ';}
function val(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function parseDate(s){if(!s)return null;if(s.indexOf('/')>-1){var p=s.split('/');if(p.length===3)return new Date(p[2],p[1]-1,p[0]);}return new Date(s);}
function daysDiff(d1,d2){return Math.ceil((d2-d1)/(864e5));}
function safeAdd(a,b){return Math.round(((a||0)+(b||0))*100)/100;}
function safeSub(a,b){return Math.round(((a||0)-(b||0))*100)/100;}
function showToast(msg,type){type=type||'success';var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast toast-'+type;t.innerHTML=(type==='success'?'✅ ':type==='danger'?'❌ ':'ℹ️ ')+msg;c.appendChild(t);setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},3500);}
async function logAction(action,detail){try{await DB.insert('audit_logs',{id:'log'+Date.now(),date:new Date().toLocaleString('pt-AO'),user:currentUser?currentUser.name:'Sistema',action:action,detail:detail||''});}catch(e){}}
function filterTable(el,tid){var f=el.value.toLowerCase();var tb=document.getElementById(tid);if(!tb)return;var rows=tb.getElementsByTagName('tr');for(var i=1;i<rows.length;i++){var cells=rows[i].getElementsByTagName('td');var m=false;for(var j=0;j<cells.length;j++){if(cells[j].innerText.toLowerCase().indexOf(f)>-1)m=true;}rows[i].style.display=m?'':'none';}}

function getActiveBranchConfig(){var cfg=Object.assign({},DB.cache.settings||{});var branchId=currentUser?currentUser.branchId:null;if(branchId&&branchId!=='all'){var branch=(DB.cache.branches||[]).find(function(b){return b.id===branchId;});if(branch){cfg.name=branch.name||cfg.name;cfg.nif=branch.nif||cfg.nif;cfg.address=branch.loc||cfg.address;cfg.phone=branch.phone||cfg.phone;}}return cfg;}

async function hashPassword(pass){try{if(window.crypto&&window.crypto.subtle){var enc=new TextEncoder().encode(pass);var buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');}}catch(e){}var h=0;for(var i=0;i<pass.length;i++){h=((h<<5)-h)+pass.charCodeAt(i);h|=0;}return'fb_'+Math.abs(h).toString(36);}
function switchTab(t){document.querySelectorAll('.login-tab').forEach(function(x){x.classList.remove('active');});document.querySelectorAll('.login-form').forEach(function(x){x.classList.remove('active');});if(t==='login'){document.querySelector('.login-tab:first-child').classList.add('active');document.getElementById('loginForm').classList.add('active');}else{document.querySelector('.login-tab:last-child').classList.add('active');document.getElementById('registerForm').classList.add('active');}}

async function handleLogin(e){e.preventDefault();var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value,err=document.getElementById('loginError');err.classList.remove('show');var users=await DB.get('users');var f=users.find(function(x){return x.user.toLowerCase()===u.toLowerCase();});if(!f){err.textContent='Utilizador não encontrado';err.classList.add('show');return false;}if(f.blocked){err.textContent='Conta bloqueada. Contacte o administrador.';err.classList.add('show');return false;}var h=await hashPassword(p);if(f.pass!==h){err.textContent='Senha incorrecta';err.classList.add('show');return false;}currentUser=f;localStorage.setItem('cx_session',f.id);await logAction('Login','Entrada');showApp();return false;}

function getClientReceiptTemplate(t,c,cfg){var title=t.receiptType==='mensalidade'?'RECIBO DE MENSALIDADE':t.receiptType==='renovacao'?'RECIBO DE RENOVAÇÃO':'RECIBO DE PAGAMENTO';function extenso(n){var ints=Math.floor(n);var decs=Math.round((n-ints)*100);var un=['','Um','Dois','Três','Quatro','Cinco','Seis','Sete','Oito','Nove'];var dez=['','Dez','Vinte','Trinta','Quarenta','Cinquenta','Sessenta','Setenta','Oitenta','Noventa'];var cent=['','Cem','Duzentos','Trezentos','Quatrocentos','Quinhentos','Seiscentos','Setecentos','Oitocentos','Novecentos'];var teen=['Dez','Onze','Doze','Treze','Catorze','Quinze','Dezasseis','Dezassete','Dezoito','Dezanove'];var parts=[];if(ints>=1000){var mil=Math.floor(ints/1000);parts.push(mil===1?'Mil':extenso(mil)+' Mil');ints=ints%1000;}if(ints>=100){parts.push(cent[Math.floor(ints/100)]);ints=ints%100;}if(ints>=20){parts.push(dez[Math.floor(ints/10)]);ints=ints%10;}else if(ints>=10){parts.push(teen[ints-10]);ints=0;}if(ints>0)parts.push(un[ints]);var result=parts.join(' e ');if(!result)result='Zero';return result+' Kwanza'+(n>=2?'s':'')+(decs>0?' e '+decs+' Cêntimo'+(decs>=2?'s':''):'');}var ve=extenso(t.val);return '<div class="invoice-container" id="docContentPrint"><div class="invoice-header"><div style="display:flex;align-items:center;gap:15px"><img crossorigin="anonymous" src="'+LOGO+'" class="invoice-logo"><div><h2 style="margin:0;font-size:16px">'+(cfg.name||'Conex Cass')+'</h2><p style="margin:2px 0;font-size:10px">NIF: '+(cfg.nif||'---')+'</p>'+(cfg.address?'<p style="margin:2px 0;font-size:10px">'+cfg.address+'</p>':'')+(cfg.phone?'<p style="margin:2px 0;font-size:10px">Tel: '+cfg.phone+'</p>':'')+'</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:bold">'+title+'</div><p style="font-size:13px;font-weight:bold;font-family:monospace">'+t.receiptId+'</p><p>Data: '+(t.date||getTodayStr())+'</p></div></div><div style="margin-bottom:15px;border:2px solid #000;padding:12px;border-radius:4px"><p style="margin-bottom:8px;font-size:12px">Declaro para os devidos efeitos que paguei à entidade <strong>'+(cfg.name||'Conex Cass')+'</strong>, NIF: <strong>'+(cfg.nif||'---')+'</strong>, a importância de:</p><h2 style="text-align:center;margin:12px 0;font-family:Orbitron;letter-spacing:1px;font-size:20px">'+fmt(t.val)+' '+getCurrency()+'</h2><p style="text-align:center;font-style:italic;font-size:11px">('+ve+')</p><p style="margin-top:8px;font-size:12px">Referente a <strong>'+(t.reference||'---')+'</strong>.</p></div><table class="invoice-table"><thead><tr><th>Descrição</th><th>Plano</th><th>Método</th><th style="text-align:right">Valor</th></tr></thead><tbody><tr><td>'+(t.desc||'---')+'</td><td>'+(c.pkg||'---')+'</td><td>'+(t.met||'N/A')+'</td><td style="text-align:right">'+fmt(t.val)+' '+getCurrency()+'</td></tr></tbody></table><div style="display:flex;justify-content:flex-end"><div style="width:250px"><div style="border-top:2px solid #000;margin-top:5px;padding-top:5px;display:flex;justify-content:space-between;font-size:14px;font-weight:bold"><span>TOTAL PAGO:</span><span>'+fmt(t.val)+' '+getCurrency()+'</span></div></div></div><img crossorigin="anonymous" src="'+STAMP+'" class="invoice-stamp"><div style="margin-top:15px;font-size:11px;border:1px solid #ccc;padding:10px;border-radius:4px"><p><strong>Cliente:</strong> '+c.name+(c.nif?' | NIF: '+c.nif:'')+'</p><p><strong>Contacto:</strong> '+(c.contact||'-')+'</p><p><strong>Processado por:</strong> '+(t.processedBy||currentUser.name)+'</p></div><div style="margin-top:50px;display:flex;justify-content:space-between"><div style="border-top:1px solid #000;width:200px;text-align:center;padding-top:5px;font-size:11px">Assinatura (Empresa)</div><div style="border-top:1px solid #000;width:200px;text-align:center;padding-top:5px;font-size:11px">Assinatura (Cliente)</div></div><div class="invoice-footer">Documento gerado pelo '+(cfg.name||'Conex Cass')+' ERP — '+getTodayStr()+'</div></div>';}
async function viewClientReceipt(tid,cid){var t=DB.cache.transactions.find(function(x){return x.id===tid;});if(!t)t=(await DB.get('transactions')).find(function(x){return x.id===tid;});if(!t)return;var c=DB.cache.clients.find(function(x){return x.id===cid;});if(!c)c=(await DB.get('clients')).find(function(x){return x.id===cid;});var cfg=getActiveBranchConfig();document.getElementById('docTitle').innerText=t.receiptId||'Recibo';document.getElementById('docBody').innerHTML=getClientReceiptTemplate(t,c,cfg);document.getElementById('modalDocFooter').innerHTML='<button class="btn btn-primary" onclick="printClientReceiptPDF(\''+tid+'\',\''+cid+'\')">📄 PDF</button> <button class="btn btn-success" onclick="shareClientReceiptWhatsApp(\''+tid+'\',\''+cid+'\')">📱 WhatsApp</button> <button class="btn btn-outline" onclick="closeModalDoc()">Fechar</button>';document.getElementById('modalDoc').classList.add('show');}

async function loadDashboard(){var t=await DB.get('transactions'),cl=await DB.get('clients'),inv=await DB.get('inventory'),cu=getCurrency();var inc=t.filter(function(x){return x.type==='income';}).reduce(function(a,b){return safeAdd(a,b.val);},0);var exp=t.filter(function(x){return x.type==='expense_payment'||x.type==='expense';}).reduce(function(a,b){return safeAdd(a,b.val);},0);var rec=cl.reduce(function(a,b){return safeAdd(a,b.divida);},0);var lowStock=inv.filter(function(i){return i.qty>0&&i.qty<=5;}).length;var openTickets=(await DB.get('tickets')).filter(function(t){return t.status!=='Resolvido';}).length;var chartSection=dashChartHidden?'<div class="card" style="text-align:center;padding:30px"><p style="color:var(--text-muted);margin-bottom:10px">Gráfico oculto</p><button class="btn btn-outline btn-sm" onclick="toggleDashChart()">📊 Mostrar</button></div>':'<div class="card" id="dashChartCard"><button class="dash-close" onclick="toggleDashChart()">✕</button><h3 style="margin-bottom:12px">Receitas vs Despesas</h3><canvas id="dashChart" height="70"></canvas></div>';document.getElementById('appContent').innerHTML='<div class="kpi-grid"><div class="kpi-card" style="background:rgba(0,255,136,.05);border-color:var(--success)"><div class="kpi-label">Receitas</div><div class="kpi-value" style="color:var(--success)">'+fmt(inc)+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(255,0,110,.05);border-color:var(--danger)"><div class="kpi-label">Despesas</div><div class="kpi-value" style="color:var(--danger)">'+fmt(exp)+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(0,180,216,.05);border-color:var(--primary)"><div class="kpi-label">Lucro</div><div class="kpi-value" style="color:'+(inc-exp>=0?'var(--success)':'var(--danger)')+'">'+fmt(safeSub(inc,exp))+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(255,195,0,.05);border-color:var(--warning)"><div class="kpi-label">A Receber</div><div class="kpi-value" style="color:var(--warning)">'+fmt(rec)+' '+cu+'</div></div></div><div class="grid" style="grid-template-columns:2fr 1fr;gap:15px">'+chartSection+'<div class="card"><h3>Alertas</h3><div style="margin-bottom:10px;padding:10px;background:rgba(255,0,110,.1);border-radius:4px;border-left:3px solid var(--danger)"><strong>🚨 Stock Baixo</strong><br><span style="font-size:.85rem">'+lowStock+' itens</span></div><div style="padding:10px;background:rgba(255,195,0,.1);border-radius:4px;border-left:3px solid var(--warning)"><strong>🎧 Tickets</strong><br><span style="font-size:.85rem">'+openTickets+' abertos</span></div></div></div>';if(!dashChartHidden)renderChart(t);}
function toggleDashChart(){dashChartHidden=!dashChartHidden;loadDashboard();}
async function renderChart(trans){var m=[],i=[],e=[];for(var x=5;x>=0;x--){var d=new Date();d.setMonth(d.getMonth()-x);m.push(String(d.getMonth()+1)+'/'+d.getFullYear());var mi=0,me=0;trans.filter(function(t){var p=parseDate(t.date);return p&&p.getMonth()===d.getMonth()&&p.getFullYear()===d.getFullYear();}).forEach(function(t){if(t.type==='income')mi=safeAdd(mi,t.val);if(t.type==='expense_payment'||t.type==='expense')me=safeAdd(me,t.val);});i.push(mi);e.push(me);}var ctx=document.getElementById('dashChart');if(!ctx)return;if(mainChart)mainChart.destroy();mainChart=new Chart(ctx.getContext('2d'),{type:'bar',data:{labels:m,datasets:[{label:'Receitas',data:i,backgroundColor:'rgba(0,255,136,0.5)'},{label:'Despesas',data:e,backgroundColor:'rgba(255,0,110,0.5)'}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{color:'#8b9bb4'}},x:{ticks:{color:'#8b9bb4'}}}}});}

async function payClientGeneral(id){var c=(await DB.get('clients',true)).find(function(x){return x.id===id;});var cu=getCurrency();modal('💳 Cobrar Mensalidade','<p>Cliente: <strong>'+c.name+'</strong> | Dívida: <span class="text-danger">'+fmt(c.divida)+' '+cu+'</span></p>'+(c.pkg?'<p>Plano: <strong>'+c.pkg+'</strong> | Mensalidade: <strong>'+fmt(c.mens)+' '+cu+'</strong></p>':'')+'<div class="form-row"><div><label>Valor</label><input type="number" id="payVal" value="'+c.mens+'"></div><div><label>Método</label><select id="payMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div></div>',async function(){var v=parseFloat(val('payVal'));if(!v||v<=0)return showToast('Valor inválido!','danger');var receiptId=await generateReceiptId();var newDebt=Math.max(0,safeSub(c.divida,v));await DB.update('clients',id,{divida:newDebt});var cfg=DB.cache.settings||{};cfg.docSeq=(cfg.docSeq||0)+1;var docId='FR'+new Date().getFullYear()+'/'+String(cfg.docSeq).padStart(4,'0');var docDbId='d'+Date.now();await DB.insert('documents',{id:docDbId,docId:docId,docType:'FR',clientId:id,clientName:c.name,clientNif:c.nif||'',clientAddress:c.address||'',clientContact:c.contact||'',date:getTodayStr(),dueDate:todayISO(),items:[{desc:'Mensalidade - '+c.name,qty:1,price:v,total:v}],subtotal:v,tax:0,total:v,paidVal:v,status:'paid',met:val('payMet'),currency:cu,attendedBy:currentUser.name});await DB.upsert('settings',{id:1,docSeq:cfg.docSeq});var newTx=await DB.insert('transactions',{id:'t'+Date.now(),docId:docId,type:'income',val:v,date:getTodayStr(),desc:'Mensalidade - '+c.name,status:'paid',met:val('payMet'),receiptId:receiptId,receiptType:'mensalidade',reference:c.pkg||'Mensalidade',processedBy:currentUser.name,clientId:id});await logAction('Cobrança',c.name+' - '+fmt(v));showToast('Recibo '+receiptId+' emitido e registado na Faturação!');closeModal();if(newTx)viewClientReceipt(newTx.id,id);else viewClient360(id);},'Pagar e Ver Recibo','btn-success');}

async function delClient(id){if(!confirm('ATENÇÃO: Eliminar este cliente removerá também todos os seus documentos e pagamentos associados. Continuar?'))return;var docs=DB.cache.documents.filter(function(d){return d.clientId===id;});for(var i=0;i<docs.length;i++){await DB.del('documents',docs[i].id);}var txs=DB.cache.transactions.filter(function(t){return t.clientId===id;});for(var j=0;j<txs.length;j++){await DB.del('transactions',txs[j].id);}await DB.del('clients',id);await logAction('Eliminar','Cliente e dados associados');showToast('Cliente e todos os seus dados eliminados!');loadClients();}

 style="margin-top:30px;text-align:center;font-size:9px;color:#666;border-top:1px solid #ccc;padding-top:8px">Gerado pelo '+(cfg.name||'Conex Cass')+' ERP</div></div>';document.getElementById('docTitle').innerText='Contrato - '+c.name;document.getElementById('docBody').innerHTML=h;document.getElementById('modalDocFooter').innerHTML='<button class="btn btn-primary" onclick="printContractPDF(\''+c.id+'\')">📄 PDF</button> <button class="btn btn-success" onclick="shareContractWhatsApp(\''+c.id+'\')">📱 WhatsApp</button> <button class="btn btn-outline" onclick="closeModalDoc()">Fechar</button>';document.getElementById('modalDoc').classList.add('show');}
async function printContractPDF(clientId){var c=DB.cache.clients.find(function(x){return x.id===clientId;});if(!c)return;var content=document.getElementById('docBody').querySelector('.contract-container');if(!content)return;var clone=content.cloneNode(true);clone.style.position='absolute';clone.style.left='-9999px';document.body.appendChild(clone);await html2pdf().from(clone).set({margin:[10,10,10,10],filename:'Contrato_'+c.name.replace(/\s/g,'_')+'.pdf',html2canvas:{scale:2,useCORS:true,allowTaint:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).save();document.body.removeChild(clone);showToast('PDF Gerado!','info');}

async function printMonthlyBilling(){var mIdx=parseInt(val('filterMonth')),year=parseInt(val('filterYear'));var docs=(await DB.get('documents')).filter(function(d){var parts=d.date.split('/');if(parts.length===3){return parseInt(parts[1])-1===mIdx&&parseInt(parts[2])===year;}return false;}).filter(function(d){return d.status==='paid';});if(!docs.length)return showToast('Sem faturas pagas neste mês!','danger');var cfg=getActiveBranchConfig();var cu=getCurrency();var months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];var totalMes=docs.reduce(function(a,b){return safeAdd(a,b.total);},0);var html='<div class="invoice-container" style="font-size:12px"><div class="invoice-header"><div style="display:flex;align-items:center;gap:15px"><img crossorigin="anonymous" src="'+LOGO+'" class="invoice-logo"><div><h2 style="margin:0;font-size:16px">'+(cfg.name||'Conex Cass')+'</h2><p style="margin:2px 0;font-size:10px">NIF: '+(cfg.nif||'---')+'</p>'+(cfg.address?'<p style="margin:2px 0;font-size:10px">'+cfg.address+'</p>':'')+'</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:bold">RELATÓRIO MENSAL</div><p style="font-weight:bold">'+months[mIdx]+' '+year+'</p></div></div>';html+='<table class="invoice-table"><thead><tr><th>Data</th><th>Doc</th><th>Cliente</th><th>NIF</th><th style="text-align:right">Valor</th></tr></thead><tbody>';docs.forEach(function(d){html+='<tr><td>'+d.date+'</td><td>'+d.docId+'</td><td>'+d.clientName+'</td><td>'+(d.clientNif||'---')+'</td><td style="text-align:right">'+fmt(d.total)+' '+cu+'</td></tr>';});html+='<tr><td colspan="4" style="text-align:right;font-weight:bold;border:none">TOTAL DO MÊS:</td><td style="text-align:right;font-weight:bold;font-size:14px;border:none">'+fmt(totalMes)+' '+cu+'</td></tr>';html+='</tbody></table><div class="invoice-footer">Gerado pelo '+(cfg.name||'Conex Cass')+' ERP — '+getTodayStr()+'</div></div>';document.getElementById('docTitle').innerText='Relatório - '+months[mIdx]+' '+year;document.getElementById('docBody').innerHTML=html;document.getElementById('modalDocFooter').innerHTML='<button class="btn btn-primary" onclick="printMonthlyPDF()">📄 PDF</button> <button class="btn btn-outline" onclick="closeModalDoc()">Fechar</button>';document.getElementById('modalDoc').classList.add('show');}

async function delDoc(id){if(!confirm('Eliminar este documento e reverter os valores financeiros?'))return;var doc=DB.cache.documents.find(function(d){return d.id===id;});if(!doc)return;if(doc.clientId&&doc.clientId!=='cf1'&&doc.status!=='paid'){var client=DB.cache.clients.find(function(c){return c.id===doc.clientId;});if(client){var debtToRevert=safeSub(doc.total,doc.paidVal||0);await DB.update('clients',doc.clientId,{divida:Math.max(0,safeSub(client.divida,debtToRevert))});}}var txs=DB.cache.transactions.filter(function(t){return t.docId===doc.docId;});for(var i=0;i<txs.length;i++){await DB.del('transactions',txs[i].id);}await DB.del('documents',id);await logAction('Eliminar Doc',doc.docId);showToast('Documento eliminado!');closeModalDoc();loadCommercial();}

async function openModalDocGen(preselectedClientId,isAvulso){tempDocItems=[];var cls=await DB.get('clients'),inv=await DB.get('inventory'),cfg=DB.cache.settings;var co=cls.map(function(c){return'<option value="'+c.id+'" '+(preselectedClientId===c.id?'selected':'')+'>'+c.name+'</option>';}).join('');var invOpts='<option value="">-- Selecione --</option>'+inv.map(function(i){return'<option value="'+i.id+'|'+i.name+'|'+i.val+'">'+i.name+' ('+i.qty+')</option>';}).join('');var docTypeVal=isAvulso?'VA':'FR';modal('📄 Documento','<div class="form-row"><div><label>Cliente</label><select id="docClient">'+co+'</select></div><div><label>Tipo</label><select id="docType"><option value="FR" '+(docTypeVal==='FR'?'selected':'')+'>Fatura-Recibo</option><option value="FT">Fatura</option><option value="FP">Pró-forma</option><option value="VA" '+(docTypeVal==='VA'?'selected':'')+'>Venda Avulso</option></select></div></div><div class="form-row"><div><label>Método</label><select id="docMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div><div><label>Vencimento</label><input type="date" id="docDueDate" value="'+fmtISO(addDays(new Date(),30))+'"></div></div><hr><div class="form-row"><div style="flex:2"><label>Item</label><select id="itemStock" onchange="autoFillItem()">'+invOpts+'</select></div><div style="flex:3"><label>Descrição</label><input id="itemDesc"></div><div style="flex:1"><label>Qtd</label><input type="number" id="itemQty" value="1"></div><div style="flex:2"><label>Preço</label><input type="number" id="itemPrice" value="0"></div><div style="flex:0.5;display:flex;align-items:flex-end"><button class="btn btn-success" onclick="addDocItem()">➕</button></div></div><div style="max-height:150px;overflow-y:auto"><table><thead><tr><th>Desc</th><th>Qtd</th><th>Total</th><th></th></tr></thead><tbody id="docItemsTable"></tbody></table></div><div style="text-align:right;font-size:1.2rem;font-family:Orbitron">Total: <span id="docTotalPreview">0.00</span> '+getCurrency()+'</div>',async function(){var cId=preselectedClientId||val('docClient'),type=val('docType');var client=cls.find(function(x){return x.id===cId;});if(!client&&!isAvulso)return showToast('Seleccione um cliente!','danger');if(!tempDocItems.length)return showToast('Adicione itens!','danger');var sub=tempDocItems.reduce(function(a,b){return safeAdd(a,b.total);},0);var tr=(cfg.taxRate||0)/100,tax=sub*tr,total=safeAdd(sub,tax);cfg.docSeq=(cfg.docSeq||0)+1;var docId=type+new Date().getFullYear()+'/'+String(cfg.docSeq).padStart(4,'0');var isPaid=(type==='FR'||type==='VA');var docDbId='d'+Date.now();var clientName=client?client.name:'Consumidor Final';var clientId=client?client.id:'cf1';var clientNif=client?client.nif||'':'---';var clientAddress=client?client.address||'':'---';var clientContact=client?client.contact||'':'---';if(type!=='FP'){for(var i=0;i<tempDocItems.length;i++){var item=tempDocItems[i];if(item.invId){var prod=DB.cache.inventory.find(function(p){return p.id===item.invId;});if(prod&&prod.qty>=item.qty){await DB.update('inventory',item.invId,{qty:safeSub(prod.qty,item.qty)});}else if(prod){showToast('Stock insuficiente: '+prod.name,'danger');return;}}}}await DB.insert('documents',{id:docDbId,docId:docId,docType:type,clientId:clientId,clientName:clientName,clientNif:clientNif,clientAddress:clientAddress,clientContact:clientContact,date:getTodayStr(),dueDate:val('docDueDate'),items:JSON.parse(JSON.stringify(tempDocItems)),subtotal:sub,tax:tax,total:total,paidVal:isPaid?total:0,status:isPaid?'paid':'pending',met:val('docMet'),currency:getCurrency(),attendedBy:currentUser.name});if(type!=='FP'){if(type==='FT'&&client)await DB.update('clients',cId,{divida:safeAdd(client.divida,total)});await DB.insert('transactions',{id:'t'+Date.now(),docId:docId,type:'income',val:total,date:getTodayStr(),desc:type+' '+clientName,status:isPaid?'paid':'pending',met:val('docMet')});}await DB.upsert('settings',{id:1,docSeq:cfg.docSeq});await logAction('Emitir',docI function autoFillItem(){var s=val('itemStock');if(s){var p=s.split('|');document.getElementById('itemDesc').value=p[1];document.getElementById('itemPrice').value=p[2];}}
function addDocItem(){var s=val('itemStock');var invId=s?s.split('|')[0]:'';var desc=val('itemDesc'),qty=parseInt(val('itemQty'))||1,price=parseFloat(val('itemPrice'))||0;if(!desc)return showToast('Descrição obrigatória!','danger');tempDocItems.push({invId:invId,name:desc,desc:desc,qty:qty,price:price,total:qty*price});document.getElementById('itemDesc').value='';document.getElementById('itemPrice').value='0';document.getElementById('itemQty').value='1';renderDocItemsTable();}

async function viewDoc(id){var docs=await DB.get('documents');var d=docs.find(function(x){return x.id===id;});if(!d)return showToast('Documento não encontrado!','danger');var cfg=getActiveBranchConfig();var remaining=safeSub(d.total,d.paidVal||0);var actionHtml='<button class="btn btn-primary" onclick="printDocPDF(\''+d.id+'\')">📄 PDF</button> <button class="btn btn-success" onclick="shareWhatsApp(\''+d.id+'\')">📱 WhatsApp</button> ';if(remaining>0)actionHtml+='<button class="btn btn-danger" onclick="payInstallment(\''+d.id+'\')">💳 Prestação</button> ';actionHtml+='<button class="btn btn-danger" onclick="delDoc(\''+d.id+'\')">🗑️ Apagar</button> <button class="btn btn-outline" onclick="closeModalDoc()">Fechar</button>';document.getElementById('docTitle').innerText=d.docId;document.getElementById('docBody').innerHTML=getDocTemplate(d,cfg);document.getElementById('modalDocFooter').innerHTML=actionHtml;document.getElementById('modalDoc').classList.add('show');setTimeout(function(){generateQR(d.docId);},200);}
async function payInstallment(docId){var d=(await DB.get('documents',true)).find(function(x){return x.id===docId;});var client=d.clientId!=='cf1'?(await DB.get('clients',true)).find(function(c){return c.id===d.clientId;}):null;var remaining=safeSub(d.total,d.paidVal||0);modal('💳 Prestação','<p>Resta: <span class="text-danger">'+fmt(remaining)+'</span></p><div class="form-row"><div><label>Valor</label><input type="number" id="payInstVal" value="'+remaining+'"></div><div><label>Método</label><select id="payInstMet"><option>Dinheiro</option><option>TPA</option><option>Transferência</option></select></div></div>',async function(){var v=parseFloat(val('payInstVal'));if(!v||v>remaining)return;var newPaidVal=safeAdd(d.paidVal||0,v);var newStatus=newPaidVal>=d.total?'paid':'partial';await DB.update('documents',docId,{paidVal:newPaidVal,status:newStatus});if(client)await DB.update('clients',d.clientId,{divida:Math.max(0,safeSub(client.divida||0,v))});await DB.insert('transactions',{id:'t'+Date.now(),docId:d.docId,type:'income',val:v,date:getTodayStr(),desc:'Prestação '+d.docId,status:'paid',met:val('payInstMet')});await logAction('Prestação',d.docId);showToast('Pago!');closeModal();viewDoc(docId);},'Pagar','btn-success');}

function getExpenseReceiptTemplate(t,cfg){var titleMap={'Salários':'RECIBO DE VENCIMENTO','Energia':'RECIBO - ENERGIA','Água':'RECIBO - ÁGUA','Internet':'RECIBO - INTERNET','Aluguer':'RECIBO - ALUGUER','Transporte':'RECIBO - TRANSPORTE','Manutenção':'RECIBO - MANUTENÇÃO','Outros':'RECIBO DE PAGAMENTO'};var title=titleMap[t.cat]||'RECIBO DE PAGAMENTO';function extenso(n){var ints=Math.floor(n);var decs=Math.round((n-ints)*100);var un=['','Um','Dois','Três','Quatro','Cinco','Seis','Sete','Oito','Nove'];var dez=['','Dez','Vinte','Trinta','Quarenta','Cinquenta','Sessenta','Setenta','Oitenta','Noventa'];var cent=['','Cem','Duzentos','Trezentos','Quatrocentos','Quinhentos','Seiscentos','Setecentos','Oitocentos','Novecentos'];var teen=['Dez','Onze','Doze','Treze','Catorze','Quinze','Dezasseis','Dezassete','Dezoito','Dezanove'];var parts=[];if(ints>=1000){var mil=Math.floor(ints/1000);parts.push(mil===1?'Mil':extenso(mil)+' Mil');ints=ints%1000;}if(ints>=100){parts.push(cent[Math.floor(ints/100)]);ints=ints%100;}if(ints>=20){parts.push(dez[Math.floor(ints/10)]);ints=ints%10;}else if(ints>=10){parts.push(teen[ints-10]);ints=0;}if(ints>0)parts.push(un[ints]);var result=parts.join(' e ');if(!result)result='Zero';return result+' Kwanza'+(n>=2?'s':'')+(decs>0?' e '+decs+' Cêntimo'+(decs>=2?'s':''):'');}var ve=extenso(t.val);return '<div class="invoice-container" id="docContentPrint"><div class="invoice-header"><div style="display:flex;align-items:center;gap:15px"><img crossorigin="anonymous" src="'+LOGO+'" class="invoice-logo"><div><h2 style="margin:0;font-size:16px">'+(cfg.name||'Conex Cass')+'</h2><p style="margin:2px 0;font-size:10px">NIF: '+(cfg.nif||'---')+'</p>'+(cfg.address?'<p style="margin:2px 0;font-size:10px">'+cfg.address+'</p>':'')+'</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:bold">'+title+'</div><p style="font-size:13px;font-weight:bold;font-family:monospace">'+(t.receiptId||t.id)+'</p><p>Data: '+(t.date||getTodayStr())+'</p></div></div><div style="margin-bottom:15px;border:2px solid #000;padding:12px;border-radius:4px"><p style="margin-bottom:8px;font-size:12px">Declaro para os devidos efeitos que recebi da entidade <strong>'+(cfg.name||'Conex Cass')+'</strong>, NIF: <strong>'+(cfg.nif||'---')+'</strong>, a importância de:</p><h2 style="text-align:center;margin:12px 0;font-family:Orbitron;letter-spacing:1px;font-size:20px">'+fmt(t.val)+' '+getCurrency()+'</h2><p style="text-align:center;font-style:italic;font-size:11px">('+ve+')</p><p style="margin-top:8px;font-size:12px">Referente a <strong>'+(t.reference||t.cat||'---')+'</strong>.</p></div><table class="invoice-table"><thead><tr><th>Descrição</th><th>Categoria</th><th>Método</th><th style="text-align:right">Valor</th></tr></thead><tbody><tr><td>'+(t.desc||t.cat||'---')+'</td><td>'+(t.cat||'---')+'</td><td>'+(t.met||'N/A')+'</td><td style="text-align:right">'+fmt(t.val)+' '+getCurrency()+'</td></tr></tbody></table><div style="display:flex;justify-content:flex-end"><div style="width:250px"><div style="border-top:2px solid #000;padding-top:5px;display:flex;justify-content:space-between;font-size:14px;font-weight:bold"><span>TOTAL PAGO:</span><span>'+fmt(t.val)+' '+getCurrency()+'</span></div></div></div><div style="margin-top:15px;font-size:11px;border:1px solid #ccc;padding:10px;border-radius:4px"><p><strong>Pago a:</strong> '+(t.paidTo||'---')+(t.paidToNif?' | NIF: '+t.paidToNif:'')+'</p><p><strong>Método:</strong> '+(t.met||'N/A')+'</p><p><strong>Processado por:</strong> '+(t.processedBy||currentUser.name)+'</p></div><div style="margin-top:50px;display:flex;justify-content:space-between"><div style="border-top:1px solid #000;width:200px;text-align:center;padding-top:5px;font-size:11px">Assinatura (Empresa)</div><div style="border-top:1px solid #000;width:200px;text-align:center;padding-top:5px;font-size:11px">Assinatura (Beneficiário)</div></div><div class="invoice-footer">Documento gerado pelo '+(cfg.name||'Conex Cass')+' ERP — '+getTodayStr()+'</div></div>';}

async function loadReports(){document.getElementById('appContent').innerHTML='<h2>📈 Relatórios</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px"><div class="card" style="cursor:pointer" onclick="reportRevenue()"><h3>📊 Receitas vs Despesas</h3></div><div class="card" style="cursor:pointer" onclick="reportDebt()"><h3>💸 Dívidas</h3></div><div class="card" style="cursor:pointer" onclick="reportCashFlow()"><h3>💰 Fluxo de Caixa</h3></div><div class="card" style="cursor:pointer" onclick="reportClientRanking()"><h3>🏆 Ranking</h3></div></div>';}
async function reportRevenue(){var t=await DB.get('transactions');var months={};t.forEach(function(tx){var d=parseDate(tx.date);if(!d)return;var key=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();if(!months[key])months[key]={inc:0,exp:0};if(tx.type==='income')months[key].inc=safeAdd(months[key].inc,tx.val);if(tx.type==='expense_payment'||tx.type==='expense')months[key].exp=safeAdd(months[key].exp,tx.val);});var html='<h2>📊 Receitas vs Despesas</h2><div class="card"><table><thead><tr><th>Mês</th><th>Receitas</th><th>Despesas</th><th>Lucro</th></tr></thead><tbody>';Object.keys(months).sort().forEach(function(k){var m=months[k];var l=safeSub(m.inc,m.exp);html+='<tr><td><strong>'+k+'</strong></td><td class="text-success">'+fmt(m.inc)+'</td><td class="text-danger">'+fmt(m.exp)+'</td><td style="color:'+(l>=0?'var(--success)':'var(--danger)')+';font-weight:bold">'+fmt(l)+'</td></tr>';});html+='</tbody></table></div><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button>';document.getElementById('appContent').innerHTML=html;}
async function reportDebt(){var cl=(await DB.get('clients')).filter(function(x){return x.divida>0;});var total=cl.reduce(function(a,b){return safeAdd(a,b.divida);},0);var cu=getCurrency();var html='<h2>💸 Dívidas</h2><div class="kpi-grid"><div class="kpi-card" style="background:rgba(255,0,110,.05);border-left-color:var(--danger)"><div class="kpi-label">Total</div><div class="kpi-value" style="color:var(--danger)">'+fmt(total)+' '+cu+'</div></div><div class="kpi-card" style="background:rgba(255,195,0,.05);border-left-color:var(--warning)"><div class="kpi-label">Clientes</div><div class="kpi-value" style="color:var(--warning)">'+cl.length+'</div></div></div><div class="card"><table><thead><tr><th>Cliente</th><th>Contacto</th><th>Dívida</th><th>Ação</th></tr></thead><tbody>';cl.sort(function(a,b){return b.divida-a.divida;}).forEach(function(c){html+='<tr><td>'+c.name+'</td><td>'+(c.contact||'-')+'</td><td class="text-danger">'+fmt(c.divida)+'</td><td><button class="btn btn-success btn-sm" onclick="payClientGeneral(\''+c.id+'\')">💳</button></td></tr>';});html+='</tbody></table></div><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button>';document.getElementById('appContent').innerHTML=html;}
async function reportCashFlow(){var t=(await DB.get('transactions')).slice().reverse();var html='<h2>💰 Fluxo de Caixa</h2><div class="card"><table><thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Valor</th></tr></thead><tbody>';t.forEach(function(tx){var isInc=tx.type==='income';html+='<tr><td>'+(tx.date||'-')+'</td><td><span class="badge '+(isInc?'bg-success':'bg-danger')+'">'+(isInc?'+':'-')+'</span></td><td>'+(tx.desc||'-')+'</td><td class="'+(isInc?'text-success':'text-danger')+'">'+fmt(tx.val)+'</td></tr>';});html+='</tbody></table></div><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button>';document.getElementById('appContent').innerHTML=html;}
async function reportClientRanking(){var t=await DB.get('transactions');var cu=getCurrency();var cp={};t.filter(function(x){return x.type==='income';}).forEach(function(tx){var n=tx.desc||'';n=n.replace('Mensalidade - ','').replace('Renovação - ','').replace('Prestação ','').replace('Pagamento ','');if(n)cp[n]=safeAdd(cp[n]||0,tx.val);});var ranked=Object.entries(cp).sort(function(a,b){return b[1]-a[1];}).slice(0,20);var html='<h2>🏆 Ranking</h2><div class="card"><table><thead><tr><th>#</th><th>Cliente</th><th>Total</th></tr></thead><tbody>';ranked.forEach(function(r,i){html+='<tr><td>'+(i+1)+'</td><td><strong>'+r[0]+'</strong></td><td class="text-success">'+fmt(r[1])+' '+cu+'</td></tr>';});if(!ranked.length)html+='<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">Sem dados</td></tr>';html+='</tbody></table></div><button class="btn btn-outline btn-sm" onclick="loadReports()">⬅️ Voltar</button>';document.getElementById('appContent').innerHTML=html;}

// ==================== AUDITORIA ====================
async function loadAudit(){var logs=(await DB.get('audit_logs')).slice().reverse();var html='<div style="display:flex;justify-content:space-between;margin-bottom:15px"><h2>📋 Auditoria</h2><button class="btn btn-danger btn-sm" onclick="clearAudit()">🗑️ Limpar</button></div><div class="card"><table><thead><tr><th>Data</th><th>Utilizador</th><th>Acção</th><th>Detalhe</th><th>Ação</th></tr></thead><tbody>';logs.forEach(function(l){html+='<tr><td>'+(l.date||'-')+'</td><td>'+(l.user||'-')+'</td><td><span class="badge bg-info">'+(l.action||'-')+'</span></td><td>'+(l.detail||'-')+'</td><td><button class="btn btn-danger btn-sm" onclick="delAudit(\''+l.id+'\')">🗑️</button></td></tr>';});if(!logs.length)html+='<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Sem registos</td></tr>';html+='</tbody></table></div>';document.getElementById('appContent').innerHTML=html;}
async function delAudit(id){if(!confirm('Eliminar?'))return;await DB.del('audit_logs',id);showToast('Eliminado!');loadAudit();}
async function clearAudit(){if(!confirm('Apagar TODO o histórico?'))return;var logs=await DB.get('audit_logs');for(var i=0;i<logs.length;i++){await DB.del('audit_logs',logs[i].id);}showToast('Limpo!');loadAudit();}

// ==================== CONFIGURAÇÕES ====================
async function loadConfig(){var cfg=DB.cache.settings||{};var br=await DB.get('branches');var users=await DB.get('users');var cu=getCurrency();var brOpts=br.map(function(b){return'<option value="'+b.id+'" '+(cfg.defaultBranch===b.id?'selected':'')+'>'+b.name+'</option>';}).join('');var usersHtml='';users.forEach(function(u){var statusBadge=u.blocked?'bg-danger':'bg-success';var statusText=u.blocked?'Bloqueado':'Activo';usersHtml+='<tr><td><strong>'+u.name+'</strong></td><td>'+u.user+'</td><td><span class="badge bg-info">'+u.role+'</span></td><td><span class="badge '+statusBadge+'">'+statusText+'</span></td><td style="white-space:nowrap"><button class="btn btn-warning btn-sm" onclick="editUserModal(\''+u.id+'\')">✏️ Editar</button> ';if(u.user!=='admin'&&u.user!=='cassoca'){usersHtml+='<button class="btn btn-'+(u.blocked?'success':'danger')+' btn-sm" onclick="toggleUserBlock(\''+u.id+'\','+!u.blocked+')">'+(u.blocked?'✅ Desbloquear':'🚫 Bloquear')+'</button>';}usersHtml+='</td></tr>';});var html='<h2>⚙️ Configurações</h2><div class="grid" style="grid-template-columns:1fr 1fr;gap:15px"><div class="card"><h3>Empresa</h3><div class="form-row"><div><label>Nome</label><input id="cfgName" value="'+(cfg.name||'')+'"></div><div><label>NIF</label><input id="cfgNif" value="'+(cfg.nif||'')+'"></div></div><div class="form-row"><div><label>Taxa IVA (%)</label><input type="number" id="cfgTax" value="'+(cfg.taxRate||14)+'"></div><div><label>Moeda</label><select id="cfgCur"><option '+(cfg.currency==='AKZ'?'selected':'')+'>AKZ</option><option '+(cfg.currency==='USD'?'selected':'')+'>USD</option><option '+(cfg.currency==='EUR'?'selected':'')+'>EUR</option></select></div></div><div class="form-row"><div><label>Morada</label><input id="cfgAddr" value="'+(cfg.address||'')+'"></div><div><label>Telefone</label><input id="cfgPhone" value="'+(cfg.phone||'')+'"></div></div><div class="form-row"><div><label>Email</label><input id="cfgEmail" value="'+(cfg.email||'')+'"></div><div><label>Filial Padrão</label><select id="cfgBranch">'+brOpts+'</select></div></div><button class="btn btn-primary" onclick="saveConfig()">💾 Salvar</button></div><div class="card"><h3>Banco</h3><div class="form-row"><div><label>Banco</label><input id="cfgBankName" value="'+(cfg.bank_name||'')+'"></div><div><label>IBAN</label><input id="cfgBankIban" value="'+(cfg.bank_iban||'')+'"></div></div><button class="btn btn-primary" onclick="saveConfig()">💾 Salvar</button></div><div class="card"><h3>Contrato e Penalizações</h3><div class="form-row"><div><label>Taxa Deslocação ('+cu+')</label><input type="number" id="cfgDispFee" value="'+(cfg.displacementFee||5000)+'"></div><div><label>Multa Danificação (%)</label><input type="number" id="cfgDmgPct" value="'+(cfg.damagePenaltyPct||100)+'"></div></div><div class="form-row"><div><label>Dias Tolerância (corte)</label><input type="number" id="cfgGraceDays" value="'+(cfg.cutoffGraceDays||3)+'"></div></div><button class="btn btn-primary" onclick="saveConfig()">💾 Salvar</button></div><div class="card"><h3>Filiais</h3><table><thead><tr><th>Nome</th><th>Local</th><th>Ações</th></tr></thead><tbody>';br.forEach(function(b){html+='<tr><td>'+b.name+'</td><td>'+(b.loc||'-')+'</td><td><button class="btn btn-outline btn-sm" onclick="editBranch(\''+b.id+'\')">✏️</button></td></tr>';});html+='</tbody></table><button class="btn btn-info btn-sm" style="margin-top:8px" onclick="addBranch()">➕ Nova Filial</button></div><div class="card"><h3>WhatsApp API</h3><div class="form-row"><div><label>URL API</label><input id="cfgWaApi" value="'+(cfg.whatsapp_api||'')+'"></div><div><label>API Key</label><input id="cfgWaKey" value="'+(cfg.whatsapp_key||'')+'"></div></div><button class="btn btn-primary btn-sm" onclick="saveConfig()">💾 Salvar</button></div><div class="card" style="grid-column:1/-1"><h3>👥 Gestão de Utilizadores</h3><table><thead><tr><th>Nome</th><th>User</th><th>Role</th><th>Estado</th><th>Ações</th></tr></thead><tbody>'+usersHtml+'</tbody></table></div><div class="card"><h3>Base de Dados</h3><div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-success" onclick="exportDB()">📤 Exportar Backup</button><button class="btn btn-warning" onclick="document.getElementById(\'importFileInput\').click()">📥 Importar Backup</button><button class="btn btn-danger" onclick="resetCache()">🔄 Limpar Cache</button></div></div></div>';document.getElementById('appContent').innerHTML=html;}

async function saveConfig(){var data={name:val('cfgName'),nif:val('cfgNif'),taxRate:parseFloat(val('cfgTax'))||14,currency:val('cfgCur'),defaultBranch:val('cfgBranch'),whatsapp_api:val('cfgWaApi'),whatsapp_key:val('cfgWaKey'),address:val('cfgAddr'),phone:val('cfgPhone'),email:val('cfgEmail'),bank_name:val('cfgBankName'),bank_iban:val('cfgBankIban'),displacementFee:parseFloat(val('cfgDispFee'))||5000,damagePenaltyPct:parseFloat(val('cfgDmgPct'))||100,cutoffGraceDays:parseInt(val('cfgGraceDays'))||3};data.id=1;await DB.upsert('settings',data);DB.cache.settings=data;await logAction('Config','Salvo');showToast('Configurações salvas!');}

async function addBranch(){modal('Nova Filial','<div class="form-row"><div><label>Nome</label><input id="brName"></div><div><label>Local</label><input id="brLoc"></div><div><label>NIF</label><input id="brNif"></div><div><label>Telefone</label><input id="brPhone"></div><div><label>Gerente</label><input id="brMgr"></div></div>',async function(){var n=val('brName');if(!n)return;await DB.insert('branches',{id:'b'+Date.now(),name:n,loc:val('brLoc'),nif:val('brNif'),phone:val('brPhone'),mgr:val('brMgr'),active:true});showToast('Criada!');closeModal();loadConfig();});}
async function editBranch(id){var br=(await DB.get('branches')).find(function(b){return b.id===id;});modal('Editar Filial','<div class="form-row"><div><label>Nome</label><input id="brName" value="'+br.name+'"></div><div><label>Local</label><input id="brLoc" value="'+(br.loc||'')+'"></div><div><label>NIF</label><input id="brNif" value="'+(br.nif||'')+'"></div><div><label>Telefone</label><input id="brPhone" value="'+(br.phone||'')+'"></div><div><label>Gerente</label><input id="brMgr" value="'+(br.mgr||'')+'"></div></div>',async function(){await DB.update('branches',id,{name:val('brName'),loc:val('brLoc'),nif:val('brNif'),phone:val('brPhone'),mgr:val('brMgr')});showToast('Atualizada!');closeModal();loadConfig();});}

async function editUserModal(id){var users=await DB.get('users');var u=users.find(function(x){return x.id===id;});if(!u)return;modal('✏️ Editar Utilizador: '+u.name,'<div class="form-row"><div><label>Nome *</label><input id="euName" value="'+u.name+'"></div><div><label>User *</label><input id="euUser" value="'+u.user+'"></div></div><div class="form-row"><div><label>Role</label><select id="euRole"><option value="admin" '+(u.role==='admin'?'selected':'')+'>Admin</option><option value="manager" '+(u.role==='manager'?'selected':'')+'>Manager</option></select></div><div><label>Nova Senha (vazio = manter)</label><input type="password" id="euPass" placeholder="Deixe vazio para não alterar"></div></div>',async function(){var obj={name:val('euName'),user:val('euUser'),role:val('euRole')};if(!obj.name||!obj.user)return showToast('Nome e User são obrigatórios!','danger');var pw=val('euPass');if(pw){if(pw.length<4)return showToast('Senha deve ter pelo menos 4 caracteres!','danger');obj.pass=await hashPassword(pw);}await DB.update('users',id,obj);if(currentUser.id===id){currentUser.name=obj.name;currentUser.role=obj.role;document.getElementById('currentUserName').innerText=obj.name;}await logAction('Editar User',obj.name);showToast('Utilizador atualizado!');closeModal();loadConfig();},'Salvar Alterações','btn-warning');}
async function toggleUserBlock(id,block){var users=await DB.get('users');var u=users.find(function(x){return x.id===id;});if(!u)return;if(u.user==='admin'||u.user==='cassoca')return showToast('Não pode bloquear o administrador principal!','danger');var confirmText=block?'Bloquear este utilizador? Ele não poderá entrar.':'Desbloquear este utilizador?';if(!confirm(confirmText))return;await DB.update('users',id,{blocked:block});await logAction(block?'Bloquear':'Desbloquear',u.name);showToast(block?'Utilizador Bloqueado!':'Utilizador Desbloqueado!');loadConfig();}

function exportDB(){var data=JSON.stringify(DB.cache,null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup_conexcass_'+todayISO()+'.json';a.click();showToast('Backup exportado!','info');}
async function importDB(event){var file=event.target.files[0];if(!file)return;if(!confirm('Substituir dados?'))return;var reader=new FileReader();reader.onload=async function(e){try{var data=JSON.parse(e.target.result);var count=0;for(var table in data){if(data.hasOwnProperty(table)&&Array.isArray(data[table])){for(var i=0;i<data[table].length;i++){try{await DB.upsert(table,data[table][i]);count++;}catch(err){}}}}await logAction('Import',count+' registos');showToast('Importados '+count+' registos!','info');loadConfig();}catch(err){showToast('Erro: '+err.message,'danger');}};reader.readAsText(file);event.target.value='';}
function resetCache(){DB.cache={};showToast('Cache limpa!','info');setTimeout(function(){location.reload();},1000);}

// ==================== INICIAR ====================
init();
</script>
